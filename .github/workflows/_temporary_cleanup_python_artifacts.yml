name: temporary cleanup python artifacts

on:
  pull_request:
    paths:
      - ".github/workflows/_temporary_cleanup_python_artifacts.yml"
      - ".gitignore"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Remove generated Python artifacts
        run: |
          rm -rf host/greenhouse-manager/src/greenhouse_manager.egg-info
          find host/greenhouse-manager -type d -name __pycache__ -prune -exec rm -rf {} +
          rm .github/workflows/_temporary_cleanup_python_artifacts.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove generated Python artifacts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
