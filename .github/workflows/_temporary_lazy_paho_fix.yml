name: temporary lazy paho fix

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_broker_driver.py"
      - "host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_optional_paho.py"
      - ".github/workflows/_temporary_lazy_paho_fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply lazy import patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_broker_driver.py")
          text = path.read_text(encoding="utf-8")
          old_import = "\nimport paho.mqtt.client as mqtt\n\nfrom .dynsec_api"
          if old_import not in text:
              raise SystemExit("top-level paho import marker not found")
          text = text.replace(old_import, "\nfrom .dynsec_api", 1)

          class_marker = "class BrokerIdentityProductionBrokerDriverError(RuntimeError):\n    pass\n\n\n"
          helper = '''def _load_paho_mqtt() -> Any:\n    try:\n        import paho.mqtt.client as mqtt\n    except ModuleNotFoundError as error:\n        if error.name is None or not error.name.startswith("paho"):\n            raise\n        raise BrokerIdentityProductionBrokerDriverError(\n            "paho-mqtt is required for live Broker activation"\n        ) from error\n    return mqtt\n\n\n'''
          if class_marker not in text:
              raise SystemExit("driver error class marker not found")
          text = text.replace(class_marker, class_marker + helper, 1)

          connected_marker = "    def _connected_client(self) -> tuple[Any, threading.Event]:\n        config = self.config"
          connected_replacement = "    def _connected_client(self) -> tuple[Any, threading.Event]:\n        mqtt = _load_paho_mqtt()\n        config = self.config"
          if connected_marker not in text:
              raise SystemExit("connected client marker not found")
          text = text.replace(connected_marker, connected_replacement, 1)

          retained_marker = "    def retained_message(self, topic: str) -> bytes:\n        if not topic.startswith(\"gh/\"):"
          retained_replacement = "    def retained_message(self, topic: str) -> bytes:\n        mqtt = _load_paho_mqtt()\n        if not topic.startswith(\"gh/\"):"
          if retained_marker not in text:
              raise SystemExit("retained message marker not found")
          text = text.replace(retained_marker, retained_replacement, 1)

          path.write_text(text, encoding="utf-8")
          PY
      - name: Validate patch
        run: |
          python -m pip install -e 'host/greenhouse-manager[dev]'
          ruff check host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_broker_driver.py host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_optional_paho.py
          pytest -q host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_optional_paho.py host/greenhouse-manager/tests/test_t1_broker_identity_production_broker_driver.py
      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/_temporary_lazy_paho_fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(m2): defer paho import until live MQTT use"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
