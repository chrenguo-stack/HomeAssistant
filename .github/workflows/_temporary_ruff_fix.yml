name: temporary ruff fix

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py"
      - "host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py"
      - ".github/workflows/_temporary_ruff_fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.12,<1"
      - name: Apply Ruff fixes
        run: |
          ruff check --fix host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py
          ruff format host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py
      - name: Commit fixes and remove temporary workflow
        run: |
          rm .github/workflows/_temporary_ruff_fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py \
                  host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py \
                  .github/workflows/_temporary_ruff_fix.yml
          git commit -m "style(m2): apply ruff fixes to production orchestrator"
          git push origin HEAD:${{ github.head_ref }}
