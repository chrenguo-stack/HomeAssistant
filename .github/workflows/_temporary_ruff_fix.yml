name: temporary ruff fix

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py"
      - "host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py"
      - ".github/workflows/_temporary_ruff_fix.yml"

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.12,<1"
      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py || true
          ruff format host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py
          tar -czf /tmp/ruff-fixed-orchestrator.tar.gz \
            host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_activation_orchestrator.py \
            host/greenhouse-manager/tests/test_t1_broker_identity_production_activation_orchestrator.py
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-fixed-orchestrator
          path: /tmp/ruff-fixed-orchestrator.tar.gz
          retention-days: 1
