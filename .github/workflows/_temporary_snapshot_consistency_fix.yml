name: temporary snapshot consistency fix

on:
  pull_request:
    paths:
      - ".github/workflows/_temporary_snapshot_consistency_fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply consistency patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_transaction_adapters.py")
          text = source.read_text(encoding="utf-8")
          old = '''def _copy_snapshot(source: Path, destination: Path) -> dict[str, PathRecord]:
              records = _record_tree(source)
              shutil.copytree(source, destination, copy_function=shutil.copy2)
              return records
          '''
          new = '''def _snapshot_payload_matches(
              expected: Mapping[str, PathRecord],
              observed: Mapping[str, PathRecord],
          ) -> bool:
              if expected.keys() != observed.keys():
                  return False
              return all(
                  expected[relative].kind == observed[relative].kind
                  and expected[relative].mode == observed[relative].mode
                  and expected[relative].sha256 == observed[relative].sha256
                  for relative in expected
              )


          def _copy_snapshot(
              source: Path,
              destination: Path,
              *,
              max_attempts: int = 5,
          ) -> dict[str, PathRecord]:
              if max_attempts < 1:
                  raise ValueError("snapshot max attempts must be positive")
              for _attempt in range(max_attempts):
                  before = _record_tree(source)
                  shutil.copytree(source, destination, copy_function=shutil.copy2)
                  after = _record_tree(source)
                  copied = _record_tree(destination)
                  if before == after and _snapshot_payload_matches(before, copied):
                      return before
                  shutil.rmtree(destination)
              raise BrokerIdentityProductionTransactionAdaptersError(
                  "live snapshot did not reach a stable, verified inventory"
              )
          '''
          if old not in text:
              raise SystemExit("snapshot function marker not found")
          source.write_text(text.replace(old, new), encoding="utf-8")

          test = Path("host/greenhouse-manager/tests/test_t1_broker_identity_production_transaction_adapters.py")
          test_text = test.read_text(encoding="utf-8")
          addition = '''

          def test_snapshot_copy_retries_until_source_inventory_is_stable(
              tmp_path: Path,
              monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              from greenhouse_manager import (
                  t1_broker_identity_production_transaction_adapters as adapter_module,
              )

              source = tmp_path / "source"
              source.mkdir()
              value = source / "value.bin"
              value.write_bytes(b"first")
              destination = tmp_path / "snapshot"
              original = adapter_module._record_tree
              source_calls = 0

              def changing_record(root: Path):
                  nonlocal source_calls
                  records = original(root)
                  if root == source and source_calls == 0:
                      value.write_bytes(b"second")
                  if root == source:
                      source_calls += 1
                  return records

              monkeypatch.setattr(adapter_module, "_record_tree", changing_record)
              inventory = adapter_module._copy_snapshot(source, destination)

              assert source_calls >= 4
              assert inventory == original(source)
              assert (destination / "value.bin").read_bytes() == b"second"


          def test_snapshot_copy_fails_closed_when_source_never_stabilizes(
              tmp_path: Path,
              monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              from greenhouse_manager import (
                  t1_broker_identity_production_transaction_adapters as adapter_module,
              )

              source = tmp_path / "source"
              source.mkdir()
              value = source / "value.bin"
              value.write_bytes(b"0")
              destination = tmp_path / "snapshot"
              original = adapter_module._record_tree
              counter = 0

              def always_changing(root: Path):
                  nonlocal counter
                  records = original(root)
                  if root == source:
                      counter += 1
                      value.write_bytes(str(counter).encode())
                  return records

              monkeypatch.setattr(adapter_module, "_record_tree", always_changing)
              with pytest.raises(
                  adapter_module.BrokerIdentityProductionTransactionAdaptersError,
                  match="stable, verified inventory",
              ):
                  adapter_module._copy_snapshot(source, destination, max_attempts=2)
              assert not destination.exists()
          '''
          if "test_snapshot_copy_retries_until_source_inventory_is_stable" in test_text:
              raise SystemExit("snapshot consistency tests already present")
          test.write_text(test_text + addition, encoding="utf-8")
          PY
      - name: Format and test patch
        run: |
          python -m pip install "ruff>=0.12,<1"
          ruff check --fix host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_transaction_adapters.py host/greenhouse-manager/tests/test_t1_broker_identity_production_transaction_adapters.py
          ruff format host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_transaction_adapters.py host/greenhouse-manager/tests/test_t1_broker_identity_production_transaction_adapters.py
      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/_temporary_snapshot_consistency_fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_production_transaction_adapters.py \
                  host/greenhouse-manager/tests/test_t1_broker_identity_production_transaction_adapters.py \
                  .github/workflows/_temporary_snapshot_consistency_fix.yml
          git commit -m "fix(m2): verify stable production rollback snapshots"
          git push origin HEAD:${{ github.head_ref }}
