name: F1.0-RC2 firmware CI

on:
  pull_request:
    paths:
      - "firmware/esphome_rc/f1_0_rc2/**"
      - "firmware/esphome_rc/15_1_2_rs485_modbus_echo_filter/**"
      - ".github/workflows/f1-0-rc2-ci.yml"
  push:
    branches:
      - "feature/f1-0-rc2-*"
    paths:
      - "firmware/esphome_rc/f1_0_rc2/**"
      - "firmware/esphome_rc/15_1_2_rs485_modbus_echo_filter/**"
      - ".github/workflows/f1-0-rc2-ci.yml"

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ESPHome
        run: python -m pip install --upgrade "esphome==2026.4.3"

      - name: Validate configuration
        working-directory: firmware/esphome_rc/f1_0_rc2
        run: bash tools/rc2.sh config

      - name: Compile firmware
        working-directory: firmware/esphome_rc/f1_0_rc2
        run: bash tools/rc2.sh compile
