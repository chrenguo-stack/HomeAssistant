name: greenhouse-manager CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"
  push:
    branches:
      - main
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/greenhouse-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/greenhouse-manager/pyproject.toml

      - name: Install
        run: python -m pip install -e '.[dev]'

      - name: Capture lint output
        id: lint
        continue-on-error: true
        run: ruff check . > lint-output.txt 2>&1

      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: greenhouse-manager-lint-output
          path: host/greenhouse-manager/lint-output.txt
          if-no-files-found: error

      - name: Enforce lint
        if: steps.lint.outcome != 'success'
        run: |
          cat lint-output.txt
          exit 1

      - name: Test
        run: pytest -q
