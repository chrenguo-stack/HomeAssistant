name: greenhouse-manager CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"
  push:
    branches:
      - main
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/greenhouse-manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/greenhouse-manager/pyproject.toml

      - name: Install
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Test
        id: pytest
        run: |
          set +e
          pytest -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: greenhouse-manager-pytest-log
          path: host/greenhouse-manager/pytest.log
          if-no-files-found: error
