name: greenhouse-manager CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"
  push:
    branches:
      - main
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/greenhouse-manager

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install and lint
        run: |
          python -m pip install -q -e '.[dev]'
          ruff check .

      - name: Test and capture log
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pytest -q > pytest-diagnostic.log 2>&1
          rc=$?
          echo "$rc" > pytest-diagnostic.rc
          exit "$rc"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenhouse-manager-pytest-diagnostic
          path: |
            host/greenhouse-manager/pytest-diagnostic.log
            host/greenhouse-manager/pytest-diagnostic.rc
          if-no-files-found: error
          retention-days: 1

      - name: Enforce test result
        if: steps.pytest.outcome != 'success'
        run: exit 1
