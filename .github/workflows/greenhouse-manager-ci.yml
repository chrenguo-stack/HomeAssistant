name: greenhouse-manager CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"
  push:
    branches:
      - main
    paths:
      - "host/greenhouse-manager/**"
      - "protocols/mqtt/**"
      - "protocols/pairing/**"
      - ".github/workflows/greenhouse-manager-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/greenhouse-manager

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Diagnostic test
        shell: bash
        run: |
          set -o pipefail
          python -m pip install -q -e '.[dev]' >/dev/null
          ruff check . >/dev/null
          pytest -q 2>&1 | tail -n 40
