name: H3 N2 Stage1C Main B023 Fix v33

on:
  push:
    branches:
      - ci/h3-n2-stage1c-main-b023-fix-20260720-v33
    paths:
      - .github/workflows/h3-n2-stage1c-main-b023-fix-v33.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: h3-n2-stage1c-main-b023-fix-20260720-v33
  cancel-in-progress: false

jobs:
  bind-regression-closures-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TARGET_BRANCH: integration/h3-n2-stage1c-main-port-20260720-v28
      EXPECTED_HEAD: 2757b248374412cc7c22ffb3da9c63ffd92a5ed1
      TEST_PATH: host/greenhouse-manager/tests/test_stage1c_runtime_regressions.py
      EXPECTED_BEFORE_SHA256: a9a68460d42f54060d3a6f1a19167bff5f529963abdd4df744af3935776ca81e
      EXPECTED_AFTER_SHA256: be7346fbec0aae219e478e3e7d49fffb52e736ba3060be76a3068bee5eb1c435
      PR_NUMBER: '152'

    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: host/greenhouse-manager/pyproject.toml

      - name: Verify exact integration input
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test "$(git branch --show-current)" = "$TARGET_BRANCH"
          test -z "$(git status --porcelain)"
          printf '%s  %s\n' "$EXPECTED_BEFORE_SHA256" "$TEST_PATH" | sha256sum -c -
          echo 'B023_FIX_INPUT_IDENTITY=PASSED'

      - name: Bind loop-derived values through helper parameters
        shell: bash
        run: |
          set -euo pipefail
          python - "$TEST_PATH" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding='utf-8')

          old_transport = '''        for responses in cases:
              with self.subTest(responses=responses):
                  client = Mock()
                  client.subscribe.return_value = (0, 1)
                  transport = PahoDynsecTransport(
                      client,
                      timeout_s=0.01,
                  )

                  def publish_side_effect(
                      *args: Any,
                      **kwargs: Any,
                  ) -> Any:
                      payload = json.loads(kwargs["payload"])
                      correlation = (
                          payload["commands"][0]["correlationData"]
                      )
                      rendered = [
                          {
                              key: (
                                  correlation
                                  if value == "{correlation}"
                                  else value
                              )
                              for key, value in response.items()
                          }
                          for response in responses
                      ]
                      transport.on_message(
                          client,
                          None,
                          Mock(
                              topic=RESPONSE_TOPIC,
                              payload=json.dumps(
                                  {"responses": rendered}
                              ).encode(),
                          ),
                      )
                      return Mock(rc=0)

                  client.publish.side_effect = publish_side_effect
          '''
          new_transport = '''        def make_publish_side_effect(
              case_responses: list[dict[str, str]],
              current_transport: PahoDynsecTransport,
              current_client: Any,
          ) -> Any:
              def publish_side_effect(
                  *args: Any,
                  **kwargs: Any,
              ) -> Any:
                  payload = json.loads(kwargs["payload"])
                  correlation = (
                      payload["commands"][0]["correlationData"]
                  )
                  rendered = [
                      {
                          key: (
                              correlation
                              if value == "{correlation}"
                              else value
                          )
                          for key, value in response.items()
                      }
                      for response in case_responses
                  ]
                  current_transport.on_message(
                      current_client,
                      None,
                      Mock(
                          topic=RESPONSE_TOPIC,
                          payload=json.dumps(
                              {"responses": rendered}
                          ).encode(),
                      ),
                  )
                  return Mock(rc=0)

              return publish_side_effect

          for responses in cases:
              with self.subTest(responses=responses):
                  client = Mock()
                  client.subscribe.return_value = (0, 1)
                  transport = PahoDynsecTransport(
                      client,
                      timeout_s=0.01,
                  )

                  client.publish.side_effect = make_publish_side_effect(
                      responses,
                      transport,
                      client,
                  )
          '''

          old_suback = '''    def test_suback_denial_and_timeout(self) -> None:
              for denied in (True, False):
                  with self.subTest(denied=denied):
                      session = self.make_session()

                      class Client:
                          def subscribe(
                              client_self,
                              _topic: str,
                              qos: int,
                          ) -> tuple[int, int]:
                              mid = 51

                              if denied:
                                  def deliver() -> None:
                                      time.sleep(0.001)
                                      session._on_subscribe(
                                          client_self,
                                          None,
                                          mid,
                                          [
                                              FakeReasonCode(
                                                  failure=True,
                                                  label="Not authorized",
                                              )
                                          ],
                                          None,
                                      )

                                  threading.Thread(
                                      target=deliver,
                                      daemon=True,
                                  ).start()
                              return (0, mid)

                      session.client = Client()

                      if denied:
                          self.assertFalse(session.subscribe("$CONTROL/#"))
                      else:
                          original_wait = threading.Event.wait

                          def short_wait(
                              event_self: threading.Event,
                              timeout: float | None = None,
                          ) -> bool:
                              return original_wait(event_self, 0.01)

                          session.subscriptions = {}
                          with unittest.mock.patch.object(
                              threading.Event,
                              "wait",
                              short_wait,
                          ):
                              with self.assertRaisesRegex(
                                  AssertionError,
                                  "SUBACK timed out",
                              ):
                                  session.subscribe("gh/#")
          '''
          new_suback = '''    def test_suback_denial_and_timeout(self) -> None:
              def build_client(
                  should_deny: bool,
                  current_session: Any,
              ) -> Any:
                  class Client:
                      def subscribe(
                          client_self,
                          _topic: str,
                          qos: int,
                      ) -> tuple[int, int]:
                          mid = 51

                          if should_deny:
                              def deliver() -> None:
                                  time.sleep(0.001)
                                  current_session._on_subscribe(
                                      client_self,
                                      None,
                                      mid,
                                      [
                                          FakeReasonCode(
                                              failure=True,
                                              label="Not authorized",
                                          )
                                      ],
                                      None,
                                  )

                              threading.Thread(
                                  target=deliver,
                                  daemon=True,
                              ).start()
                          return (0, mid)

                  return Client()

              def make_short_wait(wait_impl: Any) -> Any:
                  def short_wait(
                      event_self: threading.Event,
                      timeout: float | None = None,
                  ) -> bool:
                      return wait_impl(event_self, 0.01)

                  return short_wait

              for denied in (True, False):
                  with self.subTest(denied=denied):
                      session = self.make_session()
                      session.client = build_client(denied, session)

                      if denied:
                          self.assertFalse(session.subscribe("$CONTROL/#"))
                      else:
                          session.subscriptions = {}
                          with unittest.mock.patch.object(
                              threading.Event,
                              "wait",
                              make_short_wait(threading.Event.wait),
                          ), self.assertRaisesRegex(
                              AssertionError,
                              "SUBACK timed out",
                          ):
                              session.subscribe("gh/#")
          '''

          if text.count(old_transport) != 1:
              raise SystemExit('transport closure target count is not one')
          if text.count(old_suback) != 1:
              raise SystemExit('SUBACK closure target count is not one')

          text = text.replace(old_transport, new_transport, 1)
          text = text.replace(old_suback, new_suback, 1)
          path.write_text(text, encoding='utf-8')
          PY

          printf '%s  %s\n' "$EXPECTED_AFTER_SHA256" "$TEST_PATH" | sha256sum -c -
          git diff --check
          test "$(git status --short | sed -E 's/^.. //')" = "$TEST_PATH"
          echo 'B023_CLOSURE_BINDINGS_APPLIED=PASSED'

      - name: Install manager development dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'host/greenhouse-manager[dev]'

      - name: Run current-main lint and regression matrix
        shell: bash
        run: |
          set -euo pipefail
          cd host/greenhouse-manager
          python -m ruff check . 2>&1 | tee /tmp/ruff-v33.log
          python -m pytest -q 2>&1 | tee /tmp/pytest-v33.log
          cd "$GITHUB_WORKSPACE"

          export PYTHONPATH="$GITHUB_WORKSPACE/host/greenhouse-manager/src"
          python "$TEST_PATH" 2>&1 | tee /tmp/stage1c-v33.log
          grep -q '^OK$' /tmp/stage1c-v33.log
          python -m py_compile "$TEST_PATH"

          echo 'CURRENT_MAIN_RUFF=PASSED'
          echo 'GREENHOUSE_MANAGER_FULL_PYTEST=PASSED'
          echo 'STAGE1C_STANDALONE_REGRESSION=PASSED'
          echo 'PY_COMPILE=PASSED'

      - name: Clean generated files and verify final scope
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find host/greenhouse-manager -type d -name '*.egg-info' -prune -exec rm -rf {} +
          rm -rf .pytest_cache host/greenhouse-manager/.pytest_cache
          test "$(git status --short | sed -E 's/^.. //')" = "$TEST_PATH"
          printf '%s  %s\n' "$EXPECTED_AFTER_SHA256" "$TEST_PATH" | sha256sum -c -
          git diff --check
          echo 'FINAL_CHANGE_SCOPE=ONE_TEST_FILE'

      - name: Commit and push validated lint fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "$TEST_PATH"
          test "$(git diff --cached --name-only)" = "$TEST_PATH"
          git commit -m 'test(h3): bind Stage 1C regression closures for current lint'
          result_head="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD^)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          echo "RESULT_HEAD=$result_head" | tee /tmp/result-v33.env
          echo 'B023_FIX_PUSH=PASSED'

      - name: Post validation result to draft PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          result_head="$(cut -d= -f2 /tmp/result-v33.env)"
          {
            echo 'Stage 1C regression closure binding fix completed.'
            echo
            echo "- Result head: \`$result_head\`"
            echo '- Changed scope: one regression test file'
            echo '- Current-main Ruff: passed'
            echo '- Full greenhouse-manager pytest: passed'
            echo '- Standalone Stage 1C regression: passed'
            echo '- Runtime source hashes: unchanged'
            echo '- M401A: not modified'
          } > /tmp/pr-v33.md
          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body-file /tmp/pr-v33.md
          echo 'STATUS=H3_N2_STAGE1C_MAIN_B023_FIX_V33_SUCCEEDED'

      - name: Upload lint-fix audit logs
        uses: actions/upload-artifact@v4
        with:
          name: h3-n2-stage1c-main-b023-fix-v33-audit
          path: |
            /tmp/ruff-v33.log
            /tmp/pytest-v33.log
            /tmp/stage1c-v33.log
            /tmp/result-v33.env
          if-no-files-found: error
          retention-days: 30
