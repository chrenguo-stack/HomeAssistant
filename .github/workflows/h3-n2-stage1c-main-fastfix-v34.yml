name: H3 N2 Stage1C Main Fast Fix v34

on:
  push:
    branches:
      - ci/h3-n2-stage1c-main-fastfix-20260720-v34
    paths:
      - .github/workflows/h3-n2-stage1c-main-fastfix-v34.yml

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: h3-n2-stage1c-main-fastfix-20260720-v34
  cancel-in-progress: false

jobs:
  patch-lint-and-focused-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      TARGET_BRANCH: integration/h3-n2-stage1c-main-port-20260720-v28
      EXPECTED_HEAD: 2757b248374412cc7c22ffb3da9c63ffd92a5ed1
      TEST_PATH: host/greenhouse-manager/tests/test_stage1c_runtime_regressions.py
      EXPECTED_BEFORE_SHA256: a9a68460d42f54060d3a6f1a19167bff5f529963abdd4df744af3935776ca81e
      EXPECTED_AFTER_SHA256: be7346fbec0aae219e478e3e7d49fffb52e736ba3060be76a3068bee5eb1c435
      PR_NUMBER: '152'

    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: host/greenhouse-manager/pyproject.toml

      - name: Verify exact input
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test "$(git branch --show-current)" = "$TARGET_BRANCH"
          test -z "$(git status --porcelain)"
          printf '%s  %s\n' "$EXPECTED_BEFORE_SHA256" "$TEST_PATH" | sha256sum -c -

      - name: Apply reviewed closure-binding patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/stage1c-b023-v34.patch <<'PATCH'
