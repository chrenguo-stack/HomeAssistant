          sed -i 's/^          //' /tmp/stage1c-b023-v34.patch
          git apply --check /tmp/stage1c-b023-v34.patch
          git apply /tmp/stage1c-b023-v34.patch
          printf '%s  %s\n' "$EXPECTED_AFTER_SHA256" "$TEST_PATH" | sha256sum -c -
          test "$(git status --short | sed -E 's/^.. //')" = "$TEST_PATH"
          git diff --check

      - name: Install focused development dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'host/greenhouse-manager[dev]'

      - name: Run lint and focused regression tests
        shell: bash
        run: |
          set -euo pipefail
          cd host/greenhouse-manager
          python -m ruff check . 2>&1 | tee /tmp/ruff-v34.log
          python -m pytest -q \
            tests/test_dynsec_api.py \
            tests/test_stage1c_runtime_regressions.py \
            2>&1 | tee /tmp/pytest-v34.log
          cd "$GITHUB_WORKSPACE"
          export PYTHONPATH="$GITHUB_WORKSPACE/host/greenhouse-manager/src"
          python "$TEST_PATH" 2>&1 | tee /tmp/standalone-v34.log
          grep -q '^OK$' /tmp/standalone-v34.log
          python -m py_compile "$TEST_PATH"

      - name: Clean and commit one-file fix
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find host/greenhouse-manager -type d -name '*.egg-info' -prune -exec rm -rf {} +
          rm -rf .pytest_cache host/greenhouse-manager/.pytest_cache
          test "$(git status --short | sed -E 's/^.. //')" = "$TEST_PATH"
          printf '%s  %s\n' "$EXPECTED_AFTER_SHA256" "$TEST_PATH" | sha256sum -c -

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "$TEST_PATH"
          test "$(git diff --cached --name-only)" = "$TEST_PATH"
          git commit -m 'test(h3): bind Stage 1C regression closures for current lint'
          result_head="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD^)" = "$EXPECTED_HEAD"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          echo "RESULT_HEAD=$result_head" | tee /tmp/result-v34.env

      - name: Comment on draft PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          result_head="$(cut -d= -f2 /tmp/result-v34.env)"
          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body "Stage 1C B023 closure fix pushed as \`$result_head\`. Full current-main Ruff, 33 focused tests, standalone 14-test regression, and Python compile all passed. Runtime source files and M401A were not modified."
          echo 'STATUS=H3_N2_STAGE1C_MAIN_FASTFIX_V34_SUCCEEDED'

      - name: Upload audit logs
        uses: actions/upload-artifact@v4
        with:
          name: h3-n2-stage1c-main-fastfix-v34-audit
          path: |
            /tmp/ruff-v34.log
            /tmp/pytest-v34.log
            /tmp/standalone-v34.log
            /tmp/result-v34.env
          if-no-files-found: error
          retention-days: 30
