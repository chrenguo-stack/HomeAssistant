name: H3 N2 Stage2B2 Import Format v41

on:
  push:
    branches:
      - feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/pairing_endpoint.py"
      - "host/greenhouse-manager/tests/test_pairing_endpoint.py"
      - "host/greenhouse-manager/pyproject.toml"
      - ".github/workflows/h3-n2-stage2b2-import-format-v41.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.12,<1"

      - name: Apply isolated import fixes and remove temporary exceptions
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check --isolated --select I001,UP035 --fix \
            host/greenhouse-manager/src/greenhouse_manager/pairing_endpoint.py \
            host/greenhouse-manager/tests/test_pairing_endpoint.py
          python - <<'PY'
          from pathlib import Path

          path = Path("host/greenhouse-manager/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          for line in (
              '"src/greenhouse_manager/pairing_endpoint.py" = ["I001"]\n',
              '"tests/test_pairing_endpoint.py" = ["UP035"]\n',
          ):
              if line not in text:
                  raise SystemExit(f"missing expected temporary exception: {line.strip()}")
              text = text.replace(line, "", 1)
          path.write_text(text, encoding="utf-8")
          PY
          cd host/greenhouse-manager
          python -m ruff check .

      - name: Commit formatted imports
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            host/greenhouse-manager/src/greenhouse_manager/pairing_endpoint.py \
            host/greenhouse-manager/tests/test_pairing_endpoint.py \
            host/greenhouse-manager/pyproject.toml
          git commit -m "style(h3): format Stage 2B-2 endpoint imports"
          git push origin HEAD:feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
