name: H3 N2 Stage2B2 Local Host Patch v42

on:
  push:
    branches:
      - feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
    paths:
      - ".github/workflows/h3-n2-stage2b2-local-host-patch-v42.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restrict discovered DNS hosts to mDNS local names
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path("host/greenhouse-manager/src/greenhouse_manager/pairing_discovery.py")
          text = source.read_text(encoding="utf-8")
          old = '''    except ValueError:\n        labels = candidate.split(".")\n        return bool(labels) and all(_DNS_LABEL.fullmatch(label) for label in labels)\n'''
          new = '''    except ValueError:\n        labels = candidate.split(".")\n        return (\n            candidate.endswith(".local")\n            and len(labels) >= 2\n            and all(_DNS_LABEL.fullmatch(label) for label in labels)\n        )\n'''
          if text.count(old) != 1:
              raise SystemExit("unexpected discovery host validator shape")
          source.write_text(text.replace(old, new, 1), encoding="utf-8")

          tests = Path("host/greenhouse-manager/tests/test_pairing_discovery.py")
          text = tests.read_text(encoding="utf-8")
          marker = '''def test_mdns_definition_contains_only_public_discovery_metadata() -> None:\n'''
          addition = '''def test_candidate_rejects_non_local_dns_hostname() -> None:\n    with pytest.raises(ValueError, match="valid hostname or address"):\n        ManagerCandidate(\n            schema="gh.manager.candidate/1",\n            manager_id="manager-a",\n            system_id="greenhouse-a",\n            host="manager.example",\n            scheme="http",\n            port=8443,\n            pairing_path="/v1/pairing",\n            protocol=SECURE_PAIRING_PROTOCOL,\n            priority=10,\n            ttl_s=30,\n        )\n\n\n'''
          if text.count(marker) != 1 or addition in text:
              raise SystemExit("unexpected discovery test insertion point")
          tests.write_text(text.replace(marker, addition + marker, 1), encoding="utf-8")

          protocol = Path("protocols/pairing/gh-h3-discovery-and-endpoint-v1.md")
          text = protocol.read_text(encoding="utf-8")
          marker = '- `manager_id` 表示本机 Manager 实例；\n'
          addition = '- `host` 只能是局域网地址或以 `.local` 结尾的 mDNS 名称；\n'
          if text.count(marker) != 1 or addition in text:
              raise SystemExit("unexpected protocol insertion point")
          protocol.write_text(text.replace(marker, marker + addition, 1), encoding="utf-8")
          PY

      - name: Validate patch
        working-directory: host/greenhouse-manager
        run: |
          python -m pip install -e ".[dev]"
          python -m ruff check .
          python -m pytest -q \
            tests/test_pairing_discovery.py \
            tests/test_pairing_endpoint.py \
            tests/test_pairing_endpoint_secure_integration.py \
            tests/test_pairing_network_service.py

      - name: Commit local-host hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            host/greenhouse-manager/src/greenhouse_manager/pairing_discovery.py \
            host/greenhouse-manager/tests/test_pairing_discovery.py \
            protocols/pairing/gh-h3-discovery-and-endpoint-v1.md
          git commit -m "fix(h3): restrict pairing discovery to local hosts"
          git push origin HEAD:feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
