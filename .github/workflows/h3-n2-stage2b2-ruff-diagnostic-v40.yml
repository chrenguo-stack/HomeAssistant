name: H3 N2 Stage2B2 Ruff Diagnostic v40

on:
  push:
    branches:
      - feature/h3-n2-stage2b2-discovery-boundary-20260720-v39
    paths:
      - "host/greenhouse-manager/**"
      - ".github/workflows/h3-n2-stage2b2-ruff-diagnostic-v40.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Manager development dependencies
        working-directory: host/greenhouse-manager
        run: python -m pip install -e ".[dev]"

      - name: Capture Ruff diagnostics
        id: ruff
        working-directory: host/greenhouse-manager
        shell: bash
        run: |
          set +e
          python -m ruff check . --output-format=concise > "$RUNNER_TEMP/stage2b2-ruff-v40.log" 2>&1
          rc=$?
          printf 'RUFF_EXIT_CODE=%s\n' "$rc" >> "$RUNNER_TEMP/stage2b2-ruff-v40.log"
          printf 'exit_code=%s\n' "$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: h3-n2-stage2b2-ruff-diagnostic-v40
          path: ${{ runner.temp }}/stage2b2-ruff-v40.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce Ruff result
        run: test "${{ steps.ruff.outputs.exit_code }}" = "0"
