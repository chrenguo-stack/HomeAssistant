name: H3 N2 Stage2B3 Focused Diagnostic v42

on:
  push:
    branches:
      - feature/h3-n2-stage2b3-manager-assembly-20260720-v40

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/greenhouse-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Capture focused tests
        run: |
          set +e
          pytest -q \
            tests/test_pairing_runtime_config.py \
            tests/test_pairing_runtime.py \
            tests/test_pairing_lab_cli.py \
            tests/test_pairing_deployment_contract.py \
            > stage2b3-v42-diagnostic.txt 2>&1
          rc=$?
          printf '\nFOCUSED_RC=%s\n' "$rc" >> stage2b3-v42-diagnostic.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: stage2b3-v42-diagnostic
          path: host/greenhouse-manager/stage2b3-v42-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
