name: H3 N2 Stage2B3 Import Fix v41

on:
  push:
    branches:
      - feature/h3-n2-stage2b3-manager-assembly-20260720-v40

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2b3-manager-assembly-20260720-v40
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.12,<1'
      - name: Apply deterministic import fixes
        run: |
          ruff check --fix \
            host/greenhouse-manager/src/greenhouse_manager/pairing_runtime_config.py \
            host/greenhouse-manager/tests/test_pairing_runtime.py \
            host/greenhouse-manager/tests/test_pairing_runtime_config.py \
            host/greenhouse-manager/tests/test_pairing_lab_cli.py
          ruff check host/greenhouse-manager
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git diff --quiet; then
            echo "No import fixes required"
            exit 0
          fi
          git add \
            host/greenhouse-manager/src/greenhouse_manager/pairing_runtime_config.py \
            host/greenhouse-manager/tests/test_pairing_runtime.py \
            host/greenhouse-manager/tests/test_pairing_runtime_config.py \
            host/greenhouse-manager/tests/test_pairing_lab_cli.py
          git commit -m 'style(h3): apply Stage 2B-3 import fixes'
          git push origin HEAD:feature/h3-n2-stage2b3-manager-assembly-20260720-v40
