name: H3 N2 Stage2D1 NVS Persistence CI

on:
  pull_request:
    paths:
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_persistence_*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_credential_codec.*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_persistent_store.*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/tests/pairing_stage2d1_*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/__init__.py"
      - "firmware/esphome_rc/components/greenhouse_pairing_persistence_lab/**"
      - "firmware/esphome_rc/board_lab/h3_node_pairing_persistence/**"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_node_pairing_persistence_board_lab_20260721_v49.yml"
      - "firmware/esphome_rc/f1_0_rc2/packages/**"
      - "protocols/pairing/gh-h3-node-persistent-credentials-v1.md"
      - "docs/development/h3-n2-stage2d1-nvs-persistence-20260721.md"
      - ".github/workflows/h3-n2-stage2d1-nvs-persistence-ci.yml"
  push:
    branches: [main]
    paths:
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_persistence_*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_credential_codec.*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/pairing_persistent_store.*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/tests/pairing_stage2d1_*"
      - "firmware/esphome_rc/components/greenhouse_pairing_client/__init__.py"
      - "firmware/esphome_rc/components/greenhouse_pairing_persistence_lab/**"
      - "firmware/esphome_rc/board_lab/h3_node_pairing_persistence/**"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_node_pairing_persistence_board_lab_20260721_v49.yml"
      - "firmware/esphome_rc/f1_0_rc2/packages/**"
      - "protocols/pairing/gh-h3-node-persistent-credentials-v1.md"
      - "docs/development/h3-n2-stage2d1-nvs-persistence-20260721.md"
      - ".github/workflows/h3-n2-stage2d1-nvs-persistence-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  host-fault-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Compile Stage 2D-1 persistent store and fault matrix
        run: |
          set -euo pipefail
          component=firmware/esphome_rc/components/greenhouse_pairing_client
          g++ -std=gnu++20 -Wall -Wextra -Wpedantic -Werror \
            -I "$component" \
            "$component/pairing_client_core.cpp" \
            "$component/pairing_transport_core.cpp" \
            "$component/secure_pairing_channel.cpp" \
            "$component/secure_pairing_channel_encoding.cpp" \
            "$component/secure_pairing_channel_crypto.cpp" \
            "$component/pairing_ram_credentials.cpp" \
            "$component/pairing_persistence_backend.cpp" \
            "$component/pairing_persistence_crypto.cpp" \
            "$component/pairing_credential_codec.cpp" \
            "$component/pairing_persistent_store.cpp" \
            "$component/tests/pairing_stage2d1_persistent_store_fault_matrix_20260721_v49.cpp" \
            -lcrypto \
            -o /tmp/stage2d1-persistent-store-fault-matrix-v49
      - name: Run Stage 2D-1 persistent store fault matrix
        run: /tmp/stage2d1-persistent-store-fault-matrix-v49
      - name: Verify Stage 2D-1 source and production boundaries
        run: |
          python - <<'PY'
          from pathlib import Path

          component = Path("firmware/esphome_rc/components/greenhouse_pairing_client")
          lab = Path("firmware/esphome_rc/components/greenhouse_pairing_persistence_lab")
          sources = [
              component / "pairing_persistence_backend.h",
              component / "pairing_persistence_backend.cpp",
              component / "pairing_persistence_crypto.h",
              component / "pairing_persistence_crypto.cpp",
              component / "pairing_credential_codec.h",
              component / "pairing_credential_codec.cpp",
              component / "pairing_persistent_store.h",
              component / "pairing_persistent_store.cpp",
              component / "tests/pairing_stage2d1_persistent_store_fault_matrix_20260721_v49.cpp",
              *[path for path in lab.rglob("*") if path.is_file()],
          ]
          encoded = "\n".join(
              path.read_text(encoding="utf-8", errors="replace")
              for path in sources
          )

          forbidden = (
              "nvs_flash_erase",
              "nvs_erase_all",
              "nvs_erase_partition",
              "esp_efuse_write",
              "esp_efuse_batch_write",
              "set_username(",
              "set_password(",
              "greenhouse_mqtt_auth",
              "/opt/greenhouse-h3-n2-acceptance",
          )
          present = [value for value in forbidden if value in encoded]
          if present:
              raise SystemExit(f"Stage 2D-1 boundary violation: {present}")

          required = (
              "nvs_set_blob",
              "nvs_commit",
              "esp_hmac_calculate",
              "mbedtls_chachapoly",
              "mbedtls_md_hmac",
              "gh-persist-encryption-v1",
              "gh-persist-digest-v1",
              "slot_a",
              "slot_b",
              "active",
              "ACTIVE_WITH_COMMITTED_ORPHAN",
              "ACTIVE_WITH_INVALID_INACTIVE",
              "NO_ACTIVE_COMMITTED_ORPHAN",
              "Automatic NVS access at boot: NO",
              "NVS writes at boot: NO",
              "Production MQTT mutation: NO",
              "NVS_READONLY",
              "PersistenceOpenMode::READ_ONLY",
              "namespace_missing",
              "ESP_ERR_NVS_NOT_FOUND",
              "Missing read-only namespace: EMPTY",
              "stage2d1 persistent store fault matrix passed",
          )
          missing = [value for value in required if value not in encoded]
          if missing:
              raise SystemExit(f"Stage 2D-1 source evidence missing: {missing}")

          store = (component / "pairing_persistent_store.cpp").read_text(
              encoding="utf-8"
          )
          committed = store.find(
              "CredentialRecordState::COMMITTED, candidate"
          )
          marker = store.find(
              "write_marker_(recovery.candidate_slot"
          )
          if committed < 0 or marker < 0 or committed >= marker:
              raise SystemExit("active marker is not written after committed candidate")

          lab_python = (lab / "__init__.py").read_text(encoding="utf-8")
          if 'include_builtin_idf_component("mdns")' in lab_python:
              raise SystemExit("managed mDNS was incorrectly treated as a built-in IDF component")

          lab_cpp = (lab / "greenhouse_pairing_persistence_lab.cpp").read_text(
              encoding="utf-8"
          )
          setup = lab_cpp.split(
              "void GreenhousePairingPersistenceLab::setup()", 1
          )[1].split(
              "void GreenhousePairingPersistenceLab::dump_config()", 1
          )[0]
          if "->open" in setup or "recover_for_lab()" in setup:
              raise SystemExit("Stage 2D-1 lab accesses NVS automatically at boot")
          recovery_probe = lab_cpp.split(
              "bool GreenhousePairingPersistenceLab::recover_for_lab()", 1
          )[1].split(
              "const char *GreenhousePairingPersistenceLab::recovery_status_name()", 1
          )[0]
          if (
              "PersistenceOpenMode::READ_ONLY" not in recovery_probe
              or "PersistenceOpenMode::READ_WRITE" in recovery_probe
          ):
              raise SystemExit("manual persistence recovery probe is not read-only")

          minimal = Path(
              "firmware/esphome_rc/board_lab/h3_node_pairing_persistence/greenhouse_pairing_persistence_board_lab_20260721_v49.yml"
          )
          product = Path(
              "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_node_pairing_persistence_board_lab_20260721_v49.yml"
          )
          core = Path("firmware/esphome_rc/f1_0_rc2/packages/core.yml")
          for target in (minimal, product):
              text = target.read_text(encoding="utf-8")
              if "on_boot:" in text:
                  raise SystemExit(f"Stage 2D-1 target has an automatic boot action: {target}")
              if "recover_for_lab();" not in text:
                  raise SystemExit(f"manual read-only recovery trigger missing: {target}")
              for dependency in ("nvs_flash", "esp_hw_support"):
                  if "include_builtin_idf_components:" not in text or f"- {dependency}" not in text:
                      raise SystemExit(
                          f"explicit IDF dependency {dependency} missing: {target}"
                      )

          minimal_text = minimal.read_text(encoding="utf-8")
          if (
              "wifi:" not in minimal_text
              or "enable_on_boot: false" not in minimal_text
              or "mdns:" not in minimal_text
          ):
              raise SystemExit("minimal target does not configure disabled Wi-Fi and managed mDNS")
          core_text = core.read_text(encoding="utf-8")
          if "wifi:" not in core_text or "mdns:" not in core_text:
              raise SystemExit("RC2 core package does not provide Wi-Fi and managed mDNS")
          PY

  esp32-c6-compile:
    needs: host-fault-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned ESPHome
        run: python -m pip install -q "esphome==2026.4.3"
      - name: Create ephemeral disabled Wi-Fi secrets
        run: |
          python - <<'PY'
          import secrets
          from pathlib import Path

          ssid = "ci-stage2d1-" + secrets.token_hex(4)
          password = secrets.token_urlsafe(24)
          target = Path(
              "firmware/esphome_rc/board_lab/h3_node_pairing_persistence/secrets.yaml"
          )
          target.write_text(
              "\n".join((
                  f'node_pairing_wifi_ssid: "{ssid}"',
                  f'node_pairing_wifi_password: "{password}"',
                  "",
              )),
              encoding="utf-8",
          )
          Path("/tmp/stage2d1-ephemeral-values-v49").write_text(
              ssid + "\n" + password + "\n",
              encoding="utf-8",
          )
          PY
      - name: Compile minimal ESP32-C6 persistence target
        shell: bash
        run: |
          set -o pipefail
          cd firmware/esphome_rc/board_lab/h3_node_pairing_persistence
          esphome config greenhouse_pairing_persistence_board_lab_20260721_v49.yml 2>&1 | tee /tmp/stage2d1-minimal-config-v49.log
          esphome compile greenhouse_pairing_persistence_board_lab_20260721_v49.yml 2>&1 | tee /tmp/stage2d1-minimal-compile-v49.log
      - name: Compile full RC2 product-board persistence target
        shell: bash
        run: |
          set -o pipefail
          cd firmware/esphome_rc/f1_0_rc2
          RC2_CONFIG=f1_0_rc2_h3_node_pairing_persistence_board_lab_20260721_v49.yml bash tools/rc2.sh config 2>&1 | tee /tmp/stage2d1-product-config-v49.log
          RC2_CONFIG=f1_0_rc2_h3_node_pairing_persistence_board_lab_20260721_v49.yml bash tools/rc2.sh compile 2>&1 | tee /tmp/stage2d1-product-compile-v49.log
      - name: Verify compile evidence and secret redaction
        run: |
          python - <<'PY'
          from pathlib import Path

          values = Path("/tmp/stage2d1-ephemeral-values-v49").read_text(
              encoding="utf-8"
          ).splitlines()
          logs = "\n".join(
              Path(path).read_text(encoding="utf-8", errors="replace")
              for path in (
                  "/tmp/stage2d1-minimal-config-v49.log",
                  "/tmp/stage2d1-minimal-compile-v49.log",
                  "/tmp/stage2d1-product-config-v49.log",
                  "/tmp/stage2d1-product-compile-v49.log",
              )
          )
          if any(value and value in logs for value in values):
              raise SystemExit("ephemeral Stage 2D-1 Wi-Fi value appeared in ESPHome output")
          evidence = (
              "pairing_persistence_backend.cpp.o",
              "pairing_persistence_crypto.cpp.o",
              "pairing_credential_codec.cpp.o",
              "pairing_persistent_store.cpp.o",
              "greenhouse_pairing_persistence_lab.cpp.o",
              "INFO Successfully compiled program.",
          )
          missing = [item for item in evidence if logs.count(item) < 2]
          if missing:
              raise SystemExit(f"Stage 2D-1 compile evidence missing: {missing}")
          PY
      - name: Build redacted failure diagnostic
        if: failure()
        run: |
          python - <<'PY'
          from pathlib import Path

          values_path = Path("/tmp/stage2d1-ephemeral-values-v49")
          values = (
              values_path.read_text(encoding="utf-8").splitlines()
              if values_path.exists()
              else []
          )
          sections = []
          for source in (
              "/tmp/stage2d1-minimal-config-v49.log",
              "/tmp/stage2d1-minimal-compile-v49.log",
              "/tmp/stage2d1-product-config-v49.log",
              "/tmp/stage2d1-product-compile-v49.log",
          ):
              path = Path(source)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8", errors="replace")
              for value in values:
                  if value:
                      text = text.replace(value, "<REDACTED_EPHEMERAL_VALUE>")
              sections.append(f"===== {path.name} =====\n{text}")
          Path("/tmp/stage2d1-redacted-failure-v49.log").write_text(
              "\n".join(sections) or "No compile log was created.\n",
              encoding="utf-8",
          )
          PY
      - name: Upload redacted failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d1-redacted-failure-v49
          path: /tmp/stage2d1-redacted-failure-v49.log
          if-no-files-found: error
          retention-days: 7
      - name: Cleanup Stage 2D-1 files
        if: always()
        run: |
          rm -f \
            firmware/esphome_rc/board_lab/h3_node_pairing_persistence/secrets.yaml \
            /tmp/stage2d1-ephemeral-values-v49 \
            /tmp/stage2d1-redacted-failure-v49.log \
            /tmp/stage2d1-minimal-config-v49.log \
            /tmp/stage2d1-minimal-compile-v49.log \
            /tmp/stage2d1-product-config-v49.log \
            /tmp/stage2d1-product-compile-v49.log
