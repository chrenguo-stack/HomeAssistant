name: H3 N2 Stage2D10 G4 Command CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-command-ci.yml"
      - "tools/h3_n2_stage2d10_g4_command_protocol_20260723_v1.py"
      - "tests/h3_n2_stage2d10_activate/test_stage2d10_g4_command_protocol_20260723_v1.py"
  push:
    branches:
      - main
      - feature/h3-n2-stage2d10-g4-activate-profile-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-command-ci.yml"
      - "tools/h3_n2_stage2d10_g4_command_protocol_20260723_v1.py"
      - "tests/h3_n2_stage2d10_activate/test_stage2d10_g4_command_protocol_20260723_v1.py"

permissions:
  contents: read

jobs:
  command-fault-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile command parser and tests
        run: |
          python -m py_compile \
            tools/h3_n2_stage2d10_g4_command_protocol_20260723_v1.py \
            tests/h3_n2_stage2d10_activate/test_stage2d10_g4_command_protocol_20260723_v1.py
      - name: Run command protocol fault matrix
        run: |
          set -euo pipefail
          python tests/h3_n2_stage2d10_activate/test_stage2d10_g4_command_protocol_20260723_v1.py \
            -v 2>&1 | tee /tmp/stage2d10-g4-command-v1.log
          grep -F 'Ran 9 tests' /tmp/stage2d10-g4-command-v1.log
          grep -F 'OK' /tmp/stage2d10-g4-command-v1.log
      - name: Verify parser exposes no PREPARE or CLEANUP command
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          source = Path(
              "tools/h3_n2_stage2d10_g4_command_protocol_20260723_v1.py"
          ).read_text(encoding="utf-8")
          assert 'ACTIVATE_SCHEMA = "GH2D10_ACTIVATE_V1"' in source
          assert 'VERIFY_SCHEMA = "GH2D10_VERIFY_ACTIVE_V1"' in source
          assert "GH2D10_PREPARE" not in source
          assert "GH2D10_CLEANUP" not in source
          assert '"secret_values_included": False' in source
          assert "hmac.compare_digest" in source
          PY
      - name: Verify command output remains redacted
        run: |
          set -euo pipefail
          if grep -Eqi \
              'stage2d10-private-password|1111111111111111|2222222222222222|BEGIN CERTIFICATE' \
              /tmp/stage2d10-g4-command-v1.log; then
            echo 'private command material leaked to test output' >&2
            exit 1
          fi
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d10-g4-command-v1.log
