name: H3 N2 Stage2D10 G4 Command Diagnostic CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-command-diagnostic-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation/stage2d10_g4_command_codec.*"
      - "tests/h3_n2_stage2d10_activate/stage2d10_g4_command_codec_fault_matrix_20260723_v1.cpp"
  push:
    branches:
      - feature/h3-n2-stage2d10-g4-activate-profile-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-command-diagnostic-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation/stage2d10_g4_command_codec.*"
      - "tests/h3_n2_stage2d10_activate/stage2d10_g4_command_codec_fault_matrix_20260723_v1.cpp"

permissions:
  contents: read

jobs:
  concise-command-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Compile C++ codec with concise output
        run: |
          set -euo pipefail
          pairing=firmware/esphome_rc/components/greenhouse_pairing_client
          g4=firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation
          test=tests/h3_n2_stage2d10_activate/stage2d10_g4_command_codec_fault_matrix_20260723_v1.cpp
          if ! g++ -std=gnu++20 -Wall -Wextra -Wpedantic -Werror \
            -I "$pairing" -I "$g4" \
            "$pairing/secure_pairing_channel_encoding.cpp" \
            "$g4/stage2d10_g4_command_codec.cpp" \
            "$test" -lcrypto \
            -o /tmp/stage2d10-g4-command-diagnostic-v1 \
            > /tmp/stage2d10-g4-command-compile-diagnostic-v1.log 2>&1; then
            echo 'STAGE2D10_G4_COMMAND_COMPILE=FAIL'
            grep -E 'fatal error:|error:|undefined reference|collect2:' \
              /tmp/stage2d10-g4-command-compile-diagnostic-v1.log \
              | tail -n 120 || \
              tail -n 120 /tmp/stage2d10-g4-command-compile-diagnostic-v1.log
            exit 1
          fi
          echo 'STAGE2D10_G4_COMMAND_COMPILE=PASS'
      - name: Run C++ codec with concise output
        run: |
          set -euo pipefail
          if ! /tmp/stage2d10-g4-command-diagnostic-v1 \
              > /tmp/stage2d10-g4-command-run-diagnostic-v1.log 2>&1; then
            echo 'STAGE2D10_G4_COMMAND_RUN=FAIL'
            tail -n 120 /tmp/stage2d10-g4-command-run-diagnostic-v1.log
            exit 1
          fi
          cat /tmp/stage2d10-g4-command-run-diagnostic-v1.log
          grep -Fx 'stage2d10_g4_command_codec_fault_matrix=pass' \
            /tmp/stage2d10-g4-command-run-diagnostic-v1.log
          echo 'STAGE2D10_G4_COMMAND_RUN=PASS'
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d10-g4-command-diagnostic-v1
          path: |
            /tmp/stage2d10-g4-command-compile-diagnostic-v1.log
            /tmp/stage2d10-g4-command-run-diagnostic-v1.log
          if-no-files-found: warn
          retention-days: 1
      - name: Cleanup
        if: always()
        run: |
          rm -f \
            /tmp/stage2d10-g4-command-diagnostic-v1 \
            /tmp/stage2d10-g4-command-compile-diagnostic-v1.log \
            /tmp/stage2d10-g4-command-run-diagnostic-v1.log
