name: H3 N2 Stage2D10 G4 Execution Diagnostic CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-execution-diagnostic-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation/stage2d10_g4_execution_controller.*"
      - "tests/h3_n2_stage2d10_activate/stage2d10_g4_execution_controller_fault_matrix*"
  push:
    branches:
      - feature/h3-n2-stage2d10-g4-activate-profile-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d10-g4-execution-diagnostic-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation/stage2d10_g4_execution_controller.*"
      - "tests/h3_n2_stage2d10_activate/stage2d10_g4_execution_controller_fault_matrix*"

permissions:
  contents: read

jobs:
  concise-execution-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Compile execution matrix with concise output
        run: |
          set -euo pipefail
          pairing=firmware/esphome_rc/components/greenhouse_pairing_client
          package=firmware/esphome_rc/components/greenhouse_profile_isolated_acceptance
          driver=firmware/esphome_rc/components/greenhouse_profile_isolated_device_driver
          g4=firmware/esphome_rc/components/greenhouse_profile_isolated_device_g4_activation
          tests=tests/h3_n2_stage2d10_activate
          test=$tests/stage2d10_g4_execution_controller_fault_matrix_runner_20260723_v2.cpp
          if ! g++ -std=gnu++20 -Wall -Wextra -Wpedantic -Werror \
            -I "$pairing" -I "$package" -I "$driver" -I "$g4" -I "$tests" \
            "$pairing/pairing_client_core.cpp" \
            "$pairing/secure_pairing_channel.cpp" \
            "$pairing/secure_pairing_channel_encoding.cpp" \
            "$pairing/secure_pairing_channel_crypto.cpp" \
            "$pairing/pairing_ram_credentials.cpp" \
            "$package/isolated_acceptance_package.cpp" \
            "$driver/isolated_device_driver.cpp" \
            "$g4/stage2d10_g4_activation_coordinator.cpp" \
            "$g4/stage2d10_g4_command_codec.cpp" \
            "$g4/stage2d10_g4_execution_controller.cpp" \
            "$test" -lcrypto \
            -o /tmp/stage2d10-g4-execution-diagnostic-v1 \
            > /tmp/stage2d10-g4-execution-compile-diagnostic-v1.log 2>&1; then
            echo 'STAGE2D10_G4_EXECUTION_COMPILE=FAIL'
            grep -E 'fatal error:|error:|undefined reference|collect2:' \
              /tmp/stage2d10-g4-execution-compile-diagnostic-v1.log \
              | tail -n 160 || \
              tail -n 160 /tmp/stage2d10-g4-execution-compile-diagnostic-v1.log
            exit 1
          fi
          echo 'STAGE2D10_G4_EXECUTION_COMPILE=PASS'
      - name: Run execution matrix with concise output
        run: |
          set -euo pipefail
          if ! /tmp/stage2d10-g4-execution-diagnostic-v1 \
              > /tmp/stage2d10-g4-execution-run-diagnostic-v1.log 2>&1; then
            echo 'STAGE2D10_G4_EXECUTION_RUN=FAIL'
            tail -n 160 /tmp/stage2d10-g4-execution-run-diagnostic-v1.log
            exit 1
          fi
          cat /tmp/stage2d10-g4-execution-run-diagnostic-v1.log
          grep -Fx 'stage2d10_g4_execution_controller_fault_matrix=pass' \
            /tmp/stage2d10-g4-execution-run-diagnostic-v1.log
          echo 'STAGE2D10_G4_EXECUTION_RUN=PASS'
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d10-g4-execution-diagnostic-v1
          path: |
            /tmp/stage2d10-g4-execution-compile-diagnostic-v1.log
            /tmp/stage2d10-g4-execution-run-diagnostic-v1.log
          if-no-files-found: warn
          retention-days: 1
      - name: Cleanup
        if: always()
        run: |
          rm -f \
            /tmp/stage2d10-g4-execution-diagnostic-v1 \
            /tmp/stage2d10-g4-execution-compile-diagnostic-v1.log \
            /tmp/stage2d10-g4-execution-run-diagnostic-v1.log
