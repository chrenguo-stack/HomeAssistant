name: H3 N2 Stage2D5 Production Adapters CI

on:
  pull_request:
    paths:
      - "firmware/esphome_rc/components/greenhouse_profile_production_adapters/**"
      - "firmware/esphome_rc/board_lab/h3_profile_production_adapters/**"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_profile_production_adapters_board_lab_20260721_v53.yml"
      - "protocols/pairing/gh-h3-node-production-profile-adapters-v1.md"
      - "docs/development/h3-n2-stage2d5-production-adapters-20260721.md"
      - "tools/h3_n2_stage2d5_production_adapters_boundary_gate_20260721_v53.py"
      - ".github/workflows/h3-n2-stage2d5-production-adapters-ci.yml"
  push:
    branches: [main]
    paths:
      - "firmware/esphome_rc/components/greenhouse_profile_production_adapters/**"
      - "firmware/esphome_rc/board_lab/h3_profile_production_adapters/**"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_profile_production_adapters_board_lab_20260721_v53.yml"
      - "protocols/pairing/gh-h3-node-production-profile-adapters-v1.md"
      - "docs/development/h3-n2-stage2d5-production-adapters-20260721.md"
      - "tools/h3_n2_stage2d5_production_adapters_boundary_gate_20260721_v53.py"
      - ".github/workflows/h3-n2-stage2d5-production-adapters-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  host-fault-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 16
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - name: Compile Stage 2D-5 production adapter fault matrix
        run: |
          set -euo pipefail
          component=firmware/esphome_rc/components/greenhouse_pairing_client
          adapter=firmware/esphome_rc/components/greenhouse_profile_production_adapters
          g++ -std=gnu++20 -Wall -Wextra -Wpedantic -Werror \
            -I "$component" \
            -I "$adapter" \
            "$component/pairing_client_core.cpp" \
            "$component/pairing_transport_core.cpp" \
            "$component/secure_pairing_channel.cpp" \
            "$component/secure_pairing_channel_encoding.cpp" \
            "$component/secure_pairing_channel_crypto.cpp" \
            "$component/pairing_ram_credentials.cpp" \
            "$component/pairing_persistence_backend.cpp" \
            "$component/pairing_persistence_crypto.cpp" \
            "$component/pairing_credential_codec.cpp" \
            "$component/pairing_persistent_store.cpp" \
            "$component/pairing_mqtt_activation_contract.cpp" \
            "$component/pairing_candidate_mqtt_validator.cpp" \
            "$component/pairing_profile_activation_coordinator.cpp" \
            "$component/pairing_profile_lifecycle_integration.cpp" \
            "$adapter/profile_production_adapters.cpp" \
            "$adapter/tests/pairing_stage2d5_production_adapters_fault_matrix_20260721_v53.cpp" \
            -lcrypto \
            -o /tmp/stage2d5-production-adapters-fault-matrix-v53
      - name: Run Stage 2D-5 production adapter fault matrix
        run: /tmp/stage2d5-production-adapters-fault-matrix-v53
      - name: Verify Stage 2D-5 source and execution boundaries
        run: python tools/h3_n2_stage2d5_production_adapters_boundary_gate_20260721_v53.py
      - name: Upload Stage 2D-5 boundary diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d5-production-adapters-boundary-v53
          path: /tmp/stage2d5-production-adapters-boundary-v53.txt
          if-no-files-found: ignore
          retention-days: 7
      - name: Cleanup host files
        if: always()
        run: |
          rm -f \
            /tmp/stage2d5-production-adapters-fault-matrix-v53 \
            /tmp/stage2d5-production-adapters-boundary-v53.txt

  esp32-c6-compile:
    needs: host-fault-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 36
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned ESPHome
        run: python -m pip install -q "esphome==2026.4.3"
      - name: Create ephemeral disabled Wi-Fi secrets
        run: |
          python - <<'PY'
          import secrets
          from pathlib import Path

          ssid = "ci-stage2d5-" + secrets.token_hex(4)
          password = secrets.token_urlsafe(24)
          target = Path(
              "firmware/esphome_rc/board_lab/h3_profile_production_adapters/secrets.yaml"
          )
          target.write_text(
              "\n".join((
                  f'node_pairing_wifi_ssid: "{ssid}"',
                  f'node_pairing_wifi_password: "{password}"',
                  "",
              )),
              encoding="utf-8",
          )
          Path("/tmp/stage2d5-ephemeral-values-v53").write_text(
              ssid + "\n" + password + "\n",
              encoding="utf-8",
          )
          PY
      - name: Compile minimal ESP32-C6 production adapter target
        shell: bash
        run: |
          set -o pipefail
          cd firmware/esphome_rc/board_lab/h3_profile_production_adapters
          esphome config greenhouse_profile_production_adapters_board_lab_20260721_v53.yml 2>&1 | tee /tmp/stage2d5-minimal-config-v53.log
          esphome compile greenhouse_profile_production_adapters_board_lab_20260721_v53.yml 2>&1 | tee /tmp/stage2d5-minimal-compile-v53.log
      - name: Compile full RC2 product-board production adapter target
        shell: bash
        run: |
          set -o pipefail
          cd firmware/esphome_rc/f1_0_rc2
          RC2_CONFIG=f1_0_rc2_h3_profile_production_adapters_board_lab_20260721_v53.yml bash tools/rc2.sh config 2>&1 | tee /tmp/stage2d5-product-config-v53.log
          RC2_CONFIG=f1_0_rc2_h3_profile_production_adapters_board_lab_20260721_v53.yml bash tools/rc2.sh compile 2>&1 | tee /tmp/stage2d5-product-compile-v53.log
      - name: Verify compile evidence and secret redaction
        run: |
          python - <<'PY'
          from pathlib import Path

          values = Path("/tmp/stage2d5-ephemeral-values-v53").read_text(
              encoding="utf-8"
          ).splitlines()
          logs = "\n".join(
              Path(path).read_text(encoding="utf-8", errors="replace")
              for path in (
                  "/tmp/stage2d5-minimal-config-v53.log",
                  "/tmp/stage2d5-minimal-compile-v53.log",
                  "/tmp/stage2d5-product-config-v53.log",
                  "/tmp/stage2d5-product-compile-v53.log",
              )
          )
          if any(value and value in logs for value in values):
              raise SystemExit("ephemeral Stage 2D-5 Wi-Fi value appeared in output")
          evidence = (
              "profile_production_adapters.cpp.o",
              "INFO Successfully compiled program.",
          )
          missing = [item for item in evidence if logs.count(item) < 2]
          if missing:
              raise SystemExit(f"Stage 2D-5 compile evidence missing: {missing}")
          forbidden = (
              "BEGIN CERTIFICATE",
              "broker.greenhouse.local",
              "192.168.",
              "ghs_",
              "pairing_secret",
          )
          leaked = [item for item in forbidden if item in logs]
          if leaked:
              raise SystemExit(f"Stage 2D-5 credential-like output present: {leaked}")
          PY
      - name: Build redacted failure diagnostic
        if: failure()
        run: |
          python - <<'PY'
          from pathlib import Path

          values_path = Path("/tmp/stage2d5-ephemeral-values-v53")
          values = (
              values_path.read_text(encoding="utf-8").splitlines()
              if values_path.exists()
              else []
          )
          sections = []
          for source in (
              "/tmp/stage2d5-minimal-config-v53.log",
              "/tmp/stage2d5-minimal-compile-v53.log",
              "/tmp/stage2d5-product-config-v53.log",
              "/tmp/stage2d5-product-compile-v53.log",
          ):
              path = Path(source)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8", errors="replace")
              for value in values:
                  if value:
                      text = text.replace(value, "<REDACTED_EPHEMERAL_VALUE>")
              sections.append(f"===== {path.name} =====\n{text}")
          Path("/tmp/stage2d5-redacted-failure-v53.log").write_text(
              "\n".join(sections) or "No compile log was created.\n",
              encoding="utf-8",
          )
          PY
      - name: Upload redacted failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d5-redacted-failure-v53
          path: /tmp/stage2d5-redacted-failure-v53.log
          if-no-files-found: error
          retention-days: 7
      - name: Cleanup Stage 2D-5 files
        if: always()
        run: |
          rm -f \
            firmware/esphome_rc/board_lab/h3_profile_production_adapters/secrets.yaml \
            /tmp/stage2d5-ephemeral-values-v53 \
            /tmp/stage2d5-redacted-failure-v53.log \
            /tmp/stage2d5-minimal-config-v53.log \
            /tmp/stage2d5-minimal-compile-v53.log \
            /tmp/stage2d5-product-config-v53.log \
            /tmp/stage2d5-product-compile-v53.log
