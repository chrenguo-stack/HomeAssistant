name: H3 N2 Stage2D8 Dedicated Board G2 V63 CI

on:
  pull_request:
    paths:
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g2_probe/**"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_driver/**"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe/**"
      - "docs/development/h3-n2-dedicated-board-stage2d8-*.md"
      - "tools/h3_n2_stage2d8_g2_*_20260722_v63.py"
      - "tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v63.txt"
      - ".github/workflows/h3-n2-stage2d8-dedicated-board-g2-v63-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-locked-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned build tools
        run: |
          set -euo pipefail
          python -m pip install -q "esphome==2026.4.3"
          python -m venv /tmp/stage2d8-esptool-v63
          /tmp/stage2d8-esptool-v63/bin/python -m pip install -q --upgrade pip
          /tmp/stage2d8-esptool-v63/bin/python -m pip install -q "esptool==5.3.1"
          esphome version
          /tmp/stage2d8-esptool-v63/bin/python -m esptool version

      - name: Verify G2 source boundary
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d8_g2_boundary_gate_20260722_v63.py \
            --repo-root . \
            --output /tmp/stage2d8-g2-source-boundary-v63.json \
            2>&1 | tee /tmp/stage2d8-g2-boundary-v63.log

      - name: Compile G2 read-only image
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
        run: |
          set -o pipefail
          esphome config greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml \
            2>&1 | tee /tmp/stage2d8-g2-config-v63.log
          esphome compile greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml \
            2>&1 | tee /tmp/stage2d8-g2-compile-v63.log

      - name: Compile locked recovery image
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
        run: |
          set -o pipefail
          esphome config greenhouse_stage2d8_locked_recovery_20260722_v60.yml \
            2>&1 | tee /tmp/stage2d8-recovery-config-v63.log
          esphome compile greenhouse_stage2d8_locked_recovery_20260722_v60.yml \
            2>&1 | tee /tmp/stage2d8-recovery-compile-v63.log

      - name: Install hash-pinned NVS generator into pinned IDF environment
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-nvsgen-install-v63.log) 2>&1
          IDF_PYTHON="$HOME/.platformio/penv/.espidf-5.5.4/bin/python"
          REQUIREMENTS=tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v63.txt
          test -x "$IDF_PYTHON"
          test -f "$REQUIREMENTS"
          "$IDF_PYTHON" -m pip install \
            --disable-pip-version-check \
            --no-deps \
            --require-hashes \
            --requirement "$REQUIREMENTS"
          "$IDF_PYTHON" - <<'PY' > /tmp/stage2d8-nvsgen-runtime-v63.json
          import importlib.metadata
          import json
          import platform

          generator = importlib.metadata.version("esp-idf-nvs-partition-gen")
          cryptography = importlib.metadata.version("cryptography")
          assert generator == "0.2.0", generator
          print(json.dumps({
              "generator_version": generator,
              "wheel_sha256": "7e128c81441fa406fe55b95f29a7d901098bcffc8cc464f993fdbecd074eb9a3",
              "cryptography_version": cryptography,
              "python_version": platform.python_version(),
          }, indent=2, sort_keys=True))
          PY
          "$IDF_PYTHON" -m esp_idf_nvs_partition_gen --help >/dev/null
          cat /tmp/stage2d8-nvsgen-runtime-v63.json

      - name: Generate deterministic preseeded NVS image twice
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-seed-v63.log) 2>&1
          ROOT=firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
          IDF_PYTHON="$HOME/.platformio/penv/.espidf-5.5.4/bin/python"
          for suffix in a b; do
            "$IDF_PYTHON" -m esp_idf_nvs_partition_gen generate \
              "$ROOT/stage2d8_g2_nvs_seed_20260722_v61.csv" \
              "/tmp/stage2d8-g2-nvs-seed-v63-${suffix}.bin" \
              0x10000
          done
          test "$(stat -c %s /tmp/stage2d8-g2-nvs-seed-v63-a.bin)" = 65536
          test "$(stat -c %s /tmp/stage2d8-g2-nvs-seed-v63-b.bin)" = 65536
          cmp /tmp/stage2d8-g2-nvs-seed-v63-a.bin \
              /tmp/stage2d8-g2-nvs-seed-v63-b.bin
          strings /tmp/stage2d8-g2-nvs-seed-v63-a.bin | grep -F 'gh2d8_seed'
          if strings /tmp/stage2d8-g2-nvs-seed-v63-a.bin | grep -F 'gh2d8_state'; then
            echo 'target namespace unexpectedly present in seed image' >&2
            exit 1
          fi
          sha256sum /tmp/stage2d8-g2-nvs-seed-v63-a.bin

      - name: Run host fault matrix
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d8_g2_host_fault_matrix_20260722_v63.py \
            --packager tools/h3_n2_stage2d8_g2_artifact_packager_20260722_v63.py \
            --output /tmp/stage2d8-g2-host-fault-matrix-v63.json \
            2>&1 | tee /tmp/stage2d8-g2-host-fault-matrix-v63.log

      - name: Assemble immutable G2 and recovery packages
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-package-v63.log) 2>&1
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          python tools/h3_n2_stage2d8_g2_artifact_packager_20260722_v63.py \
            --repo-root . \
            --output /tmp/stage2d8-g2-immutable-v63 \
            --source-commit "$SOURCE_COMMIT" \
            --esptool-python /tmp/stage2d8-esptool-v63/bin/python \
            --seed-image /tmp/stage2d8-g2-nvs-seed-v63-a.bin \
            --boundary-report /tmp/stage2d8-g2-source-boundary-v63.json \
            --fault-report /tmp/stage2d8-g2-host-fault-matrix-v63.json \
            --nvsgen-runtime-report /tmp/stage2d8-nvsgen-runtime-v63.json \
            --nvsgen-requirements tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v63.txt

      - name: Verify packaged images and locked manifest
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-verify-v63.log) 2>&1
          OUT=/tmp/stage2d8-g2-immutable-v63
          MANIFEST="$OUT/stage2d8-g2-artifact-manifest-v63.json"
          grep -F '"gate": "LOCKED"' "$MANIFEST"
          grep -F '"source_commit": "'"$SOURCE_COMMIT"'"' "$MANIFEST"
          grep -F '"test_partition_readonly": true' "$MANIFEST"
          grep -F '"flash_authorized": false' "$MANIFEST"
          grep -F '"read_only_probe_authorized": false' "$MANIFEST"
          grep -F '"persistent_write_authorized": false' "$MANIFEST"
          grep -F '"case_count": 8' "$OUT/stage2d8-g2-host-fault-matrix-v63.json"
          test "$(stat -c %s "$OUT/g2/gh2d8_nvs_seed.bin")" = 65536
          cmp "$OUT/g2/gh2d8_nvs_seed.bin" "$OUT/recovery/gh2d8_nvs_seed.bin"
          if grep -aERi '98:a3:16|usbmodem' "$OUT"; then
            echo 'private board identifier detected in artifact' >&2
            exit 1
          fi
          (cd "$OUT" && sha256sum --check SHA256SUMS)

      - name: Upload immutable locked artifact package
        uses: actions/upload-artifact@v4
        with:
          name: stage2d8-g2-immutable-locked-v63
          path: /tmp/stage2d8-g2-immutable-v63
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Build G2 failure diagnostic
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p /tmp/stage2d8-g2-diagnostic-v63
          for source in \
            /tmp/stage2d8-g2-boundary-v63.log \
            /tmp/stage2d8-g2-source-boundary-v63.json \
            /tmp/stage2d8-g2-config-v63.log \
            /tmp/stage2d8-g2-compile-v63.log \
            /tmp/stage2d8-recovery-config-v63.log \
            /tmp/stage2d8-recovery-compile-v63.log \
            /tmp/stage2d8-nvsgen-install-v63.log \
            /tmp/stage2d8-nvsgen-runtime-v63.json \
            /tmp/stage2d8-g2-seed-v63.log \
            /tmp/stage2d8-g2-host-fault-matrix-v63.log \
            /tmp/stage2d8-g2-host-fault-matrix-v63.json \
            /tmp/stage2d8-g2-package-v63.log \
            /tmp/stage2d8-g2-verify-v63.log; do
            if [ -f "$source" ]; then
              cp "$source" /tmp/stage2d8-g2-diagnostic-v63/
            fi
          done
          if [ -d /tmp/stage2d8-g2-immutable-v63 ]; then
            find /tmp/stage2d8-g2-immutable-v63 -maxdepth 2 -type f \
              -printf '%P %s bytes\n' | sort \
              > /tmp/stage2d8-g2-diagnostic-v63/package-inventory.txt
          fi
          printf 'head=%s\n' "$GITHUB_SHA" \
            > /tmp/stage2d8-g2-diagnostic-v63/context.txt

      - name: Upload G2 failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d8-g2-diagnostic-v63
          path: /tmp/stage2d8-g2-diagnostic-v63
          if-no-files-found: error
          retention-days: 7
