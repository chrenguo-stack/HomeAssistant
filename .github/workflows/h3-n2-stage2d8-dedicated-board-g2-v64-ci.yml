name: H3 N2 Stage2D8 Dedicated Board G2 V64 CI

on:
  pull_request:
    paths:
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g2_probe/**"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_driver/**"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe/**"
      - "docs/development/h3-n2-dedicated-board-stage2d8-*.md"
      - "tools/h3_n2_stage2d8_*_20260722_v64.py"
      - "tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v64.txt"
      - ".github/workflows/h3-n2-stage2d8-dedicated-board-g2-v64-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-locked-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned build tools
        run: |
          set -euo pipefail
          python -m pip install -q "esphome==2026.4.3"
          python -m venv /tmp/stage2d8-esptool-v64
          /tmp/stage2d8-esptool-v64/bin/python -m pip install -q --upgrade pip
          /tmp/stage2d8-esptool-v64/bin/python -m pip install -q "esptool==5.3.1"
          esphome version
          /tmp/stage2d8-esptool-v64/bin/python -m esptool version

      - name: Verify G2 source boundary
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d8_g2_boundary_gate_20260722_v64.py \
            --repo-root . \
            --output /tmp/stage2d8-g2-source-boundary-v64.json \
            2>&1 | tee /tmp/stage2d8-g2-boundary-v64.log

      - name: Run Stage2D8 driver host fault matrix
        run: |
          set -euo pipefail
          pairing=firmware/esphome_rc/components/greenhouse_pairing_client
          package=firmware/esphome_rc/components/greenhouse_profile_isolated_acceptance
          driver=firmware/esphome_rc/components/greenhouse_profile_isolated_device_driver
          g++ -std=gnu++20 -Wall -Wextra -Wpedantic -Werror \
            -I "$pairing" \
            -I "$package" \
            -I "$driver" \
            "$pairing/pairing_client_core.cpp" \
            "$pairing/secure_pairing_channel.cpp" \
            "$pairing/secure_pairing_channel_encoding.cpp" \
            "$pairing/secure_pairing_channel_crypto.cpp" \
            "$pairing/pairing_ram_credentials.cpp" \
            "$package/isolated_acceptance_package.cpp" \
            "$driver/isolated_device_driver.cpp" \
            "$driver/tests/pairing_stage2d8_isolated_device_driver_fault_matrix_20260721_v56.cpp" \
            -lcrypto \
            -o /tmp/stage2d8-driver-host-fault-matrix-v64
          /tmp/stage2d8-driver-host-fault-matrix-v64 \
            | tee /tmp/stage2d8-driver-host-fault-matrix-v64.log
          grep -Fx 'stage2d8_isolated_device_driver_fault_matrix=pass' \
            /tmp/stage2d8-driver-host-fault-matrix-v64.log

      - name: Compile clean build A with fixed time
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-clean-build-a-v64.log) 2>&1
          WRAPPER="$GITHUB_WORKSPACE/tools/h3_n2_stage2d8_esphome_reproducible_compile_20260722_v64.py"
          rm -rf .esphome/build/gh-2d8-g2-v60 .esphome/build/gh-2d8-recovery-v60
          python "$WRAPPER" config greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml
          python "$WRAPPER" compile greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml
          python "$WRAPPER" config greenhouse_stage2d8_locked_recovery_20260722_v60.yml
          python "$WRAPPER" compile greenhouse_stage2d8_locked_recovery_20260722_v60.yml
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path('.esphome/build')
          out = Path('/tmp/stage2d8-clean-build-a')
          for role, build_name in (
              ('g2', 'gh-2d8-g2-v60'),
              ('recovery', 'gh-2d8-recovery-v60'),
          ):
              role_out = out / role
              role_out.mkdir(parents=True, exist_ok=False)
              build_root = root / build_name
              for filename in ('bootloader.bin', 'partitions.bin', 'firmware.bin'):
                  candidates = sorted(build_root.rglob(filename))
                  if filename == 'firmware.bin':
                      candidates = [p for p in candidates if 'bootloader' not in p.parts]
                  if not candidates:
                      raise SystemExit(f'missing {role}/{filename}')
                  shutil.copy2(candidates[0], role_out / filename)
          PY

      - name: Compile clean build B with fixed time
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-clean-build-b-v64.log) 2>&1
          WRAPPER="$GITHUB_WORKSPACE/tools/h3_n2_stage2d8_esphome_reproducible_compile_20260722_v64.py"
          rm -rf .esphome/build/gh-2d8-g2-v60 .esphome/build/gh-2d8-recovery-v60
          python "$WRAPPER" config greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml
          python "$WRAPPER" compile greenhouse_profile_isolated_device_g2_probe_20260722_v60.yml
          python "$WRAPPER" config greenhouse_stage2d8_locked_recovery_20260722_v60.yml
          python "$WRAPPER" compile greenhouse_stage2d8_locked_recovery_20260722_v60.yml
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path('.esphome/build')
          out = Path('/tmp/stage2d8-clean-build-b')
          for role, build_name in (
              ('g2', 'gh-2d8-g2-v60'),
              ('recovery', 'gh-2d8-recovery-v60'),
          ):
              role_out = out / role
              role_out.mkdir(parents=True, exist_ok=False)
              build_root = root / build_name
              for filename in ('bootloader.bin', 'partitions.bin', 'firmware.bin'):
                  candidates = sorted(build_root.rglob(filename))
                  if filename == 'firmware.bin':
                      candidates = [p for p in candidates if 'bootloader' not in p.parts]
                  if not candidates:
                      raise SystemExit(f'missing {role}/{filename}')
                  shutil.copy2(candidates[0], role_out / filename)
          PY

      - name: Prove clean-build reproducibility
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d8_g2_reproducibility_gate_20260722_v64.py \
            --first-root /tmp/stage2d8-clean-build-a \
            --second-root /tmp/stage2d8-clean-build-b \
            --output /tmp/stage2d8-g2-reproducibility-v64.json \
            2>&1 | tee /tmp/stage2d8-g2-reproducibility-v64.log

      - name: Install hash-pinned NVS generator
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-nvsgen-install-v64.log) 2>&1
          REQUIREMENTS=tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v64.txt
          python -m pip install \
            --disable-pip-version-check \
            --no-deps \
            --require-hashes \
            --requirement "$REQUIREMENTS"
          python - <<'PY' > /tmp/stage2d8-nvsgen-runtime-v64.json
          import importlib.metadata
          import json
          import platform

          generator = importlib.metadata.version('esp-idf-nvs-partition-gen')
          cryptography = importlib.metadata.version('cryptography')
          assert generator == '0.2.0', generator
          print(json.dumps({
              'generator_version': generator,
              'wheel_sha256': '7e128c81441fa406fe55b95f29a7d901098bcffc8cc464f993fdbecd074eb9a3',
              'cryptography_version': cryptography,
              'python_version': platform.python_version(),
          }, indent=2, sort_keys=True))
          PY
          python -m esp_idf_nvs_partition_gen --help >/dev/null
          cat /tmp/stage2d8-nvsgen-runtime-v64.json

      - name: Generate deterministic preseeded NVS image twice
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-seed-v64.log) 2>&1
          ROOT=firmware/esphome_rc/board_lab/h3_profile_isolated_device_g2_probe
          for suffix in a b; do
            python -m esp_idf_nvs_partition_gen generate \
              "$ROOT/stage2d8_g2_nvs_seed_20260722_v61.csv" \
              "/tmp/stage2d8-g2-nvs-seed-v64-${suffix}.bin" \
              0x10000
          done
          test "$(stat -c %s /tmp/stage2d8-g2-nvs-seed-v64-a.bin)" = 65536
          test "$(stat -c %s /tmp/stage2d8-g2-nvs-seed-v64-b.bin)" = 65536
          cmp /tmp/stage2d8-g2-nvs-seed-v64-a.bin \
              /tmp/stage2d8-g2-nvs-seed-v64-b.bin
          strings /tmp/stage2d8-g2-nvs-seed-v64-a.bin | grep -F 'gh2d8_seed'
          if strings /tmp/stage2d8-g2-nvs-seed-v64-a.bin | grep -F 'gh2d8_state'; then
            echo 'target namespace unexpectedly present in seed image' >&2
            exit 1
          fi
          sha256sum /tmp/stage2d8-g2-nvs-seed-v64-a.bin

      - name: Run host artifact fault matrix
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d8_g2_host_fault_matrix_20260722_v64.py \
            --packager tools/h3_n2_stage2d8_g2_artifact_packager_20260722_v64.py \
            --output /tmp/stage2d8-g2-host-fault-matrix-v64.json \
            2>&1 | tee /tmp/stage2d8-g2-host-fault-matrix-v64.log

      - name: Assemble immutable G2 and recovery packages
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-package-v64.log) 2>&1
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          python tools/h3_n2_stage2d8_g2_artifact_packager_20260722_v64.py \
            --repo-root . \
            --output /tmp/stage2d8-g2-immutable-v64 \
            --source-commit "$SOURCE_COMMIT" \
            --esptool-python /tmp/stage2d8-esptool-v64/bin/python \
            --seed-image /tmp/stage2d8-g2-nvs-seed-v64-a.bin \
            --boundary-report /tmp/stage2d8-g2-source-boundary-v64.json \
            --fault-report /tmp/stage2d8-g2-host-fault-matrix-v64.json \
            --reproducibility-report /tmp/stage2d8-g2-reproducibility-v64.json \
            --nvsgen-runtime-report /tmp/stage2d8-nvsgen-runtime-v64.json \
            --nvsgen-requirements tools/h3_n2_stage2d8_nvsgen_requirements_20260722_v64.txt

      - name: Verify packaged images and locked manifest
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d8-g2-verify-v64.log) 2>&1
          OUT=/tmp/stage2d8-g2-immutable-v64
          MANIFEST="$OUT/stage2d8-g2-artifact-manifest-v64.json"
          grep -F '"gate": "LOCKED"' "$MANIFEST"
          grep -F '"source_commit": "'"$SOURCE_COMMIT"'"' "$MANIFEST"
          grep -F '"clean_builds_byte_identical": true' "$MANIFEST"
          grep -F '"fixed_build_epoch": 1784678400' "$MANIFEST"
          grep -F '"test_partition_readonly": true' "$MANIFEST"
          grep -F '"flash_authorized": false' "$MANIFEST"
          grep -F '"read_only_probe_authorized": false' "$MANIFEST"
          grep -F '"persistent_write_authorized": false' "$MANIFEST"
          grep -F '"case_count": 8' "$OUT/stage2d8-g2-host-fault-matrix-v64.json"
          grep -F '"byte_identical": true' "$OUT/stage2d8-g2-reproducibility-v64.json"
          test "$(stat -c %s "$OUT/g2/gh2d8_nvs_seed.bin")" = 65536
          cmp "$OUT/g2/gh2d8_nvs_seed.bin" "$OUT/recovery/gh2d8_nvs_seed.bin"
          if grep -aERi '98:a3:16|usbmodem' "$OUT"; then
            echo 'private board identifier detected in artifact' >&2
            exit 1
          fi
          (cd "$OUT" && sha256sum --check SHA256SUMS)

      - name: Upload immutable locked artifact package
        uses: actions/upload-artifact@v4
        with:
          name: stage2d8-g2-immutable-locked-v64
          path: /tmp/stage2d8-g2-immutable-v64
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Build G2 failure diagnostic
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p /tmp/stage2d8-g2-diagnostic-v64
          for source in \
            /tmp/stage2d8-g2-boundary-v64.log \
            /tmp/stage2d8-g2-source-boundary-v64.json \
            /tmp/stage2d8-driver-host-fault-matrix-v64.log \
            /tmp/stage2d8-clean-build-a-v64.log \
            /tmp/stage2d8-clean-build-b-v64.log \
            /tmp/stage2d8-g2-reproducibility-v64.log \
            /tmp/stage2d8-g2-reproducibility-v64.json \
            /tmp/stage2d8-nvsgen-install-v64.log \
            /tmp/stage2d8-nvsgen-runtime-v64.json \
            /tmp/stage2d8-g2-seed-v64.log \
            /tmp/stage2d8-g2-host-fault-matrix-v64.log \
            /tmp/stage2d8-g2-host-fault-matrix-v64.json \
            /tmp/stage2d8-g2-package-v64.log \
            /tmp/stage2d8-g2-verify-v64.log; do
            if [ -f "$source" ]; then
              cp "$source" /tmp/stage2d8-g2-diagnostic-v64/
            fi
          done
          if [ -d /tmp/stage2d8-g2-immutable-v64 ]; then
            find /tmp/stage2d8-g2-immutable-v64 -maxdepth 2 -type f \
              -printf '%P %s bytes\n' | sort \
              > /tmp/stage2d8-g2-diagnostic-v64/package-inventory.txt
          fi
          printf 'head=%s\n' "$GITHUB_SHA" \
            > /tmp/stage2d8-g2-diagnostic-v64/context.txt

      - name: Upload G2 failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d8-g2-diagnostic-v64
          path: /tmp/stage2d8-g2-diagnostic-v64
          if-no-files-found: error
          retention-days: 7
