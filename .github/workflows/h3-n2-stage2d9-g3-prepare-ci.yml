name: H3 N2 Stage2D9 G3 PREPARE CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9-g3-prepare-ci.yml"
      - "tools/h3_n2_stage2d9_*"
      - "tests/h3_n2_stage2d9_prepare/**"
      - "protocols/pairing/gh-h3-node-stage2d9-g3-prepare-v1.md"
      - "docs/development/*Stage2D9*"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9_G3_20260722.md"
      - "docs/acceptance/h3-n2-stage2d9-g3-*.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/h3-n2-stage2d9-g3-prepare-ci.yml"
      - "tools/h3_n2_stage2d9_*"
      - "tests/h3_n2_stage2d9_prepare/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  host-model-and-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Stage 2D-9 Python files
        run: |
          python -m py_compile \
            tools/h3_n2_stage2d9_prepare_model_20260722_v1.py \
            tools/h3_n2_stage2d9_prepare_manifest_gate_20260722_v1.py \
            tools/h3_n2_stage2d9_prepare_command_protocol_20260722_v1.py \
            tools/h3_n2_stage2d9_esphome_reproducible_compile_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_boundary_gate_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_reproducibility_gate_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_artifact_packager_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_u1_artifact_verify_20260722_v1.py \
            tools/h3_n2_stage2d9_esphome_reproducible_compile_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_boundary_gate_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_reproducibility_gate_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_artifact_packager_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_u1_artifact_verify_20260723_v2.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_prepare_model_20260722_v1.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_prepare_command_protocol_20260722_v1.py
      - name: Run host fault matrices
        run: |
          python -m unittest discover \
            -s tests/h3_n2_stage2d9_prepare \
            -p 'test_stage2d9_prepare_*_20260722_v1.py' \
            -v
      - name: Verify default manifest remains locked
        run: |
          python tools/h3_n2_stage2d9_prepare_manifest_gate_20260722_v1.py \
            --manifest tests/h3_n2_stage2d9_prepare/stage2d9_prepare_manifest_template_20260722_v1.json \
            --expect-gate LOCKED
      - name: Verify passed V68 U1 and exact D2 decision gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def load(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))

          public = load("docs/acceptance/h3-n2-stage2d9-g3-public-manifest-v1.json")
          artifact = load("docs/acceptance/h3-n2-stage2d9-g3-v68-artifact-l1-summary-v1.json")
          u1 = load("docs/acceptance/h3-n2-stage2d9-g3-v68-u1-l1-summary-v1.json")
          request = load("docs/acceptance/h3-n2-stage2d9-g3-v68-d2-attempt1-authorization-request-v1.json")
          acceptance = load("docs/acceptance/h3-n2-stage2d9-g3-acceptance-template-v1.json")
          attempt1 = load("docs/acceptance/h3-n2-stage2d9-g3-d2-attempt1-authorization-request-v1.json")
          attempt2 = load("docs/acceptance/h3-n2-stage2d9-g3-d2-attempt2-authorization-request-v1.json")
          index = load("docs/acceptance/h3-n2-stage2d9-g3-d2-authorization-request-index-v1.json")
          template = load("tests/h3_n2_stage2d9_prepare/stage2d9_prepare_manifest_template_20260722_v1.json")

          request_id = "D2-H3N2-STAGE2D9-G3-V68-20260723-01"
          assert public["status"] == "v68_u1_passed_waiting_exact_d2_operator_decision"
          assert public["execution_gate"] == "LOCKED_D2_OPERATOR_DECISION_REQUIRED"
          assert public["active_d2_request_id"] == request_id
          assert all(value is False for value in public["boundaries"].values())
          assert public["v68_artifact"]["status"] == "passed_frozen"
          assert public["v68_artifact"]["gate"] == "LOCKED"
          assert public["v68_artifact"]["execution_authorized"] is False
          assert public["v68_u1"]["status"] == "passed"
          assert public["v68_u1"]["private_custody_installed"] is True
          assert public["v68_u1"]["private_custody_preserved"] is True
          assert public["v68_private_custody"]["operator_installation_status"] == "installed_and_preserved"
          assert public["d2_review"]["authorization_request_id"] == request_id
          assert public["d2_review"]["status"] == "pending_operator_authorization"
          assert public["d2_review"]["review_self_test"] == "passed"
          assert public["d2_review"]["execution_authorized"] is False
          assert public["d2_review"]["replay_permitted"] is False

          assert artifact["status"] == "frozen_waiting_user_host_u1"
          assert artifact["artifact"]["gate"] == "LOCKED"
          assert artifact["protected_boundaries"]["authorization_issued"] is False
          assert u1["status"] == "passed"
          assert u1["private_custody"]["installed"] is True
          assert u1["private_custody"]["preserved"] is True
          assert u1["private_custody"]["execution_authorized"] is False
          assert all(value is False for value in u1["protected_boundaries"].values())

          assert request["authorization_request_id"] == request_id
          assert request["status"] == "pending_operator_authorization"
          assert request["execution_authorized"] is False
          assert request["authorization_issued"] is False
          assert request["authorization_file_generated"] is False
          assert request["execution_package_generated"] is False
          assert request["one_shot"] is True
          assert request["replay_permitted"] is False
          assert request["review"]["review_self_test"] == "passed"
          assert request["review"]["artifact_in_review_package"] is False
          assert request["review"]["private_execution_material_in_review_package"] is False
          assert request["review"]["authorization_json_in_review_package"] is False
          assert request["private_custody"]["unlock_digest_match_verified"] is True
          assert request["private_custody"]["execution_authorized"] is False

          assert index["active_request_id"] == request_id
          assert index["execution_gate"] == "LOCKED_D2_OPERATOR_DECISION_REQUIRED"
          assert len(index["retired_request_ids"]) == 2
          assert index["requests"][-1]["status"] == "pending_operator_authorization"
          assert all(item["replay_permitted"] is False for item in index["requests"])
          assert attempt1["status"] == "retired_before_authorization"
          assert attempt2["status"] == "operator_authorized_but_issuance_failed_closed_retired"
          assert attempt2["authorization_issued"] is False
          assert attempt2["execution_performed"] is False

          assert acceptance["artifact_generation"] == "V68"
          assert acceptance["stage_disposition"]["execution_gate"] == "LOCKED_D2_OPERATOR_DECISION_REQUIRED"
          assert acceptance["stage_disposition"]["ready_merge_release_authorized"] is False
          assert template["gate"] == "LOCKED"
          assert template["execution_authorized"] is False
          assert template["writable_test_nvs_authorized"] is False
          assert template["activate_profile_authorized"] is False
          assert template["cleanup_test_state_authorized"] is False
          assert template["network_operation_authorized"] is False
          assert template["efuse_operation_authorized"] is False
          assert template["production_environment_operation_authorized"] is False
          PY
      - name: Reject unauthorized production path modifications
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD > /tmp/stage2d9-paths.txt
          if grep -E '(^|/)f1_0_rc2\.yml$|^firmware/esphome_rc/packages/' /tmp/stage2d9-paths.txt; then
            echo "Stage 2D-9 changed a protected production firmware path" >&2
            exit 1
          fi
      - name: Verify no private runtime evidence is committed
        run: |
          if git ls-files | grep -E '(^|/)(private-summary|authorization).*\.json$|\.tar\.gz$|g2-serial\.log$'; then
            echo "Private runtime evidence path detected" >&2
            exit 1
          fi
          if git grep -IlE 'unlock_token_hex[[:space:]]*[:=][[:space:]]*[0-9a-f]{64}|persistence_key_hex[[:space:]]*[:=][[:space:]]*[0-9a-f]{64}' -- ':!tests/**'; then
            echo "Private Stage2D9 key material detected" >&2
            exit 1
          fi
