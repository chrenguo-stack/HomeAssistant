name: H3 N2 Stage2D9 G3 PREPARE CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9-g3-prepare-ci.yml"
      - "tools/h3_n2_stage2d9_*"
      - "tests/h3_n2_stage2d9_prepare/**"
      - "protocols/pairing/gh-h3-node-stage2d9-g3-prepare-v1.md"
      - "docs/development/*Stage2D9*"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9_G3_20260722.md"
      - "docs/acceptance/h3-n2-stage2d9-g3-*.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/h3-n2-stage2d9-g3-prepare-ci.yml"
      - "tools/h3_n2_stage2d9_*"
      - "tests/h3_n2_stage2d9_prepare/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  host-model-and-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Stage 2D-9 Python files
        run: |
          python -m py_compile \
            tools/h3_n2_stage2d9_prepare_model_20260722_v1.py \
            tools/h3_n2_stage2d9_prepare_manifest_gate_20260722_v1.py \
            tools/h3_n2_stage2d9_prepare_command_protocol_20260722_v1.py \
            tools/h3_n2_stage2d9_esphome_reproducible_compile_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_boundary_gate_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_reproducibility_gate_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_artifact_packager_20260722_v67.py \
            tools/h3_n2_stage2d9_g3_u1_artifact_verify_20260722_v1.py \
            tools/h3_n2_stage2d9_esphome_reproducible_compile_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_boundary_gate_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_reproducibility_gate_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_artifact_packager_20260723_v68.py \
            tools/h3_n2_stage2d9_g3_u1_artifact_verify_20260723_v2.py \
            tools/h3_n2_stage2d9_v68_root_cause_gate_20260723_v1.py \
            tools/h3_n2_stage2d9_v69_source_gate_20260723_v1.py \
            tools/h3_n2_stage2d9_v69_serial_capture_model_20260723_v1.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_prepare_model_20260722_v1.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_prepare_command_protocol_20260722_v1.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_v69_serial_capture_model_20260723_v1.py
      - name: Run host fault matrices
        run: |
          python -m unittest discover \
            -s tests/h3_n2_stage2d9_prepare \
            -p 'test_stage2d9_*_202607*_v1.py' \
            -v
      - name: Verify default manifest remains locked
        run: |
          python tools/h3_n2_stage2d9_prepare_manifest_gate_20260722_v1.py \
            --manifest tests/h3_n2_stage2d9_prepare/stage2d9_prepare_manifest_template_20260722_v1.json \
            --expect-gate LOCKED
      - name: Prove V68 source root cause
        run: |
          python tools/h3_n2_stage2d9_v68_root_cause_gate_20260723_v1.py \
            --repo-root . \
            --output /tmp/stage2d9-v68-root-cause.json
          grep -F '"root_cause": "candidate_host_contract_mismatch"' \
            /tmp/stage2d9-v68-root-cause.json
          grep -F '"mqtt_in_prepare_call_path": false' \
            /tmp/stage2d9-v68-root-cause.json
      - name: Compile and run actual credential host-contract test
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror -I. \
            tests/h3_n2_stage2d9_prepare/stage2d9_v68_host_contract_root_cause_20260723_v1.cpp \
            firmware/esphome_rc/components/greenhouse_pairing_client/pairing_client_core.cpp \
            firmware/esphome_rc/components/greenhouse_pairing_client/pairing_ram_credentials.cpp \
            -o /tmp/stage2d9-v68-root-cause-test
          /tmp/stage2d9-v68-root-cause-test | tee /tmp/stage2d9-v68-root-cause-test.log
          grep -F 'STAGE2D9_V68_INVALID_HOST_REJECTED=true' \
            /tmp/stage2d9-v68-root-cause-test.log
          grep -F 'STAGE2D9_V69_LOCAL_HOST_ACCEPTED=true' \
            /tmp/stage2d9-v68-root-cause-test.log
          grep -F 'STAGE2D9_V68_ROOT_CAUSE_TEST=PASS' \
            /tmp/stage2d9-v68-root-cause-test.log
      - name: Verify recovery closure, root cause and V69 host-only gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def load(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))

          public = load("docs/acceptance/h3-n2-stage2d9-g3-public-manifest-v1.json")
          request = load("docs/acceptance/h3-n2-stage2d9-g3-v68-d2-attempt1-authorization-request-v1.json")
          failure = load("docs/acceptance/h3-n2-stage2d9-g3-v68-d2-attempt1-failure-l1-v1.json")
          u2 = load("docs/acceptance/h3-n2-stage2d9-g3-v68-d2-attempt1-u2-private-detail-l1-v1.json")
          root = load("docs/acceptance/h3-n2-stage2d9-g3-v68-root-cause-l1-v1.json")
          acceptance = load("docs/acceptance/h3-n2-stage2d9-g3-acceptance-template-v1.json")
          index = load("docs/acceptance/h3-n2-stage2d9-g3-d2-authorization-request-index-v1.json")
          template = load("tests/h3_n2_stage2d9_prepare/stage2d9_prepare_manifest_template_20260722_v1.json")

          gate = "CLOSED_CONSUMED_FAILED_RECOVERY_VERIFIED_NO_REPLAY"
          request_id = "D2-H3N2-STAGE2D9-G3-V68-20260723-01"
          seed = "0ea36f26c5048f69b223884a13613fbd645b58c2ce42eafc6f9d9cd55bb089af"

          assert public["status"] == "v68_failed_recovery_verified_root_cause_confirmed_v69_host_correction"
          assert public["execution_gate"] == gate
          assert public["active_d2_request_id"] is None
          assert public["v68_d2_attempt1"]["authorization_request_id"] == request_id
          assert public["v68_d2_attempt1"]["recovery_seed_restored"] is True
          assert public["v68_d2_attempt1"]["final_board_state"] == "locked_recovery_seed_restored"
          assert public["v68_root_cause"]["status"] == "confirmed_by_frozen_source_and_actual_cpp_host_test"
          assert public["v68_root_cause"]["name"] == "candidate_host_contract_mismatch"
          assert public["v68_root_cause"]["mqtt_in_prepare_call_path"] is False
          assert public["observability_defect"]["caused_v68_prepare_failure"] is False
          assert public["v69_correction"]["candidate_host"] == "stage2d9.local"
          assert public["v69_correction"]["command_surface_enabled"] is False
          assert public["v69_correction"]["artifact_generated"] is False
          assert public["v69_correction"]["d2_request_generated"] is False
          assert all(value is False for value in public["protected_boundaries"].values())

          assert request["status"] == "consumed_failed_recovery_verified_retired"
          assert request["execution_gate"] == gate
          assert request["execution_result"]["recovery_seed_restored"] is True
          assert request["replay_permitted"] is False

          assert failure["result"] == "failed_recovery_verified_root_cause_confirmed"
          assert failure["recovery"]["recovery_partition_equals_seed"] is True
          assert failure["root_cause"]["name"] == "candidate_host_contract_mismatch"
          assert failure["root_cause"]["actual_cpp_host_contract_test"] == "passed"
          assert failure["observability"]["caused_prepare_failure"] is False
          assert failure["disposition"]["execution_gate"] == gate

          assert u2["u2_result"] == "passed"
          assert u2["locked_recovery"]["recovery_partition_sha256"] == seed
          assert u2["root_cause"]["name"] == "candidate_host_contract_mismatch"
          assert u2["root_cause"]["dot_local_accepted_by_credential_bundle"] is True
          assert u2["disposition"]["execution_gate"] == gate

          assert root["status"] == "confirmed"
          assert root["root_cause"] == "candidate_host_contract_mismatch"
          assert root["host_proof"]["actual_cpp_host_contract_test"] == "passed"
          assert root["protected_boundaries"]["board_accessed_for_root_cause"] is False

          assert index["active_request_id"] is None
          assert index["execution_gate"] == gate
          assert len(index["retired_request_ids"]) == 3
          assert index["g3_retry_permitted"] is False
          assert index["device_reconnect_permitted"] is False

          assert acceptance["result"] == "failed_recovery_verified_root_cause_confirmed"
          assert acceptance["physical_execution"]["recovery_seed_restored"] is True
          assert acceptance["root_cause"]["name"] == "candidate_host_contract_mismatch"
          assert acceptance["v69_correction"]["command_surface_enabled"] is False
          assert acceptance["stage_disposition"]["execution_gate"] == gate
          assert acceptance["stage_disposition"]["g3_retry_authorized"] is False
          assert acceptance["stage_disposition"]["device_reconnect_authorized"] is False
          assert acceptance["stage_disposition"]["ready_merge_release_authorized"] is False

          assert template["gate"] == "LOCKED"
          assert template["execution_authorized"] is False
          assert template["writable_test_nvs_authorized"] is False
          assert template["activate_profile_authorized"] is False
          assert template["cleanup_test_state_authorized"] is False
          assert template["network_operation_authorized"] is False
          assert template["efuse_operation_authorized"] is False
          assert template["production_environment_operation_authorized"] is False
          PY
      - name: Reject unauthorized production path modifications
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-only "$BASE_SHA"...HEAD > /tmp/stage2d9-paths.txt
          if grep -E '(^|/)f1_0_rc2\.yml$|^firmware/esphome_rc/packages/' /tmp/stage2d9-paths.txt; then
            echo "Stage 2D-9 changed a protected production firmware path" >&2
            exit 1
          fi
      - name: Verify no private runtime evidence is committed
        run: |
          if git ls-files | grep -E '(^|/)(private-summary|authorization).*\.json$|\.tar\.gz$|g2-serial\.log$'; then
            echo "Private runtime evidence path detected" >&2
            exit 1
          fi
          if git grep -IlE 'unlock_token_hex[[:space:]]*[:=][[:space:]]*[0-9a-f]{64}|persistence_key_hex[[:space:]]*[:=][[:space:]]*[0-9a-f]{64}' -- ':!tests/**'; then
            echo "Private Stage2D9 key material detected" >&2
            exit 1
          fi
