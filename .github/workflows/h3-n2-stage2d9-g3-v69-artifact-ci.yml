name: H3 N2 Stage2D9 G3 V69 Artifact CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9-g3-v69-artifact-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3_executor_v69/**"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/stage2d9_g3_partitions_20260722_v65.csv"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/stage2d9_g3_nvs_seed_20260722_v65.csv"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/greenhouse_stage2d9_locked_recovery_20260722_v65.yml"
      - "tools/h3_n2_stage2d9_*_20260723_v69.py"
      - "tools/h3_n2_stage2d9_v69_*_20260723_v1.py"
      - "tools/h3_n2_stage2d9_nvsgen_requirements_20260723_v69.txt"
      - "tests/h3_n2_stage2d9_prepare/*v69*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-locked-artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned build tools
        run: |
          set -euo pipefail
          python -m pip install -q "esphome==2026.4.3"
          python -m venv /tmp/stage2d9-esptool-v69
          /tmp/stage2d9-esptool-v69/bin/python -m pip install -q --upgrade pip
          /tmp/stage2d9-esptool-v69/bin/python -m pip install -q "esptool==5.3.1"
          esphome version
          /tmp/stage2d9-esptool-v69/bin/python -m esptool version

      - name: Compile V69 Python sources
        run: |
          set -euo pipefail
          python -m py_compile \
            tools/h3_n2_stage2d9_esphome_reproducible_compile_20260723_v69.py \
            tools/h3_n2_stage2d9_g3_boundary_gate_20260723_v69.py \
            tools/h3_n2_stage2d9_g3_reproducibility_gate_20260723_v69.py \
            tools/h3_n2_stage2d9_g3_artifact_packager_20260723_v69.py \
            tools/h3_n2_stage2d9_v69_source_gate_20260723_v1.py \
            tools/h3_n2_stage2d9_v69_serial_capture_model_20260723_v1.py \
            tests/h3_n2_stage2d9_prepare/test_stage2d9_v69_serial_capture_model_20260723_v1.py

      - name: Verify V68 remains frozen and V69 correction tests pass
        run: |
          set -euo pipefail
          git diff --exit-code 608282bf86fcf8c1d13494437e01f1899d3c494a...HEAD -- \
            firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3_executor \
            firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/greenhouse_profile_isolated_device_g3_execution_20260723_v68.yml
          python tools/h3_n2_stage2d9_v69_source_gate_20260723_v1.py \
            --repo-root . \
            --output /tmp/stage2d9-v69-source-gate.json
          python -m unittest \
            tests.h3_n2_stage2d9_prepare.test_stage2d9_v69_serial_capture_model_20260723_v1 \
            -v
          g++ -std=c++17 -Wall -Wextra -Werror -I. \
            tests/h3_n2_stage2d9_prepare/stage2d9_v69_actual_prepare_chain_20260723_v1.cpp \
            firmware/esphome_rc/components/greenhouse_pairing_client/pairing_client_core.cpp \
            firmware/esphome_rc/components/greenhouse_pairing_client/pairing_ram_credentials.cpp \
            firmware/esphome_rc/components/greenhouse_profile_isolated_acceptance/isolated_acceptance_package.cpp \
            firmware/esphome_rc/components/greenhouse_profile_isolated_device_driver/isolated_device_driver.cpp \
            -o /tmp/stage2d9-v69-actual-prepare-chain
          /tmp/stage2d9-v69-actual-prepare-chain | tee /tmp/stage2d9-v69-actual-prepare-chain.log
          grep -F 'STAGE2D9_V69_ACTUAL_PREPARE_CHAIN=PASS' \
            /tmp/stage2d9-v69-actual-prepare-chain.log

      - name: Verify Stage 2D-9 V69 immutable source boundary
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d9_g3_boundary_gate_20260723_v69.py \
            --repo-root . \
            --execution-config firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml \
            --source-commit "$SOURCE_COMMIT" \
            --output /tmp/stage2d9-g3-source-boundary-v69.json \
            2>&1 | tee /tmp/stage2d9-g3-boundary-v69.log

      - name: Compile clean build A with fixed time
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-clean-build-a-v69.log) 2>&1
          WRAPPER="$GITHUB_WORKSPACE/tools/h3_n2_stage2d9_esphome_reproducible_compile_20260723_v69.py"
          rm -rf .esphome/build/gh-2d9-g3-v69 .esphome/build/gh-2d9-recovery-v65
          python "$WRAPPER" config greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml
          python "$WRAPPER" compile greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml
          python "$WRAPPER" config greenhouse_stage2d9_locked_recovery_20260722_v65.yml
          python "$WRAPPER" compile greenhouse_stage2d9_locked_recovery_20260722_v65.yml
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path('.esphome/build')
          out = Path('/tmp/stage2d9-clean-build-a-v69')
          for role, build_name in (('g3', 'gh-2d9-g3-v69'), ('recovery', 'gh-2d9-recovery-v65')):
              role_out = out / role
              role_out.mkdir(parents=True, exist_ok=False)
              build_root = root / build_name
              for filename in ('bootloader.bin', 'partitions.bin', 'firmware.bin'):
                  candidates = sorted(build_root.rglob(filename))
                  if filename == 'firmware.bin':
                      candidates = [path for path in candidates if 'bootloader' not in path.parts]
                  if not candidates:
                      raise SystemExit(f'missing {role}/{filename}')
                  shutil.copy2(candidates[0], role_out / filename)
          PY

      - name: Compile clean build B with fixed time
        working-directory: firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-clean-build-b-v69.log) 2>&1
          WRAPPER="$GITHUB_WORKSPACE/tools/h3_n2_stage2d9_esphome_reproducible_compile_20260723_v69.py"
          rm -rf .esphome/build/gh-2d9-g3-v69 .esphome/build/gh-2d9-recovery-v65
          python "$WRAPPER" config greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml
          python "$WRAPPER" compile greenhouse_profile_isolated_device_g3_execution_20260723_v69.yml
          python "$WRAPPER" config greenhouse_stage2d9_locked_recovery_20260722_v65.yml
          python "$WRAPPER" compile greenhouse_stage2d9_locked_recovery_20260722_v65.yml
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path('.esphome/build')
          out = Path('/tmp/stage2d9-clean-build-b-v69')
          for role, build_name in (('g3', 'gh-2d9-g3-v69'), ('recovery', 'gh-2d9-recovery-v65')):
              role_out = out / role
              role_out.mkdir(parents=True, exist_ok=False)
              build_root = root / build_name
              for filename in ('bootloader.bin', 'partitions.bin', 'firmware.bin'):
                  candidates = sorted(build_root.rglob(filename))
                  if filename == 'firmware.bin':
                      candidates = [path for path in candidates if 'bootloader' not in path.parts]
                  if not candidates:
                      raise SystemExit(f'missing {role}/{filename}')
                  shutil.copy2(candidates[0], role_out / filename)
          PY

      - name: Prove clean-build reproducibility
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d9_g3_reproducibility_gate_20260723_v69.py \
            --first-root /tmp/stage2d9-clean-build-a-v69 \
            --second-root /tmp/stage2d9-clean-build-b-v69 \
            --output /tmp/stage2d9-g3-reproducibility-v69.json \
            2>&1 | tee /tmp/stage2d9-g3-reproducibility-v69.log

      - name: Install hash-pinned NVS generator
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-nvsgen-install-v69.log) 2>&1
          python -m pip install \
            --disable-pip-version-check \
            --no-deps \
            --require-hashes \
            --requirement tools/h3_n2_stage2d9_nvsgen_requirements_20260723_v69.txt
          python - <<'PY' > /tmp/stage2d9-nvsgen-runtime-v69.json
          import importlib.metadata
          import json
          import platform

          generator = importlib.metadata.version('esp-idf-nvs-partition-gen')
          cryptography = importlib.metadata.version('cryptography')
          assert generator == '0.2.0', generator
          print(json.dumps({
              'generator_version': generator,
              'wheel_sha256': '7e128c81441fa406fe55b95f29a7d901098bcffc8cc464f993fdbecd074eb9a3',
              'cryptography_version': cryptography,
              'python_version': platform.python_version(),
          }, indent=2, sort_keys=True))
          PY
          python -m esp_idf_nvs_partition_gen --help >/dev/null

      - name: Generate deterministic Stage 2D-9 seed twice
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-g3-seed-v69.log) 2>&1
          ROOT=firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare
          for suffix in a b; do
            python -m esp_idf_nvs_partition_gen generate \
              "$ROOT/stage2d9_g3_nvs_seed_20260722_v65.csv" \
              "/tmp/stage2d9-g3-nvs-seed-v69-${suffix}.bin" \
              0x10000
          done
          test "$(stat -c %s /tmp/stage2d9-g3-nvs-seed-v69-a.bin)" = 65536
          cmp /tmp/stage2d9-g3-nvs-seed-v69-a.bin /tmp/stage2d9-g3-nvs-seed-v69-b.bin
          strings /tmp/stage2d9-g3-nvs-seed-v69-a.bin | grep -F 'gh2d8_seed'
          if strings /tmp/stage2d9-g3-nvs-seed-v69-a.bin | grep -F 'gh2d8_s2d9'; then
            echo 'target namespace unexpectedly present in seed image' >&2
            exit 1
          fi
          sha256sum /tmp/stage2d9-g3-nvs-seed-v69-a.bin

      - name: Assemble immutable corrected G3 and recovery packages
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-g3-package-v69.log) 2>&1
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          python tools/h3_n2_stage2d9_g3_artifact_packager_20260723_v69.py \
            --repo-root . \
            --output /tmp/stage2d9-g3-immutable-v69 \
            --source-commit "$SOURCE_COMMIT" \
            --esptool-python /tmp/stage2d9-esptool-v69/bin/python \
            --seed-image /tmp/stage2d9-g3-nvs-seed-v69-a.bin \
            --boundary-report /tmp/stage2d9-g3-source-boundary-v69.json \
            --reproducibility-report /tmp/stage2d9-g3-reproducibility-v69.json \
            --nvsgen-runtime-report /tmp/stage2d9-nvsgen-runtime-v69.json \
            --nvsgen-requirements tools/h3_n2_stage2d9_nvsgen_requirements_20260723_v69.txt

      - name: Verify packaged images and locked manifest
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          exec > >(tee /tmp/stage2d9-g3-verify-v69.log) 2>&1
          OUT=/tmp/stage2d9-g3-immutable-v69
          MANIFEST="$OUT/stage2d9-g3-artifact-manifest-v69.json"
          grep -F '"artifact_generation": "V69"' "$MANIFEST"
          grep -F '"gate": "LOCKED"' "$MANIFEST"
          grep -F '"source_commit": "'"$SOURCE_COMMIT"'"' "$MANIFEST"
          grep -F '"root_cause_fix": "valid_local_placeholder_host"' "$MANIFEST"
          grep -F '"candidate_host": "stage2d9.local"' "$MANIFEST"
          grep -F '"prepare_schema": "GH2D9_PREPARE_V2"' "$MANIFEST"
          grep -F '"unlock_digest_sha256": "66ce4bd205e8c76159ad839e6f1115e990f18eab2e149427b243e9c5bd541e9e"' "$MANIFEST"
          grep -F '"byte_identical": true' "$MANIFEST"
          grep -F '"unlock_preimage_in_artifact": false' "$MANIFEST"
          grep -F '"private_custody_material_in_artifact": false' "$MANIFEST"
          grep -F '"retired_v67_v68_d2_material_reusable": false' "$MANIFEST"
          grep -F '"flash_authorized": false' "$MANIFEST"
          grep -F '"prepare_authorized": false' "$MANIFEST"
          grep -F '"verify_authorized": false' "$MANIFEST"
          grep -F '"activate_authorized": false' "$MANIFEST"
          grep -F '"cleanup_authorized": false' "$MANIFEST"
          test "$(stat -c %s "$OUT/g3/gh2d9_nvs_seed.bin")" = 65536
          cmp "$OUT/g3/gh2d9_nvs_seed.bin" "$OUT/recovery/gh2d9_nvs_seed.bin"
          if grep -aERi 'usbmodem|/Users/|unlock_token_hex|persistence_key_hex|GH2D9_PREPARE_V2 |GH2D9_VERIFY_V2 ' "$OUT"; then
            echo 'private execution material detected in V69 Artifact' >&2
            exit 1
          fi
          (cd "$OUT" && sha256sum --check SHA256SUMS)

      - name: Upload immutable corrected locked Artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage2d9-g3-immutable-locked-v69
          path: /tmp/stage2d9-g3-immutable-v69
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Cleanup generated files
        if: always()
        run: |
          rm -rf \
            firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare/.esphome \
            /tmp/stage2d9-clean-build-a-v69 \
            /tmp/stage2d9-clean-build-b-v69
