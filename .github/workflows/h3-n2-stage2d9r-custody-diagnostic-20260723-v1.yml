name: H3 N2 Stage2D9R Custody Diagnostic 20260723 V1

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-custody-diagnostic-20260723-v1.yml"
      - "tools/h3_n2_stage2d9r_private_pki_custody_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_custody_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/stage2d9r_private_pki_custody_descriptor_20260723_v1.json.template"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-custody-diagnostic-20260723-v1.yml"
      - "tools/h3_n2_stage2d9r_private_pki_custody_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_custody_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/stage2d9r_private_pki_custody_descriptor_20260723_v1.json.template"

permissions:
  contents: read

jobs:
  custody-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run custody matrix
        run: |
          set +e
          python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_custody_gate_20260723_v1.py \
            -v > /tmp/stage2d9r-custody-diagnostic-v1.log 2>&1
          status=$?
          cat /tmp/stage2d9r-custody-diagnostic-v1.log
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage2d9r-custody-diagnostic-v1
          path: /tmp/stage2d9r-custody-diagnostic-v1.log
          if-no-files-found: error
          retention-days: 1
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d9r-custody-diagnostic-v1.log
