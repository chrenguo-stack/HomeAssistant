name: H3 N2 Stage2D9R G3R Compile CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-g3r-compile-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/**"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3r_tls_prepare/**"
      - "tools/h3_n2_stage2d9r_prepare_command_protocol_20260723_v1.py"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-g3r-compile-ci.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/**"
      - "firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3r_tls_prepare/**"
      - "tools/h3_n2_stage2d9r_prepare_command_protocol_20260723_v1.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  source-correction-once:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 0
          show-progress: false
      - name: Apply exact source corrections when still required
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path(
              'firmware/esphome_rc/components/'
              'greenhouse_profile_isolated_device_g3r_executor/'
              'stage2d9r_g3r_prepare_executor_20260723_v1.cpp'
          )
          text = path.read_text(encoding='utf-8')
          old_ca = '''  const bool valid = parsed == 0 && certificate.raw.len > 0 &&
                       certificate.next == nullptr && certificate.ca_istrue != 0 &&
                       (certificate.key_usage & MBEDTLS_X509_KU_KEY_CERT_SIGN) != 0;'''
          new_ca = '''  const bool valid =
      parsed == 0 && certificate.raw.len > 0 && certificate.next == nullptr &&
      mbedtls_x509_crt_get_ca_istrue(&certificate) == 1 &&
      mbedtls_x509_crt_check_key_usage(
          &certificate, MBEDTLS_X509_KU_KEY_CERT_SIGN) == 0;'''
          old_order = '''  if (!this->authorization_binder_.grant(
          IsolatedAcceptanceWriteOperation::PREPARE_CANDIDATE, 0, 1,
          envelope->authorization_digest)) {
    config.clear();
    return this->fail_step_("prepare_authorization_grant");
  }
  if (!this->package_.load_test_configuration(std::move(config))) {
    config.clear();
    this->authorization_binder_.clear();
    return this->fail_step_("prepare_config_load");
  }
'''
          new_order = '''  if (!this->package_.load_test_configuration(std::move(config))) {
    config.clear();
    return this->fail_step_("prepare_config_load");
  }
  if (!this->authorization_binder_.grant(
          IsolatedAcceptanceWriteOperation::PREPARE_CANDIDATE, 0, 1,
          envelope->authorization_digest)) {
    return this->fail_step_("prepare_authorization_grant");
  }
'''
          old_wipe = '''  this->mqtt_.quiesce();
  this->persistence_.quiesce();
  this->test_key_provider_.destroy();
  secure_clear(&this->input_buffer_);
'''
          new_wipe = '''  this->mqtt_.quiesce();
  this->persistence_.quiesce();
  this->test_key_provider_.destroy();
  (void) this->package_.configure(
      &this->driver_, &this->test_key_provider_, &this->evidence_sink_);
  (void) this->authorization_binder_.configure(
      &this->package_, &this->driver_);
  secure_clear(&this->input_buffer_);
'''

          if old_ca not in text:
              if 'mbedtls_x509_crt_get_ca_istrue(&certificate) == 1' in text:
                  Path('/tmp/stage2d9r-source-fix-noop').write_text('already fixed\n')
                  raise SystemExit(0)
              raise SystemExit('opaque X.509 replacement target missing')
          for old, new, label in (
              (old_ca, new_ca, 'X.509'),
              (old_order, new_order, 'PREPARE order'),
              (old_wipe, new_wipe, 'sensitive wipe'),
          ):
              if text.count(old) != 1:
                  raise SystemExit(f'{label} replacement target count mismatch')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          one_shot = Path('.github/workflows/h3-n2-stage2d9r-source-fix-once-20260723-v1.yml')
          if one_shot.exists():
              one_shot.unlink()
          PY

          if test -f /tmp/stage2d9r-source-fix-noop; then
            echo 'STAGE2D9R_SOURCE_CORRECTION=ALREADY_APPLIED'
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          text = Path(
              'firmware/esphome_rc/components/'
              'greenhouse_profile_isolated_device_g3r_executor/'
              'stage2d9r_g3r_prepare_executor_20260723_v1.cpp'
          ).read_text(encoding='utf-8')
          assert 'certificate.ca_istrue' not in text
          assert 'certificate.key_usage' not in text
          load = text.index('package_.load_test_configuration(std::move(config))')
          grant = text.index('authorization_binder_.grant(', load)
          prepare = text.index('package_.prepare_candidate()', grant)
          assert load < grant < prepare
          assert text.count('(void) this->package_.configure(') == 1
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(n2): correct Stage2D9R TLS validation and PREPARE ordering'
          git push origin HEAD:feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1

  source-boundary:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - name: Verify Stage2D9R locked source boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('firmware/esphome_rc')
          component = root / 'components/greenhouse_profile_isolated_device_g3r_executor'
          yml = root / 'board_lab/h3_profile_isolated_device_g3r_tls_prepare/greenhouse_profile_isolated_device_g3r_executor_compile_20260723_v1.yml'
          cpp = (component / 'stage2d9r_g3r_prepare_executor_20260723_v1.cpp').read_text(encoding='utf-8')
          header = (component / 'stage2d9r_g3r_prepare_executor_20260723_v1.h').read_text(encoding='utf-8')
          config = yml.read_text(encoding='utf-8')

          top_level = {
              line.split(':', 1)[0]
              for line in config.splitlines()
              if line and not line[0].isspace() and not line.startswith('#') and ':' in line
          }
          for prohibited in ('wifi', 'api', 'ota', 'captive_portal', 'web_server', 'mqtt'):
              if prohibited in top_level:
                  raise SystemExit(f'compile target contains top-level {prohibited}')

          zero64 = '0' * 64
          for field in ('unlock_digest', 'ca_pem_sha256'):
              match = re.search(rf'^\s+{field}:\s*["\']?([0-9a-f]{{64}})["\']?\s*$', config, re.M)
              if match is None or match.group(1) != zero64:
                  raise SystemExit(f'compile target does not lock {field}')

          for required in (
              'GH2D9R_PREPARE_V1',
              'GH2D9R_VERIFY_V1',
              'stage2d9r.local',
              'mbedtls_x509_crt_parse',
              'MBEDTLS_X509_KU_KEY_CERT_SIGN',
              'ca_pem_sha256_',
              'authorization_binder_.grant',
              'package_.prepare_candidate',
              'candidate_digest_match=true',
              'ca_pem_valid=true',
              'mqtt=false',
          ):
              if required not in cpp + header:
                  raise SystemExit(f'executor safety binding missing {required}')

          for prohibited in (
              'stage2d9-test-ca',
              'package_.activate(',
              'package_.cleanup_test_state(',
              'driver_.activate(',
              'driver_.cleanup_test_state(',
          ):
              if prohibited in cpp + header:
                  raise SystemExit(f'Stage2D9R source exposes prohibited value/call {prohibited}')
          PY
      - name: Verify historical and production paths are unchanged
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git diff --exit-code "$BASE_SHA"...HEAD -- \
            firmware/esphome_rc/f1_0_rc2/f1_0_rc2.yml \
            firmware/esphome_rc/f1_0_rc2/packages \
            firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3_executor_v69 \
            firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3_prepare

  esp32-c6-compile:
    needs: source-boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned ESPHome
        run: python -m pip install -q "esphome==2026.4.3"
      - name: Validate locked Stage2D9R target
        run: |
          set -o pipefail
          cd firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3r_tls_prepare
          esphome config greenhouse_profile_isolated_device_g3r_executor_compile_20260723_v1.yml \
            2>&1 | tee /tmp/stage2d9r-g3r-config-v1.log
      - name: Compile locked Stage2D9R target
        run: |
          set -o pipefail
          cd firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3r_tls_prepare
          esphome compile greenhouse_profile_isolated_device_g3r_executor_compile_20260723_v1.yml \
            2>&1 | tee /tmp/stage2d9r-g3r-compile-v1.log
      - name: Verify compile result and redaction
        run: |
          set -euo pipefail
          grep -F 'INFO Successfully compiled program.' /tmp/stage2d9r-g3r-compile-v1.log
          if grep -Eqi \
              'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|BEGIN CERTIFICATE|mqtt_password|GH2D9R_PREPARE_V1 [^" ]|GH2D9R_VERIFY_V1 [^" ]' \
              /tmp/stage2d9r-g3r-config-v1.log /tmp/stage2d9r-g3r-compile-v1.log; then
            echo 'private or executable command material detected in compile output' >&2
            exit 1
          fi
      - name: Cleanup generated files
        if: always()
        run: |
          rm -rf firmware/esphome_rc/board_lab/h3_profile_isolated_device_g3r_tls_prepare/.esphome
          rm -f /tmp/stage2d9r-g3r-config-v1.log /tmp/stage2d9r-g3r-compile-v1.log
