name: H3 N2 Stage2D9R Generator Materialize V2 Artifact Diagnostic 20260723 D39B72

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-generator-materialize-v2-artifact-diagnostic-20260723-d39b72.yml"
      - ".github/materialize/stage2d9r-generator-20260723-31b7f4/**"

permissions:
  contents: write

jobs:
  diagnose-v2-materialization:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 1
          show-progress: false
      - name: Run V2 materialization diagnostic
        id: diagnose
        continue-on-error: true
        run: |
          (
            set -euxo pipefail
            root=.github/materialize/stage2d9r-generator-20260723-31b7f4
            test -f "$root/TRIGGER"
            cat "$root"/generator.b64.part* | tr -d '\n' | base64 -d | gzip -d > tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
            cat "$root"/test-v2.b64.part* | tr -d '\n' | base64 -d | gzip -d > tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
            echo 'a9be0c96fd58882b3778886515076f6aae5940c0ac195fc629ed1ebe708265d0  tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py' | sha256sum -c -
            echo '6063bdba137f703b967bbc6324bafeda73e990978cdeba1968cc3d4fd08fba6d  tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py' | sha256sum -c -
            python -m py_compile tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
            python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py -v
            rm -rf "$root"
            rm -f .github/workflows/h3-n2-stage2d9r-generator-source-materialize-once-20260723-8f2c1a.yml .github/workflows/h3-n2-stage2d9r-generator-materialize-triggered-once-20260723-31b7f4.yml .github/workflows/h3-n2-stage2d9r-generator-materialize-pr-once-20260723-6a4e92.yml .github/workflows/h3-n2-stage2d9r-generator-materialize-diagnostic-20260723-9d1c75.yml .github/workflows/h3-n2-stage2d9r-generator-test-diagnostic-20260723-c42e18.yml .github/workflows/h3-n2-stage2d9r-generator-test-matrix-diagnostic-20260723-b58f03.yml .github/workflows/h3-n2-stage2d9r-generator-test-artifact-diagnostic-20260723-e71a26.yml .github/workflows/h3-n2-stage2d9r-generator-materialize-pr-once-20260723-a64f21.yml .github/workflows/h3-n2-stage2d9r-generator-materialize-v2-artifact-diagnostic-20260723-d39b72.yml
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            git status --short
            git commit -m 'feat(n2): freeze Stage2D9R private PKI generator source'
            git push --dry-run origin HEAD:feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
            echo V2_MATERIALIZATION_DRY_RUN=PASS
          ) > /tmp/stage2d9r-generator-materialize-v2-d39b72.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-generator-materialize-v2-diagnostic-d39b72
          path: /tmp/stage2d9r-generator-materialize-v2-d39b72.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve diagnostic failure
        if: steps.diagnose.outcome != 'success'
        run: exit 1
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d9r-generator-materialize-v2-d39b72.log
