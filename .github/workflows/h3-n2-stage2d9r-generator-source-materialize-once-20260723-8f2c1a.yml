name: H3 N2 Stage2D9R Generator Source Materialize Once 20260723 8F2C1A

on:
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-generator-source-materialize-once-20260723-8f2c1a.yml"

permissions:
  contents: write

jobs:
  materialize-reviewed-generator-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 0
          show-progress: false
      - name: Materialize reviewed source and self-delete
        env:
          GENERATOR_GZIP_B64: 
          TEST_GZIP_B64: 
        run: |
          set -euo pipefail
          python - <<'PYCODE'
          import base64
          import gzip
          import os
          from pathlib import Path

          outputs = {
              Path("tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py"):
                  os.environ["GENERATOR_GZIP_B64"],
              Path("tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py"):
                  os.environ["TEST_GZIP_B64"],
          }
          for path, encoded in outputs.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(gzip.decompress(base64.b64decode(encoded)))

          generator = outputs.keys().__iter__().__next__()
          import hashlib
          assert hashlib.sha256(generator.read_bytes()).hexdigest() == "a9be0c96fd58882b3778886515076f6aae5940c0ac195fc629ed1ebe708265d0"
          test_path = Path("tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py")
          assert hashlib.sha256(test_path.read_bytes()).hexdigest() == "5d442e29c53a3b507399f1ac102d027208c9e0d077e53633e3fa07fa21dce6c6"

          Path(".github/workflows/h3-n2-stage2d9r-generator-source-materialize-once-20260723-8f2c1a.yml").unlink()
          PYCODE

          python -m py_compile tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
          python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py -v

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(n2): freeze Stage2D9R private PKI generator source'
          git push origin HEAD:feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
