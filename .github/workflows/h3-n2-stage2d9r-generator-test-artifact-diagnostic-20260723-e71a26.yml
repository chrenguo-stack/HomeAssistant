name: H3 N2 Stage2D9R Generator Test Artifact Diagnostic 20260723 E71A26

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-generator-test-artifact-diagnostic-20260723-e71a26.yml"
      - ".github/materialize/stage2d9r-generator-20260723-31b7f4/**"

permissions:
  contents: read

jobs:
  artifact-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 1
          show-progress: false
      - name: Decode and run matrix
        id: matrix
        continue-on-error: true
        run: |
          set -o pipefail
          root=.github/materialize/stage2d9r-generator-20260723-31b7f4
          cat "$root"/generator.b64.part* | tr -d '\n' | base64 -d | gzip -d > tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
          cat "$root"/test.b64.part* | tr -d '\n' | base64 -d | gzip -d > tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
          python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py -v > /tmp/stage2d9r-generator-test-e71a26.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-generator-test-diagnostic-e71a26
          path: /tmp/stage2d9r-generator-test-e71a26.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve failure state
        if: steps.matrix.outcome != 'success'
        run: exit 1
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d9r-generator-test-e71a26.log
