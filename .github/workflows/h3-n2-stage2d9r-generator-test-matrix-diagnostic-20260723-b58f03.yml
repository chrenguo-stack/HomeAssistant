name: H3 N2 Stage2D9R Generator Test Matrix Diagnostic 20260723 B58F03

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-generator-test-matrix-diagnostic-20260723-b58f03.yml"
      - ".github/materialize/stage2d9r-generator-20260723-31b7f4/**"

permissions:
  contents: read

jobs:
  generator-test:
    name: generator-test-${{ matrix.method }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        method:
          - test_default_root_is_exact_and_private
          - test_root_rejects_shared_temporary_and_repository
          - test_candidate_digest_matches_protocol
          - test_public_config_never_contains_raw_password
          - test_acl_is_test_only
          - test_broker_config_is_loopback_and_not_started
          - test_package_digest_is_order_independent
          - test_authorization_requires_exact_live_toolchain
          - test_expired_authorization_is_rejected_before_claim
          - test_generation_orchestration_contains_no_network_or_board_calls
          - test_public_leakage_gate_rejects_password
          - test_toolchain_summary_omits_paths
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 1
          show-progress: false
      - name: Decode exact reviewed files
        run: |
          set -euo pipefail
          root=.github/materialize/stage2d9r-generator-20260723-31b7f4
          cat "$root"/generator.b64.part* | tr -d '\n' | base64 -d | gzip -d > tools/h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
          cat "$root"/test.b64.part* | tr -d '\n' | base64 -d | gzip -d > tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py
      - name: Run selected contract test
        env:
          TEST_METHOD: ${{ matrix.method }}
        run: |
          python - <<'PY'
          import importlib.util
          import os
          from pathlib import Path
          import sys
          import unittest
          path = Path('tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_pki_generator_20260723_v1.py')
          spec = importlib.util.spec_from_file_location('generator_contract_test', path)
          assert spec and spec.loader
          module = importlib.util.module_from_spec(spec)
          sys.modules[spec.name] = module
          spec.loader.exec_module(module)
          suite = unittest.defaultTestLoader.loadTestsFromName(
              'GeneratorContractTest.' + os.environ['TEST_METHOD'], module
          )
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
