name: H3 N2 Stage2D9R Private Command Material Contract CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-private-command-material-contract-ci.yml"
      - "tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py"
      - "tools/h3_n2_stage2d9r_private_command_material_gate_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_command_material_20260724_v1.py"
      - "docs/development/h3-n2-stage2d9r-private-command-material-u1-review-20260724-v1.md"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9R_G3R_20260723.md"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-private-command-material-contract-ci.yml"
      - "tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py"
      - "tools/h3_n2_stage2d9r_private_command_material_gate_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_command_material_20260724_v1.py"
      - "docs/development/h3-n2-stage2d9r-private-command-material-u1-review-20260724-v1.md"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9R_G3R_20260723.md"

permissions:
  contents: read

jobs:
  command-material-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Report reviewed source digests
        run: |
          set -euo pipefail
          sha256sum \
            tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py \
            tools/h3_n2_stage2d9r_private_command_material_gate_20260724_v1.py \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_command_material_20260724_v1.py \
            | tee /tmp/stage2d9r-command-material-source-sha256-v1.txt
      - name: Compile generator gate and tests
        run: |
          python -m py_compile \
            tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py \
            tools/h3_n2_stage2d9r_private_command_material_gate_20260724_v1.py \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_command_material_20260724_v1.py
      - name: Run command-material fault matrix
        run: |
          set -euo pipefail
          python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_command_material_20260724_v1.py \
            -v 2>&1 | tee /tmp/stage2d9r-command-material-tests-v1.log
          grep -F 'Ran 8 tests' /tmp/stage2d9r-command-material-tests-v1.log
          grep -F 'OK' /tmp/stage2d9r-command-material-tests-v1.log
      - name: Verify default invocation fails closed
        run: |
          set +e
          python tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py \
            > /tmp/stage2d9r-command-material-default-v1.log 2>&1
          rc=$?
          set -e
          test "$rc" -ne 0
          grep -Fx 'STAGE2D9R_PRIVATE_COMMAND_MATERIAL_GENERATION=FAIL' \
            /tmp/stage2d9r-command-material-default-v1.log
          grep -Fx 'SECRET_VALUES_INCLUDED=false' \
            /tmp/stage2d9r-command-material-default-v1.log
          grep -Fx 'BOARD_OPERATION=false' \
            /tmp/stage2d9r-command-material-default-v1.log
          grep -Fx 'NETWORK_OPERATION=false' \
            /tmp/stage2d9r-command-material-default-v1.log
          grep -Fx 'BROKER_STARTED=false' \
            /tmp/stage2d9r-command-material-default-v1.log
      - name: Verify prohibited operation surface is absent
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('tools/h3_n2_stage2d9r_private_command_material_generator_20260724_v1.py').read_text()
          for required in (
              'generation requires explicit --execute',
              'authorization already claimed or consumed',
              'custody root selection rule mismatch',
              'implementation binding mismatch',
              'BOARD_OPERATION=false',
              'NETWORK_OPERATION=false',
              'BROKER_STARTED=false',
          ):
              assert required in text, required
          for prohibited in (
              'import socket', 'from socket import', 'requests.', 'urllib.request',
              'serial.Serial', 'esptool', 'mosquitto', 'systemctl', 'docker ',
              'PREPARE_CANDIDATE ', 'ACTIVATE_PROFILE ', 'CLEANUP_TEST_STATE ',
              'homeassistant', 'greenhouse-manager',
          ):
              assert prohibited not in text, prohibited
          PY
      - name: Report locked boundary
        run: |
          printf '%s\n' \
            'STAGE2D9R_PRIVATE_COMMAND_MATERIAL_CONTRACT=PASS' \
            'PRIVATE_GENERATION_AUTHORIZED=false' \
            'BOARD_OPERATION_AUTHORIZED=false' \
            'NETWORK_OPERATION_AUTHORIZED=false' \
            'BROKER_OPERATION_AUTHORIZED=false' \
            'PREPARE_AUTHORIZED=false' \
            'VERIFY_AUTHORIZED=false'
      - name: Cleanup
        if: always()
        run: |
          rm -f \
            /tmp/stage2d9r-command-material-source-sha256-v1.txt \
            /tmp/stage2d9r-command-material-tests-v1.log \
            /tmp/stage2d9r-command-material-default-v1.log
