name: H3 N2 Stage2D9R Private Content Binding Review Only CI V2

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-private-content-binding-review-only-v2.yml"
      - "tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py"
      - "docs/development/h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v1.md"
      - "docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json"
      - "docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json"
      - "docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-private-content-binding-review-only-v2.yml"
      - "tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py"
      - "docs/development/h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v1.md"
      - "docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json"
      - "docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json"
      - "docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  review-only-v2:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fail closed if main or PR source binding drifted
        env:
          EXPECTED_MAIN_SHA: a3a72d75480362999e70e180f33459198b3951b5
          EXPECTED_HEAD_BRANCH: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          test "$HEAD_BRANCH" = "$EXPECTED_HEAD_BRANCH"
          test "$(/usr/bin/git rev-parse HEAD)" = "$SOURCE_SHA"
          /usr/bin/git fetch --no-tags --depth=1 origin main
          test "$(/usr/bin/git rev-parse FETCH_HEAD)" = "$EXPECTED_MAIN_SHA"
          test "$(/usr/bin/git status --porcelain)" = ""

      - name: Verify frozen public sources and contracts
        run: |
          set -euo pipefail
          sha256sum -c <<'SUMS'
          b4b7d41aaf802122250f4f9499e79c99eba85187af339f60e556a18a03694001  tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py
          ae5494fe15149b71b34adfc3b02ecbaf82d3a40e3dcf1282ad1da2bb8ea51416  tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py
          f9bdb1943976c898a06938df420530699e54072e772a50d9f6065d4e5bc73bd9  docs/development/h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v1.md
          142258d307645c85d67fb7bbee7cd480aa276de75d1dd2609b2d7d8e53892074  docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json
          SUMS
          python -m py_compile \
            tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py
          python \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py \
            -v 2>&1 | tee /tmp/stage2d9r-private-content-binding-v2-tests.log
          grep -F 'Ran 9 tests' /tmp/stage2d9r-private-content-binding-v2-tests.log
          grep -F 'OK' /tmp/stage2d9r-private-content-binding-v2-tests.log
          python - <<'PY'
          from pathlib import Path

          text = Path(
              "tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py"
          ).read_text(encoding="utf-8")
          for prohibited in (
              "import socket",
              "import serial",
              "esptool",
              "mosquitto_sub",
              "mosquitto_pub",
              "subprocess.Popen",
          ):
              assert prohibited not in text, prohibited
          PY

      - name: Verify immutable and recovery public Artifact ledgers
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          immutable = json.loads(
              Path("docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json").read_text()
          )
          assert immutable["schema"] == "gh.h3.n2.stage2d9r-immutable-build-observer-l1/1"
          assert immutable["result"] == "passed_read_only"
          assert immutable["reproducible"] is True
          assert immutable["source_sha"] == "c9e8447c24b0f09f3eac3f56791f2346e8aa5d61"
          assert immutable["canonical_artifact_id"] == 8585140964
          assert immutable["artifact_sha256"] == "5dbe763fe411728533018dd324075f5287ee3542f8351113d54ec80a7042f1d3"
          assert immutable["application_sha256"] == "7651a6476cd48dda6aa5e400695e126b91141c95fca5b74d879f65f2058d1630"
          assert immutable["merged_image_sha256"] == "ea6af469ad7ae103d40a551f482fc18d1f2afc9ed75933481f1802f0a7b2916f"
          for key in (
              "activate_authorized",
              "board_operation_authorized",
              "broker_operation_authorized",
              "cleanup_authorized",
              "execution_authorized",
              "flash_operation_authorized",
              "merge_authorized",
              "network_operation_authorized",
              "physical_nvs_operation_authorized",
              "prepare_authorized",
              "production_operation_authorized",
              "ready_authorized",
              "release_authorized",
              "serial_operation_authorized",
              "verify_authorized",
          ):
              assert immutable[key] is False, key

          recovery = json.loads(
              Path(
                  "docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json"
              ).read_text()
          )
          assert recovery["schema"] == "gh.h3.n2.stage2d9r-locked-recovery-artifact-observer-l1/1"
          assert recovery["result"] == "passed_read_only"
          assert recovery["reproducible"] is True
          assert recovery["source_sha"] == "f312f8580d9f4312f4dd1429b2d7755e1c550636"
          assert recovery["canonical_artifact_id"] == 8589561310
          assert recovery["payload_tar_sha256"] == "c1ed8e5f00b17cbe5bab30aec75d2e8637986b9c19b2389b761bebf3fc0b8d8b"
          assert recovery["manifest_sha256"] == "fe82c458533953df4c86966d047d1f66b59da15e5299b3953135702236d68690"
          assert recovery["erased_image_sha256"] == "71189f7fb6aed638640078fba3a35fda6c39c8962e74dcc75935aac948da9063"
          for key in (
              "activate_authorized",
              "board_operation_authorized",
              "broker_operation_authorized",
              "cleanup_authorized",
              "deployment_authorized",
              "execution_authorized",
              "flash_operation_authorized",
              "merge_authorized",
              "network_operation_authorized",
              "physical_nvs_operation_authorized",
              "prepare_authorized",
              "production_operation_authorized",
              "ready_authorized",
              "recovery_authorized",
              "release_authorized",
              "serial_operation_authorized",
              "verify_authorized",
          ):
              assert recovery[key] is False, key
          PY

      - name: Assemble V2 review-only package
        id: assemble
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          root=/tmp/stage2d9r-private-content-binding-preauth-review-v2
          mkdir -p "$root"/{tools,tests,review,acceptance}
          cp tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py "$root/tools/"
          cp tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py "$root/tests/"
          cp docs/development/h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v1.md "$root/review/REFERENCE_SCOPE_V1.md"
          cp docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json "$root/acceptance/"
          cp docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json "$root/acceptance/"
          cp docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json "$root/acceptance/"

          ROOT="$root" python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["ROOT"])
          source_sha = os.environ["SOURCE_SHA"]
          command = """A future exact U1 may authorize one offline, one-shot, read-only private-content binding verification. It may read existing private material only inside the reviewed verifier process, compute digests, derive public keys, verify certificate/key, chain, hostname, hashed-password format and authorization-record bindings. It must not print, copy, export, replace, generate or delete any private value. It may write only its own one-shot consumed marker. No network, Broker, board, USB, serial, Flash/NVS, PREPARE, VERIFY, ACTIVATE, CLEANUP, production, Ready, merge, release, tag or deployment action is permitted.
"""
          stop = """# Fail-closed stop conditions

Stop before claim if any repository, PR, main, HEAD, CI, package, probe, test, review, Python/OpenSSL toolchain, custody root, descriptor, consumed marker, public candidate, immutable Artifact or recovery Artifact binding differs. Stop if the new marker exists or authorization is missing, expired, replay-enabled, retry-enabled or longer than two hours. After claim, success and failure permanently consume authorization. Never output raw token, private keys, password database, private paths, raw MQTT password or authorization record.
"""
          review = f"""# H3/N2 Stage 2D-9R G3R private-content binding U1 review V2

## Review state

```text
repository=chrenguo-stack/HomeAssistant
pull_request=176
main_sha=a3a72d75480362999e70e180f33459198b3951b5
source_sha={source_sha}
authorization_request_id=U1-H3N2-STAGE2D9R-PRIVATE-CONTENT-BINDING-20260724-02
state=PENDING_EXACT_U1_TOOLCHAIN_PROBE_V2
```

## Objective

Refresh the review-only binding after the main-branch drift invalidated V1. The reviewed operation remains a separately authorized, one-shot, offline and read-only deep binding between the already frozen private command material, private PKI custody, consumed authorization markers, public descriptors, immutable firmware Artifact and recovery Artifact.

This review package does not generate, rotate, replace, copy, export or delete private material. It includes no authorization record and no authorized execution launcher.

## Preauthorization package boundary

The included launcher may perform only exact package/source checksum validation, Python/OpenSSL executable digest and version probing, exact custody-root/safe-descriptor/consumed-marker metadata checks, and confirmation that the new authorization marker does not exist. It must not read the raw unlock token, private-key bodies, Mosquitto password database body or any raw MQTT password.

## Future exact U1 boundary

Only a future exact authorization bound to the values in `PROBE_PACKAGE_BINDING.json` may permit one verifier execution. It may read existing private content only inside the process to compute already-reviewed digests, derive public keys, verify certificate/key, chain, hostname and password-hash format, and cross-bind consumed authorization records. It must claim its new marker before reading private content and permanently consume it on success or failure. Replay and automatic retry are forbidden.

## Permanent exclusions

Neither this review package nor a future exact U1 authorizes output or copying of raw secrets; credential or PKI generation; network, Wi-Fi, MQTT or Broker operations; board, USB, serial, Flash/NVS access; PREPARE, VERIFY, ACTIVATE or CLEANUP; M401A, T1, Home Assistant or greenhouse-manager operations; production mutation; Ready, merge, release, tag or deployment.
"""
          readme = """# Stage 2D-9R private-content binding preauthorization review V2

This is a review-only package refreshed after the exact main binding changed. The launcher performs only a metadata/toolchain preauthorization probe. It contains no authorization record and no authorized execution launcher. Deep private-content verification requires a later exact one-shot U1 authorization.
"""
          (root / "COMMAND_GROUP_REVIEW_ONLY.txt").write_text(command, encoding="utf-8")
          (root / "STOP_CONDITIONS.md").write_text(stop, encoding="utf-8")
          (root / "review" / "h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v2.md").write_text(
              review, encoding="utf-8"
          )
          (root / "README.md").write_text(readme, encoding="utf-8")

          def sha(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def canonical(value: object) -> bytes:
              return json.dumps(
                  value, sort_keys=True, separators=(",", ":"), ensure_ascii=False
              ).encode("utf-8")

          binding = {
              "schema": "gh.h3.n2.stage2d9r-private-content-binding-review-package/1",
              "stage": "H3/N2 Stage 2D-9R G3R",
              "state": "PENDING_EXACT_U1_TOOLCHAIN_PROBE_V2",
              "authorization_request_id": "U1-H3N2-STAGE2D9R-PRIVATE-CONTENT-BINDING-20260724-02",
              "repository": "chrenguo-stack/HomeAssistant",
              "pull_request": 176,
              "pull_request_required_state": {
                  "state": "open",
                  "draft": True,
                  "merged": False,
                  "mergeable": True,
              },
              "main_sha": "a3a72d75480362999e70e180f33459198b3951b5",
              "historical_pr_base_sha": "25a21b38d470992b09c64820d46f56b39917f0dc",
              "head_branch": "feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1",
              "source_sha": source_sha,
              "probe_sha256": "b4b7d41aaf802122250f4f9499e79c99eba85187af339f60e556a18a03694001",
              "contract_test_sha256": "ae5494fe15149b71b34adfc3b02ecbaf82d3a40e3dcf1282ad1da2bb8ea51416",
              "reference_review_document_sha256": "f9bdb1943976c898a06938df420530699e54072e772a50d9f6065d4e5bc73bd9",
              "v2_review_document_sha256": sha(
                  root / "review" / "h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v2.md"
              ),
              "host_artifact_preauthorization_closure_sha256": "142258d307645c85d67fb7bbee7cd480aa276de75d1dd2609b2d7d8e53892074",
              "command_group_sha256": sha(root / "COMMAND_GROUP_REVIEW_ONLY.txt"),
              "stop_conditions_sha256": sha(root / "STOP_CONDITIONS.md"),
              "python_executable_sha256_required": "4e28e811a89aeac6eed668ae641c7f85f5831e42e8dc6cd9a85a3bcc032ec46a",
              "python_version_required": "3.11.9",
              "openssl_executable_sha256_required": "04ad05ce2e7eaf92116dac99a984cc0e589040a103589f93a9fe452832766973",
              "openssl_version_required": "OpenSSL 3.5.0 8 Apr 2025",
              "command_custody": {
                  "root_digest_sha256": "ef5f79be168fff686cabcc91fdc4109918d75d3311da1209dd8d0e381804006e",
                  "private_descriptor_sha256": "cda5b1604200045fec0db45e46f9c441e1bde10f2e5a57f8c98ee2d14b5f9a75",
                  "public_descriptor_sha256": "91c10168174438fc30b3dce087a6b75e24375b87b4262bafddb5b2822ee16d23",
                  "package_sha256": "cc9086c20781007655c498b78ff1ce7af3316db0c02edbae2440d177d7fdfbb5",
                  "unlock_digest_sha256": "3650d44f8761f21dc1931fbd9b6ba6a1d9da92ffa469b3d4f98ee5411a6809e3",
                  "u1_01_consumed_marker_sha256": "7461c0396a7be9fc99d1e880fdfc386054f003b4a64f9e758e6b826f93769314",
