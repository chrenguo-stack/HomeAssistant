          (root / "PROBE_PACKAGE_BINDING.json").write_text(
              json.dumps(binding, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          summary = "\n".join(
              [
                  f"source_sha={binding['source_sha']}",
                  f"main_sha={binding['main_sha']}",
                  f"review_binding_sha256={binding['review_binding_sha256']}",
