          rc=$?
          set -e
          echo PRIVATE_CONTENT_BINDING_TOOLCHAIN_PROBE_V2_END
          exit "$rc"
          SH
          chmod 0700 "$root"/run_*.sh
          find "$root" -type f ! -name 'run_*.sh' -exec chmod 0600 {} +
          (
            cd "$root"
            find . -type f ! -name SHA256SUMS -print0 \
              | LC_ALL=C sort -z \
              | xargs -0 shasum -a 256 \
              | sed 's#  \./#  #' > SHA256SUMS
          )
          chmod 0600 "$root/SHA256SUMS"

      - name: Verify review-only package and secret separation
        run: |
          set -euo pipefail
          root="$PACKAGE_ROOT"
          (cd "$root" && sha256sum -c SHA256SUMS)
          test ! -e "$root/authorization-record.json"
          test ! -e "$root/run-authorized-execution.sh"
          test ! -e "$root/run_stage2d9r_private_content_binding_authorized_execution_20260724_v2.sh"
          ROOT="$root" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['ROOT'])
          binding = json.loads((root / 'PROBE_PACKAGE_BINDING.json').read_text())
          observed = dict(binding)
          review_digest = observed.pop('review_binding_sha256')
          canonical = json.dumps(observed, sort_keys=True, separators=(',', ':')).encode()
          assert hashlib.sha256(canonical).hexdigest() == review_digest
          assert binding['schema'] == 'gh.h3.n2.stage2d9r-private-content-binding-review-package/2'
          assert binding['authorization_request_id'] == 'U1-H3N2-STAGE2D9R-PRIVATE-CONTENT-BINDING-20260724-02'
          assert binding['main_sha'] == 'a3a72d75480362999e70e180f33459198b3951b5'
          assert binding['source_sha'] == os.environ.get('GITHUB_SHA')
          for key in (
              'authorization_record_included',
              'authorized_execution_launcher_included',
              'private_content_read_authorized',
              'private_paths_included',
              'secret_values_included',
              'network_operation',
              'broker_started',
              'board_operation',
              'serial_operation',
              'flash_operation',
              'physical_nvs_operation',
              'prepare_executed',
              'verify_executed',
              'activate_executed',
              'cleanup_executed',
              'production_operation',
              'ready_authorized',
              'merge_authorized',
              'release_authorized',
              'tag_authorized',
              'deployment_authorized',
          ):
              assert binding[key] is False, key

          public_text = ''.join(
              path.read_text(encoding='utf-8', errors='replace')
              for path in root.rglob('*')
              if path.is_file()
          )
          for prohibited in (
              'BEGIN PRIVATE KEY',
              'BEGIN RSA PRIVATE KEY',
              'BEGIN EC PRIVATE KEY',
              '/Users/',
              '/private/tmp/',
              'raw_mqtt_password=',
          ):
              assert prohibited not in public_text, prohibited
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-private-content-binding-preauth-review-v2
          path: /tmp/stage2d9r-private-content-binding-preauth-review-v2
          if-no-files-found: error
          retention-days: 5
          compression-level: 0

      - name: Report exact refreshed review binding
        run: |
          set -euo pipefail
          cat "$PACKAGE_ROOT/REVIEW_BINDING_SUMMARY.txt"
          printf '%s\n' \
            'STAGE2D9R_PRIVATE_CONTENT_BINDING_PREAUTH_REVIEW_V2=PASS' \
            'EXACT_U1_GRANTED=false' \
            'AUTHORIZATION_RECORD_INCLUDED=false' \
            'AUTHORIZED_EXECUTION_LAUNCHER_INCLUDED=false' \
            'PRIVATE_CONTENT_READ_AUTHORIZED=false' \
            'NETWORK_OPERATION=false' \
            'BROKER_STARTED=false' \
            'BOARD_OPERATION=false' \
            'SERIAL_OPERATION=false' \
            'FLASH_OPERATION=false' \
            'PREPARE_EXECUTED=false' \
            'VERIFY_EXECUTED=false'

      - name: Cleanup
        if: always()
        run: |
          rm -rf \
            /tmp/stage2d9r-private-content-binding-preauth-review-v2 \
            /tmp/stage2d9r-private-content-binding-v2-tests.log
