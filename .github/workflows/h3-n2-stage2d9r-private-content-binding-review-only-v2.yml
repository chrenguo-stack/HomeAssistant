          PY

          cat > "$root/run_stage2d9r_private_content_binding_toolchain_probe_20260724_v2_9f6c2d41.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          umask 077
          ROOT="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd -P)"
          cd "$ROOT"
          shasum -a 256 -c SHA256SUMS
          echo PRIVATE_CONTENT_BINDING_TOOLCHAIN_PROBE_V2_BEGIN
          set +e
          "$(command -v python3)" \
            "$ROOT/tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py" \
            --package-root "$ROOT" \
            --probe-toolchain
          rc=$?
          set -e
          echo PRIVATE_CONTENT_BINDING_TOOLCHAIN_PROBE_V2_END
          exit "$rc"
          SH

          chmod 0700 "$root"/run_*.sh
          find "$root" -type f ! -name 'run_*.sh' -exec chmod 0600 {} +
          (
            cd "$root"
            find . -type f ! -name SHA256SUMS -print0 |
              LC_ALL=C sort -z |
              xargs -0 shasum -a 256 |
              sed 's#  \./#  #' > SHA256SUMS
          )
          chmod 0600 "$root/SHA256SUMS"

      - name: Verify V2 review-only package
        run: |
          set -euo pipefail
          root=/tmp/stage2d9r-private-content-binding-preauth-review-v2
          (cd "$root" && sha256sum -c SHA256SUMS)
          test ! -e "$root/authorization-record.json"
          test ! -e "$root/run-authorized-execution.sh"
          test -x "$root/run_stage2d9r_private_content_binding_toolchain_probe_20260724_v2_9f6c2d41.sh"
          ROOT="$root" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["ROOT"])
          binding = json.loads((root / "PROBE_PACKAGE_BINDING.json").read_text())
          observed = binding.pop("review_binding_sha256")
          canonical = json.dumps(
