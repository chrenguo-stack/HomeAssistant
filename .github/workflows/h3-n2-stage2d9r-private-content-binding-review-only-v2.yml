              'command_root_digest_sha256': 'ef5f79be168fff686cabcc91fdc4109918d75d3311da1209dd8d0e381804006e',
              'command_private_descriptor_sha256': 'cda5b1604200045fec0db45e46f9c441e1bde10f2e5a57f8c98ee2d14b5f9a75',
