              'merge_authorized': False,
              'network_operation_authorized': False,
              'payload_tar_sha256': 'c1ed8e5f00b17cbe5bab30aec75d2e8637986b9c19b2389b761bebf3fc0b8d8b',
              'physical_nvs_operation_authorized': False,
              'prepare_authorized': False,
              'private_paths_included': False,
              'private_values_included': False,
              'production_operation_authorized': False,
              'ready_authorized': False,
              'recovery_authorized': False,
              'release_authorized': False,
              'repro_artifact_id': 8589560891,
              'reproducible': True,
              'result': 'passed_read_only',
              'schema': 'gh.h3.n2.stage2d9r-locked-recovery-artifact-observer-l1/1',
              'serial_operation_authorized': False,
              'source_sha': 'f312f8580d9f4312f4dd1429b2d7755e1c550636',
              'stage': 'H3/N2 Stage 2D-9R G3R',
              'verify_authorized': False,
          }
          PY

      - name: Assemble refreshed V2 review-only package
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          root="$PACKAGE_ROOT"
          mkdir -p "$root"/{tools,tests,review,acceptance}
          cp tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py "$root/tools/"
          cp tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py "$root/tests/"
          cp docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json "$root/acceptance/"
          cp docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json "$root/acceptance/"
          cp docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json "$root/acceptance/"

          ROOT="$root" python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['ROOT'])
          source_sha = os.environ['SOURCE_SHA']
          main_sha = os.environ['EXPECTED_MAIN_SHA']
          request_id = os.environ['AUTHORIZATION_REQUEST_ID']

          command = (
              'One future exact U1 may authorize one offline, one-shot, read-only '
              'private-content binding verification. It may read existing private '
              'material only inside the reviewed verifier process, compute digests, '
              'derive public keys, and verify certificate/key, chain, hostname, '
              'hashed-password format and authorization-record bindings. It must not '
              'print, copy, export, replace, generate or delete any private value. It '
              'may write only its own one-shot consumed marker. No network, Broker, '
              'board, USB, serial, Flash/NVS, PREPARE, VERIFY, ACTIVATE, CLEANUP, '
              'production, Ready, merge, release, tag or deployment action is permitted.\n'
          )
          stop = '''# Fail-closed stop conditions

Stop before claim if any repository, PR, main, HEAD, CI, package, probe, test, review, Python/OpenSSL toolchain, custody root, descriptor, consumed marker, public candidate, immutable Artifact or recovery Artifact binding differs. Stop if the new marker exists or authorization is missing, expired, replay-enabled, retry-enabled or longer than two hours. After claim, success and failure permanently consume authorization. Never output raw token, private keys, password database, private paths, raw MQTT password or authorization record.
'''
          review = f'''# H3/N2 Stage 2D-9R G3R private-content binding U1 review V2

## State

```text
authorization_request_id={request_id}
review_only=true
exact_U1_granted=false
private_content_read=false
main_sha={main_sha}
source_sha={source_sha}
```

## Objective

Prepare a separately authorized, one-shot, offline and read-only deep binding between the already frozen private command material, private PKI custody, consumed authorization markers, public descriptors, immutable firmware Artifact and recovery Artifact. This package does not generate, rotate, replace, copy, export or delete private material.

## Preauthorization operation

The launcher may perform only exact package/source hash validation, Python/OpenSSL executable digest and version probing, exact custody-root/safe-descriptor/consumed-marker digest checks, and confirmation that the new authorization marker does not exist. It must not read the raw unlock token, either private-key body, Mosquitto password database body or a raw MQTT password.

## Future exact U1 boundary

Only a later exact authorization, bound to every digest in this package and valid for no more than two hours, may permit one execution of the embedded verifier. The verifier claims its one-shot marker before private-content reads and permanently consumes it on success or failure. Replay and automatic retry are forbidden.

## Permanent exclusions

No raw token, key, password database, raw MQTT password or private path may be output or copied. No PKI, credential, token or authorization material may be generated or replaced. No network, Wi-Fi, MQTT, Broker, board, USB, serial, Flash/NVS, PREPARE, VERIFY, ACTIVATE, CLEANUP, M401A, T1, Home Assistant, greenhouse-manager, production, Ready, merge, release, tag or deployment action is authorized.
'''
          readme = '''# Stage 2D-9R private-content binding preauthorization review V2

This is a review-only package. Its launcher performs only a metadata/toolchain preauthorization probe. It contains no authorization record and no authorized execution launcher. Deep private-content verification requires a later exact one-shot U1 authorization.
'''

          (root / 'COMMAND_GROUP_REVIEW_ONLY.txt').write_text(command, encoding='utf-8')
          (root / 'STOP_CONDITIONS.md').write_text(stop, encoding='utf-8')
          (root / 'review' / 'h3-n2-stage2d9r-private-content-binding-u1-review-20260724-v2.md').write_text(review, encoding='utf-8')
          (root / 'README.md').write_text(readme, encoding='utf-8')

          sha = lambda path: hashlib.sha256(path.read_bytes()).hexdigest()
          binding = {
