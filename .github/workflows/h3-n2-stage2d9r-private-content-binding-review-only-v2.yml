          ab558c3de9e53869dd864e317699d38d0fdf5203f74979d45aac3f44157ba1a0  docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json
          SUMS
          python -m py_compile \
            tools/h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py
          python \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_private_content_binding_probe_20260724_v1.py \
            -v 2>&1 | tee /tmp/stage2d9r-private-content-binding-v2-tests.log
          grep -F 'Ran 9 tests' /tmp/stage2d9r-private-content-binding-v2-tests.log
          grep -F 'OK' /tmp/stage2d9r-private-content-binding-v2-tests.log
          python - <<'PY'
          import json
          from pathlib import Path

          preauth = json.loads(Path(
              'docs/acceptance/h3-n2-stage2d9r-host-artifact-custody-preauth-probe-l1-v2.json'
          ).read_text())
          immutable = json.loads(Path(
              'docs/acceptance/h3-n2-stage2d9r-immutable-build-observer-l1-v1.json'
          ).read_text())
          recovery = json.loads(Path(
              'docs/acceptance/h3-n2-stage2d9r-locked-recovery-artifact-observer-l1-v1.json'
          ).read_text())

          assert preauth['result'] == 'passed_read_only_preauthorization'
          assert preauth['command_custody']['token_content_read'] is False
          assert preauth['pki_custody']['private_key_content_read'] is False
          assert preauth['pki_custody']['password_database_content_read'] is False
          assert not any(preauth['protected_boundaries'].values())

          assert immutable == {
              'activate_authorized': False,
              'application_sha256': '7651a6476cd48dda6aa5e400695e126b91141c95fca5b74d879f65f2058d1630',
              'artifact_sha256': '5dbe763fe411728533018dd324075f5287ee3542f8351113d54ec80a7042f1d3',
              'board_operation_authorized': False,
              'broker_operation_authorized': False,
              'build_a_run_id': 30062650179,
              'build_b_run_id': 30062650177,
              'canonical_artifact_id': 8585140964,
              'cleanup_authorized': False,
              'execution_authorized': False,
              'flash_operation_authorized': False,
              'freeze_run_id': 30062650088,
              'manifest_file_sha256': '1de4afeb3d29d5112c5b987eec99d15b13639e96c176b6a08c28e6763d514aeb',
              'manifest_sha256': '76d382c491e7c8c73ffff6925ee76b29f9e44d17a15983900e79832b9a5054f7',
              'merge_authorized': False,
              'merged_image_sha256': 'ea6af469ad7ae103d40a551f482fc18d1f2afc9ed75933481f1802f0a7b2916f',
              'network_operation_authorized': False,
              'physical_nvs_operation_authorized': False,
              'prepare_authorized': False,
              'private_paths_included': False,
              'private_values_included': False,
              'production_operation_authorized': False,
              'ready_authorized': False,
              'release_authorized': False,
              'repro_artifact_id': 8585137349,
              'reproducible': True,
              'result': 'passed_read_only',
              'schema': 'gh.h3.n2.stage2d9r-immutable-build-observer-l1/1',
              'serial_operation_authorized': False,
              'source_sha': 'c9e8447c24b0f09f3eac3f56791f2346e8aa5d61',
              'stage': 'H3/N2 Stage 2D-9R G3R',
              'verify_authorized': False,
          }
          assert recovery == {
              'activate_authorized': False,
              'board_operation_authorized': False,
              'broker_operation_authorized': False,
              'build_a_run_id': 30075191850,
              'build_b_run_id': 30075191822,
              'canonical_artifact_id': 8589561310,
              'cleanup_authorized': False,
