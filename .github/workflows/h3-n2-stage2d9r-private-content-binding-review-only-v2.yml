          #!/usr/bin/env bash
          set -euo pipefail
          umask 077
          ROOT="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd -P)"
          cd "$ROOT"
          shasum -a 256 -c SHA256SUMS
          echo PRIVATE_CONTENT_BINDING_TOOLCHAIN_PROBE_V2_BEGIN
          set +e
          "$(command -v python3)" \
