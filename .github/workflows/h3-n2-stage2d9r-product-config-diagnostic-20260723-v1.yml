name: H3 N2 Stage2D9R Product Config Diagnostic 20260723 V1

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-product-config-diagnostic-20260723-v1.yml"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_profile_isolated_device_g3r_tls_prepare_compile_20260723_v1.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/**"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-product-config-diagnostic-20260723-v1.yml"
      - "firmware/esphome_rc/f1_0_rc2/f1_0_rc2_h3_profile_isolated_device_g3r_tls_prepare_compile_20260723_v1.yml"
      - "firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/**"

permissions:
  contents: read

jobs:
  product-config-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned ESPHome
        run: python -m pip install -q "esphome==2026.4.3"
      - name: Validate with concise failure output
        run: |
          set -euo pipefail
          cd firmware/esphome_rc/f1_0_rc2
          config=f1_0_rc2_h3_profile_isolated_device_g3r_tls_prepare_compile_20260723_v1.yml
          if ! esphome config "$config" \
              > /tmp/stage2d9r-product-config-diagnostic-v1.log 2>&1; then
            echo 'STAGE2D9R_PRODUCT_CONFIG=FAIL'
            grep -E 'ERROR|Failed config|Invalid|not found|does not exist|Could not|must be|duplicate|conflict' \
              /tmp/stage2d9r-product-config-diagnostic-v1.log \
              | tail -n 160 || tail -n 160 /tmp/stage2d9r-product-config-diagnostic-v1.log
            exit 1
          fi
          echo 'STAGE2D9R_PRODUCT_CONFIG=PASS'
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-product-config-diagnostic-v1
          path: /tmp/stage2d9r-product-config-diagnostic-v1.log
          if-no-files-found: warn
          retention-days: 1
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d9r-product-config-diagnostic-v1.log
