name: H3 N2 Stage2D9R Public Command Material Closure CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-public-command-material-closure-ci.yml"
      - "tests/h3_n2_stage2d9r_tls_candidate/public_command_material_tlsvalid01/public-command-material-descriptor.redacted.json"
      - "docs/acceptance/h3-n2-stage2d9r-private-command-material-u1-generation-l1-v1.json"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-public-command-material-closure-ci.yml"
      - "tests/h3_n2_stage2d9r_tls_candidate/public_command_material_tlsvalid01/public-command-material-descriptor.redacted.json"
      - "docs/acceptance/h3-n2-stage2d9r-private-command-material-u1-generation-l1-v1.json"

permissions:
  contents: read

jobs:
  public-command-material-closure:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify frozen public closure digests
        run: |
          set -euo pipefail
          echo '91c10168174438fc30b3dce087a6b75e24375b87b4262bafddb5b2822ee16d23  tests/h3_n2_stage2d9r_tls_candidate/public_command_material_tlsvalid01/public-command-material-descriptor.redacted.json' | sha256sum -c -
          echo '4615852b7cf1786a73c55f830e0b4238e844a19eb225d769e01b0a43af46f1e5  docs/acceptance/h3-n2-stage2d9r-private-command-material-u1-generation-l1-v1.json' | sha256sum -c -
      - name: Validate public descriptor and U1 closure
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          public_path = Path(
              "tests/h3_n2_stage2d9r_tls_candidate/"
              "public_command_material_tlsvalid01/"
              "public-command-material-descriptor.redacted.json"
          )
          closure_path = Path(
              "docs/acceptance/"
              "h3-n2-stage2d9r-private-command-material-u1-generation-l1-v1.json"
          )
          public_bytes = public_path.read_bytes()
          closure_bytes = closure_path.read_bytes()
          public = json.loads(public_bytes)
          closure = json.loads(closure_bytes)

          assert hashlib.sha256(public_bytes).hexdigest() == "91c10168174438fc30b3dce087a6b75e24375b87b4262bafddb5b2822ee16d23"
          assert hashlib.sha256(closure_bytes).hexdigest() == "4615852b7cf1786a73c55f830e0b4238e844a19eb225d769e01b0a43af46f1e5"

          assert public["schema"] == "gh.h3.n2.stage2d9r-public-command-material-descriptor/1"
          assert public["stage"] == "H3/N2 Stage 2D-9R G3R"
          assert public["state"] == "COMMAND_MATERIAL_FROZEN"
          assert public["source_sha"] == "9dd8ca9e0b3139bfd187eb7a1dfa38485a9eb2fd"
          assert public["implementation_binding"] == "3d3b67cac008adf30e90a51e891d0dd53b36df69"
          assert public["test_run_suffix"] == "tlsvalid01"
          assert public["unlock_digest_sha256"] == "3650d44f8761f21dc1931fbd9b6ba6a1d9da92ffa469b3d4f98ee5411a6809e3"
          assert public["private_material_package_sha256"] == "38a73b78ac0a9a6164107182f1b8cb7d129fdd22fddde7b223364216e6c20455"
          assert public["authorization_id"] == "U1-H3N2-STAGE2D9R-COMMAND-MATERIAL-20260724-02"
          assert public["authorization_record_sha256"] == "fb11a086dcfb58ea483aae4d5c09f13c5740a5d619c4e967013a5da8e70fd44e"
          assert public["execution_binding_sha256"] == "283b6bf20bbeda03181a719ffd638f3a4b3a40e86c047aff9f4280df29763327"

          candidate = public["frozen_candidate_binding"]
          assert candidate == {
              "broker_identity": "stage2d9r.local:8883",
              "ca_pem_sha256": "cfcb6638ed61731270f3bf8e9e262c1512fbca8ff34d4b08b62186453233e963",
              "candidate_digest_sha256": "f22144e37372b883b7a38d07eff2980a865108cf7c8fed9bfdb9f198a030b5c5",
              "review_binding_sha256": "aa2c28c7ca6f3eff1aa61a5827c58102527a0548c683798d670b53daf2ea65d9",
              "review_package_sha256": "3d7a1055d68d161f7f9bb6c3077ee2bf010cfad45a97bb437c3e11bc19df5b2c",
          }

          for key in (
              "private_values_included",
              "private_paths_included",
              "raw_unlock_token_included",
              "execution_authorized",
              "board_operation_authorized",
              "network_operation_authorized",
              "broker_operation_authorized",
              "prepare_authorized",
              "verify_authorized",
              "activate_authorized",
              "cleanup_authorized",
              "production_operation_authorized",
          ):
              assert public[key] is False, key

          assert closure["schema"] == "gh.h3.n2.stage2d9r-private-command-material-u1-generation-l1/2"
          assert closure["result"] == "passed_consumed_retired"
          assert closure["source_sha"] == public["source_sha"]
          assert closure["implementation_binding"] == public["implementation_binding"]
          assert closure["offline_proofs"]["public_descriptor_read_only_export_verified"] is True
          assert closure["offline_proofs"]["public_descriptor_export_sha256"] == hashlib.sha256(public_bytes).hexdigest()
          assert closure["disposition"]["public_descriptor_content_pending_read_only_export"] is False
          assert closure["traceability"]["pre_export_closure_sha256"] == "91766d2e8ace50cff15e8ea07cdbac9aaa6958e356577305bfe8b95cf19a27e2"
          assert closure["traceability"]["public_descriptor_export_verified_from_operator_capture"] is True
          authorization = closure["authorization"]
          assert authorization["status"] == "consumed_passed_retired"
          assert authorization["one_shot"] is True
          assert authorization["consumed"] is True
          assert authorization["replay_permitted"] is False
          assert authorization["automatic_retry_permitted"] is False
          assert authorization["authorization_record_sha256"] == public["authorization_record_sha256"]
          assert authorization["authorization_binding_sha256"] == public["execution_binding_sha256"]

          prior = closure["prior_failed_authorization"]
          assert prior["status"] == "consumed_failed_retired"
          assert prior["failure_stage"] == "WRAPPER_PRECHECK"
          assert prior["generator_invoked"] is False
          assert prior["unlock_token_generated"] is False
          assert prior["custody_root_created"] is False
          assert prior["replay_permitted"] is False

          generated = closure["generated_public_bindings"]
          assert generated["unlock_digest_sha256"] == public["unlock_digest_sha256"]
          assert generated["public_descriptor_sha256"] == hashlib.sha256(public_bytes).hexdigest()
          assert generated["private_command_material_package_sha256"] == "cc9086c20781007655c498b78ff1ce7af3316db0c02edbae2440d177d7fdfbb5"
          assert generated["private_descriptor_sha256"] == "cda5b1604200045fec0db45e46f9c441e1bde10f2e5a57f8c98ee2d14b5f9a75"
          assert generated["authorization_consumed_marker_sha256"] == "1fc51b7338adc56b00b38795173b805b7408e7aafa4e0315e7553dc5898779a9"
          assert generated["execution_binding_sha256"] == public["execution_binding_sha256"]
          assert generated["ca_pem_sha256"] == candidate["ca_pem_sha256"]
          assert generated["candidate_digest_sha256"] == candidate["candidate_digest_sha256"]

          assert all(value is False for value in closure["protected_boundaries"].values())
          assert all(value is False for value in closure["privacy"].values())

          serialized = public_bytes.decode("utf-8") + closure_bytes.decode("utf-8")
          for prohibited in (
              "BEGIN PRIVATE KEY",
              "BEGIN RSA PRIVATE KEY",
              "BEGIN EC PRIVATE KEY",
              "unlock-token.hex",
              "/private/tmp/",
              "/Users/",
          ):
              assert prohibited not in serialized, prohibited
          PY
      - name: Report locked public closure
        run: |
          printf '%s\n' \
            'STAGE2D9R_PUBLIC_COMMAND_MATERIAL_CLOSURE=PASS' \
            'U1_02_STATUS=CONSUMED_PASSED_RETIRED' \
            'U1_02_REPLAY_PERMITTED=false' \
            'PRIVATE_PATHS_INCLUDED=false' \
            'SECRET_VALUES_INCLUDED=false' \
            'BOARD_OPERATION_AUTHORIZED=false' \
            'NETWORK_OPERATION_AUTHORIZED=false' \
            'BROKER_OPERATION_AUTHORIZED=false' \
            'PREPARE_AUTHORIZED=false' \
            'VERIFY_AUTHORIZED=false'
