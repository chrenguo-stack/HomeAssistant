name: H3 N2 Stage2D9R Public PKI Material CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-public-pki-material-ci.yml"
      - "tests/h3_n2_stage2d9r_tls_candidate/public_pki_tlsvalid01/**"
      - "docs/acceptance/h3-n2-stage2d9r-public-pki-export-l1-v1.json"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9R_G3R_20260723.md"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-public-pki-material-ci.yml"
      - "tests/h3_n2_stage2d9r_tls_candidate/public_pki_tlsvalid01/**"
      - "docs/acceptance/h3-n2-stage2d9r-public-pki-export-l1-v1.json"
      - "docs/status/STAGE_STATUS_H3_N2_STAGE2D9R_G3R_20260723.md"

permissions:
  contents: read

jobs:
  public-pki-material:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Verify exact public file digests
        working-directory: tests/h3_n2_stage2d9r_tls_candidate/public_pki_tlsvalid01
        run: |
          set -euo pipefail
          cat > /tmp/stage2d9r-public-pki-sha256-v1.txt <<'EOF'
          3beec95f5b1f66f8f252a0459ca5f402ca5159d853708856955984dcb230ab55  PUBLIC_EXPORT_MANIFEST.json
          57ea55a007810ce86dd8723d1eabb73047814481e02dfa37b9ce965fac657fe1  broker.cert.txt
          8d567a5db699a7a3f7d7ba7904d917cacebcfd9268f44af699a384afe763afda  broker.fullchain.txt
          01c10996c8dc8c7de9a8284284cecbd6ca25f03089297896984bd09e1fad7cf0  isolated-broker-public-config.redacted.json
          93bb071a5bf6f58472ac9e3891c2330dd9de6f05410824ad2fb51829267b4540  public-descriptor.redacted.json
          cfcb6638ed61731270f3bf8e9e262c1512fbca8ff34d4b08b62186453233e963  root-ca.cert.txt
          EOF
          sha256sum -c /tmp/stage2d9r-public-pki-sha256-v1.txt
      - name: Verify certificate roles chain hostname and fingerprints
        working-directory: tests/h3_n2_stage2d9r_tls_candidate/public_pki_tlsvalid01
        run: |
          set -euo pipefail
          openssl verify -CAfile root-ca.cert.txt -purpose sslserver \
            -verify_hostname stage2d9r.local broker.cert.txt \
            | tee /tmp/stage2d9r-public-pki-openssl-v1.log
          grep -F 'broker.cert.txt: OK' /tmp/stage2d9r-public-pki-openssl-v1.log
          openssl x509 -in root-ca.cert.txt -noout -text > /tmp/stage2d9r-root-ca-v1.txt
          openssl x509 -in broker.cert.txt -noout -text > /tmp/stage2d9r-broker-cert-v1.txt
          grep -F 'CA:TRUE' /tmp/stage2d9r-root-ca-v1.txt
          grep -F 'Certificate Sign' /tmp/stage2d9r-root-ca-v1.txt
          grep -F 'CA:FALSE' /tmp/stage2d9r-broker-cert-v1.txt
          grep -F 'TLS Web Server Authentication' /tmp/stage2d9r-broker-cert-v1.txt
          grep -F 'DNS:stage2d9r.local' /tmp/stage2d9r-broker-cert-v1.txt
          test "$(openssl x509 -in root-ca.cert.txt -outform DER | sha256sum | awk '{print $1}')" = \
            '4b44f00b00dccc7151ff750cfa8c586ead2296cc2f424a904847b079b92886b6'
          test "$(openssl x509 -in broker.cert.txt -outform DER | sha256sum | awk '{print $1}')" = \
            '988b6f82b04b0b3cf13f58a07ecd85e420e5576c167fe01ea0940d4530e20ac7'
          test "$(openssl x509 -in broker.cert.txt -pubkey -noout | openssl pkey -pubin -outform DER | sha256sum | awk '{print $1}')" = \
            'f034dc2a036f709287f0558773418ee1799e75bee50dcf55e09143a3a9052a03'
          cmp broker.fullchain.txt <(cat broker.cert.txt root-ca.cert.txt)
      - name: Validate redacted descriptors and boundaries
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, re
          from pathlib import Path
          root = Path('tests/h3_n2_stage2d9r_tls_candidate/public_pki_tlsvalid01')
          m = json.loads((root/'PUBLIC_EXPORT_MANIFEST.json').read_text())
          d = json.loads((root/'public-descriptor.redacted.json').read_text())
          c = json.loads((root/'isolated-broker-public-config.redacted.json').read_text())
          l1 = json.loads(Path('docs/acceptance/h3-n2-stage2d9r-public-pki-export-l1-v1.json').read_text())
          assert m['authorization_status'] == 'consumed_passed_retired'
          assert m['candidate_digest_sha256'] == 'f22144e37372b883b7a38d07eff2980a865108cf7c8fed9bfdb9f198a030b5c5'
          assert d['state'] == 'TLS_CANDIDATE_FROZEN'
          assert d['broker_host'] == d['broker_tls_server_name'] == 'stage2d9r.local'
          assert d['broker_port'] == 8883 and d['dns_san'] == ['stage2d9r.local']
          assert all(d['offline_proofs'].values())
          p = d['public_material']
          assert p['ca_pem_sha256'] == 'cfcb6638ed61731270f3bf8e9e262c1512fbca8ff34d4b08b62186453233e963'
          assert p['private_package_sha256'] == '0632b37a70aa2eae416c48ffa9420a8f1e13788c22a7d12e211f77cf6e78a267'
          assert p['candidate_digest_sha256'] == m['candidate_digest_sha256']
          canonical = json.dumps(c, sort_keys=True, separators=(',', ':'), ensure_ascii=False).encode()
          assert hashlib.sha256(canonical).hexdigest() == p['broker_config_sha256']
          assert re.fullmatch(r'[0-9a-f]{64}', c['mqtt_password_sha256'])
          assert l1['public_export']['zip_sha256'] == '72c739b5e197192b9569083bf3446d7c0f5340652b21ab44cdd99eeca3f12d31'
          assert all(l1['offline_proofs'].values())
          assert all(value is False for value in l1['privacy'].values())
          assert all(value is False for value in l1['protected_boundaries'].values())
          for key in ('execution_authorized','board_operation_authorized','network_operation_authorized','prepare_authorized','verify_authorized','activate_authorized','cleanup_authorized','private_values_included','production_material_included','alias_resolution_allowed','tls_verification_bypass_allowed'):
              assert d[key] is False
          forbidden = ('BEGIN PRIVATE KEY','BEGIN RSA PRIVATE KEY','BEGIN EC PRIVATE KEY','password_file ','keyfile ','unlock_token','persistence_key','/private/tmp/','/tmp/')
          for path in root.iterdir():
              if path.is_file():
                  text = path.read_text(encoding='utf-8')
                  assert all(marker not in text for marker in forbidden), path
          PY
      - name: Report locked boundary
        run: |
          printf '%s\n' \
            'STAGE2D9R_PUBLIC_PKI_MATERIAL_CI=PASS' \
            'PRIVATE_VALUES_INCLUDED=false' \
            'BOARD_OPERATION=false' \
            'SERIAL_OPERATION=false' \
            'NETWORK_OPERATION=false' \
            'BROKER_STARTED=false' \
            'PREPARE_EXECUTED=false' \
            'VERIFY_EXECUTED=false'
      - name: Cleanup
        if: always()
        run: rm -f /tmp/stage2d9r-public-pki-* /tmp/stage2d9r-root-ca-v1.txt /tmp/stage2d9r-broker-cert-v1.txt
