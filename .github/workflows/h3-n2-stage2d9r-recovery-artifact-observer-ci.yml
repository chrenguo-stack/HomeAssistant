name: H3 N2 Stage2D9R Locked Recovery Artifact Observer CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-build-a.yml"
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-build-b.yml"
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-build-reusable.yml"
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-freeze.yml"
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-contract-ci.yml"
      - ".github/workflows/h3-n2-stage2d9r-recovery-artifact-observer-ci.yml"
      - "tools/h3_n2_stage2d9r_recovery_artifact_packager_20260724_v1.py"
      - "tools/h3_n2_stage2d9r_recovery_artifact_freeze_20260724_v1.py"
      - "tools/h3_n2_stage2d9r_recovery_artifact_manifest_gate_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_recovery_artifact_pipeline_20260724_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/stage2d9r_immutable_build_manifest_20260724_v1.json"
      - "tests/h3_n2_stage2d9r_tls_candidate/stage2d9r_test_partition_recovery_manifest_20260723_v1.json.template"
      - "docs/development/h3-n2-stage2d9r-test-partition-recovery-contract-20260723-v1.md"
      - "docs/development/h3-n2-stage2d9r-locked-recovery-artifact-contract-20260724-v1.md"
      - "tools/h3_n2_stage2d9r_test_partition_recovery_gate_20260723_v1.py"

permissions:
  contents: read
  actions: read

jobs:
  observe-locked-recovery:
    runs-on: ubuntu-24.04
    timeout-minutes: 48
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for exact successful recovery freeze run
        id: freeze
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          latest_run() {
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/h3-n2-stage2d9r-recovery-artifact-freeze.yml/runs" \
              -f head_sha="$SOURCE_SHA" \
              -f event=push \
              -f per_page=20 \
              --jq '[.workflow_runs[] | select(.head_sha == "'"$SOURCE_SHA"'")] | sort_by(.id) | last | [.id, .status, (.conclusion // "")] | @tsv'
          }
          for attempt in $(seq 1 120); do
            value="$(latest_run || true)"
            run_id="$(printf '%s' "$value" | cut -f1)"
            status="$(printf '%s' "$value" | cut -f2)"
            conclusion="$(printf '%s' "$value" | cut -f3)"
            if [ "$status" = completed ] && [ "$conclusion" != success ]; then
              echo "locked recovery freeze failed: $value" >&2
              exit 1
            fi
            if [ "$status" = completed ] && [ "$conclusion" = success ]; then
              test -n "$run_id"
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 20
          done
          echo 'timed out waiting for locked recovery freeze' >&2
          exit 1
      - name: Download frozen recovery evidence
        env:
          GH_TOKEN: ${{ github.token }}
          FREEZE_RUN: ${{ steps.freeze.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/stage2d9r-recovery-observer
          gh run download "$FREEZE_RUN" \
            --repo "$GITHUB_REPOSITORY" \
            --name stage2d9r-g3r-recovery-freeze-evidence-v1 \
            --dir /tmp/stage2d9r-recovery-observer
          (
            cd /tmp/stage2d9r-recovery-observer
            sha256sum -c SHA256SUMS
          )
      - name: Read and validate frozen recovery binding
        id: binding
        run: |
          set -euo pipefail
          root=/tmp/stage2d9r-recovery-observer
          manifest="$root/stage2d9r_recovery_artifact_manifest_20260724_v1.json"
          python tools/h3_n2_stage2d9r_recovery_artifact_manifest_gate_20260724_v1.py \
            --manifest "$manifest" \
            | tee /tmp/stage2d9r-recovery-observer-gate.log
          grep -Fx 'STAGE2D9R_RECOVERY_ARTIFACT_GATE=PASS' /tmp/stage2d9r-recovery-observer-gate.log
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          data = json.loads(Path(
              '/tmp/stage2d9r-recovery-observer/'
              'stage2d9r_recovery_artifact_manifest_20260724_v1.json'
          ).read_text(encoding='utf-8'))
          print(f"run_a={data['build_run_ids'][0]}")
          print(f"run_b={data['build_run_ids'][1]}")
          print(f"artifact_a={data['artifact']['canonical_artifact_id']}")
          print(f"artifact_b={data['artifact']['repro_artifact_id']}")
          print(f"payload_sha={data['artifact']['payload_tar_sha256']}")
          print(f"manifest_sha={data['artifact']['manifest_sha256']}")
          PY
      - name: Verify exact source Artifact metadata
        id: artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
          FREEZE_RUN: ${{ steps.freeze.outputs.run_id }}
          RUN_A: ${{ steps.binding.outputs.run_a }}
          RUN_B: ${{ steps.binding.outputs.run_b }}
          ARTIFACT_A: ${{ steps.binding.outputs.artifact_a }}
          ARTIFACT_B: ${{ steps.binding.outputs.artifact_b }}
        run: |
          set -euo pipefail
          for spec in \
            "$ARTIFACT_A:$RUN_A:stage2d9r-g3r-recovery-locked-v1" \
            "$ARTIFACT_B:$RUN_B:stage2d9r-g3r-recovery-repro-v1"; do
            IFS=: read -r artifact_id run_id expected_name <<< "$spec"
            data="$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id")"
            test "$(jq -r .name <<< "$data")" = "$expected_name"
            test "$(jq -r .expired <<< "$data")" = false
            test "$(jq -r .workflow_run.id <<< "$data")" = "$run_id"
            test "$(jq -r .workflow_run.head_sha <<< "$data")" = "$SOURCE_SHA"
          done
          freeze_ids="$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/runs/$FREEZE_RUN/artifacts" \
            --jq '[.artifacts[] | select(.name == "stage2d9r-g3r-recovery-freeze-evidence-v1") | .id] | @tsv')"
          test -n "$freeze_ids"
          test "$(printf '%s' "$freeze_ids" | wc -w | tr -d ' ')" = 1
          freeze_data="$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$freeze_ids")"
          test "$(jq -r .expired <<< "$freeze_data")" = false
          test "$(jq -r .workflow_run.id <<< "$freeze_data")" = "$FREEZE_RUN"
          test "$(jq -r .workflow_run.head_sha <<< "$freeze_data")" = "$SOURCE_SHA"
          echo "freeze_artifact=$freeze_ids" >> "$GITHUB_OUTPUT"
      - name: Generate redacted observer closure
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
          FREEZE_RUN: ${{ steps.freeze.outputs.run_id }}
          RUN_A: ${{ steps.binding.outputs.run_a }}
          RUN_B: ${{ steps.binding.outputs.run_b }}
          ARTIFACT_A: ${{ steps.binding.outputs.artifact_a }}
          ARTIFACT_B: ${{ steps.binding.outputs.artifact_b }}
          FREEZE_ARTIFACT: ${{ steps.artifacts.outputs.freeze_artifact }}
          PAYLOAD_SHA: ${{ steps.binding.outputs.payload_sha }}
          MANIFEST_SHA: ${{ steps.binding.outputs.manifest_sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/stage2d9r-recovery-observer')
          manifest_path = root / 'stage2d9r_recovery_artifact_manifest_20260724_v1.json'
          manifest_file_sha = hashlib.sha256(manifest_path.read_bytes()).hexdigest()
          output = {
              'schema': 'gh.h3.n2.stage2d9r-locked-recovery-artifact-observer-l1/1',
              'stage': 'H3/N2 Stage 2D-9R G3R',
              'result': 'passed_read_only',
              'source_sha': os.environ['SOURCE_SHA'],
              'build_a_run_id': int(os.environ['RUN_A']),
              'build_b_run_id': int(os.environ['RUN_B']),
              'freeze_run_id': int(os.environ['FREEZE_RUN']),
              'canonical_artifact_id': int(os.environ['ARTIFACT_A']),
              'repro_artifact_id': int(os.environ['ARTIFACT_B']),
              'freeze_artifact_id': int(os.environ['FREEZE_ARTIFACT']),
              'payload_tar_sha256': os.environ['PAYLOAD_SHA'],
              'manifest_sha256': os.environ['MANIFEST_SHA'],
              'manifest_file_sha256': manifest_file_sha,
              'erased_image_sha256':
                  '71189f7fb6aed638640078fba3a35fda6c39c8962e74dcc75935aac948da9063',
              'reproducible': True,
              'private_values_included': False,
              'private_paths_included': False,
              'execution_authorized': False,
              'recovery_authorized': False,
              'board_operation_authorized': False,
              'serial_operation_authorized': False,
              'flash_operation_authorized': False,
              'physical_nvs_operation_authorized': False,
              'network_operation_authorized': False,
              'broker_operation_authorized': False,
              'prepare_authorized': False,
              'verify_authorized': False,
              'activate_authorized': False,
              'cleanup_authorized': False,
              'production_operation_authorized': False,
              'ready_authorized': False,
              'merge_authorized': False,
              'release_authorized': False,
              'deployment_authorized': False,
          }
          path = root / 'stage2d9r_recovery_artifact_observer_l1_20260724_v1.json'
          path.write_text(
              json.dumps(output, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          sums = root / 'OBSERVER_SHA256SUMS'
          sums.write_text(
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n",
              encoding='utf-8',
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-g3r-recovery-observer-evidence-v1
          path: |
            /tmp/stage2d9r-recovery-observer/stage2d9r_recovery_artifact_manifest_20260724_v1.json
            /tmp/stage2d9r-recovery-observer/stage2d9r_recovery_artifact_observer_l1_20260724_v1.json
            /tmp/stage2d9r-recovery-observer/OBSERVER_SHA256SUMS
          if-no-files-found: error
          retention-days: 5
          compression-level: 0
      - name: Report read-only recovery observer boundary
        run: |
          printf '%s\n' \
            'STAGE2D9R_LOCKED_RECOVERY_OBSERVER=PASS' \
            'REPRODUCIBLE=true' \
            'RECOVERY_AUTHORIZED=false' \
            'EXECUTION_AUTHORIZED=false' \
            'BOARD_OPERATION_AUTHORIZED=false' \
            'SERIAL_OPERATION_AUTHORIZED=false' \
            'FLASH_OPERATION_AUTHORIZED=false' \
            'NETWORK_OPERATION_AUTHORIZED=false' \
            'PREPARE_AUTHORIZED=false' \
            'VERIFY_AUTHORIZED=false'
      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/stage2d9r-recovery-observer
          rm -f /tmp/stage2d9r-recovery-observer-gate.log
