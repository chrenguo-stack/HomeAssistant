name: H3 N2 Stage2D9R Source Export Once 20260723 V1

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-source-export-once-20260723-v1.yml"
      - "tools/h3_n2_stage2d9r_source_patch_driver_20260723_v1.py"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-source-export-once-20260723-v1.yml"
      - "tools/h3_n2_stage2d9r_source_patch_driver_20260723_v1.py"

permissions:
  contents: read

jobs:
  patch-source:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          fetch-depth: 0
          show-progress: false
      - name: Apply reviewed source patch
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d9r_source_patch_driver_20260723_v1.py \
            | tee /tmp/stage2d9r-source-patch-v1.log
          grep -Fx 'STAGE2D9R_SOURCE_PATCH=PASS' \
            /tmp/stage2d9r-source-patch-v1.log
          if git diff --quiet; then
            echo 'STAGE2D9R_SOURCE_COMMIT=NOT_REQUIRED'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/stage2d9r_g3r_prepare_executor_20260723_v1.cpp
          git commit -m 'fix(n2): correct Stage2D9R TLS validation and PREPARE ordering'
          git push origin HEAD:feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
      - name: Cleanup patch evidence
        if: always()
        run: rm -f /tmp/stage2d9r-source-patch-v1.log

  export-source:
    needs: patch-source
    if: always() && needs.patch-source.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
          show-progress: false
      - name: Verify and export exact source
        run: |
          set -euo pipefail
          source=firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/stage2d9r_g3r_prepare_executor_20260723_v1.cpp
          test -s "$source"
          python tools/h3_n2_stage2d9r_source_patch_driver_20260723_v1.py \
            | tee /tmp/stage2d9r-source-verification-v1.log
          grep -Fx 'SOURCE_CHANGED=false' \
            /tmp/stage2d9r-source-verification-v1.log
          sha256sum "$source" | tee /tmp/stage2d9r-source-export-v2.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: stage2d9r-source-export-once-v2
          path: |
            firmware/esphome_rc/components/greenhouse_profile_isolated_device_g3r_executor/stage2d9r_g3r_prepare_executor_20260723_v1.cpp
            /tmp/stage2d9r-source-export-v2.sha256
            /tmp/stage2d9r-source-verification-v1.log
          if-no-files-found: error
          retention-days: 1
      - name: Cleanup
        if: always()
        run: |
          rm -f \
            /tmp/stage2d9r-source-export-v2.sha256 \
            /tmp/stage2d9r-source-verification-v1.log
