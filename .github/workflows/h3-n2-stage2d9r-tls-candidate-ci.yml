name: H3 N2 Stage2D9R TLS Candidate CI

on:
  pull_request:
    paths:
      - ".github/workflows/h3-n2-stage2d9r-tls-candidate-ci.yml"
      - "docs/decisions/h3-n2-stage2d10-d1-tls-valid-candidate-chain-20260723-v1.md"
      - "docs/development/h3-n2-stage2d9r-g3-tls-valid-candidate-plan-20260723-v1.md"
      - "tools/h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/**"
  push:
    branches:
      - feature/h3-n2-stage2d9r-g3-tls-valid-candidate-20260723-v1
    paths:
      - ".github/workflows/h3-n2-stage2d9r-tls-candidate-ci.yml"
      - "docs/decisions/h3-n2-stage2d10-d1-tls-valid-candidate-chain-20260723-v1.md"
      - "docs/development/h3-n2-stage2d9r-g3-tls-valid-candidate-plan-20260723-v1.md"
      - "tools/h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py"
      - "tests/h3_n2_stage2d9r_tls_candidate/**"

permissions:
  contents: read

jobs:
  tls-candidate-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile descriptor gate and tests
        run: |
          python -m py_compile \
            tools/h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py \
            tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py

      - name: Run descriptor fault matrix
        run: |
          set -euo pipefail
          python tests/h3_n2_stage2d9r_tls_candidate/test_h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py \
            -v 2>&1 | tee /tmp/stage2d9r-tls-candidate-tests-v1.log
          grep -F 'Ran 11 tests' /tmp/stage2d9r-tls-candidate-tests-v1.log
          grep -F 'OK' /tmp/stage2d9r-tls-candidate-tests-v1.log

      - name: Validate default descriptor remains locked
        run: |
          set -euo pipefail
          python tools/h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py \
            --descriptor tests/h3_n2_stage2d9r_tls_candidate/stage2d9r_tls_candidate_descriptor_20260723_v1.json \
            --expect-state LOCKED_DESIGN \
            | tee /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'STAGE2D9R_TLS_DESCRIPTOR_GATE=PASS' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'STATE=LOCKED_DESIGN' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'SECRET_VALUES_INCLUDED=false' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'EXECUTION_AUTHORIZED=false' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'BOARD_OPERATION_AUTHORIZED=false' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
          grep -Fx 'NETWORK_OPERATION_AUTHORIZED=false' \
            /tmp/stage2d9r-tls-candidate-gate-v1.log

      - name: Verify public-source and secret boundary
        run: |
          set -euo pipefail
          paths=(
            docs/decisions/h3-n2-stage2d10-d1-tls-valid-candidate-chain-20260723-v1.md
            docs/development/h3-n2-stage2d9r-g3-tls-valid-candidate-plan-20260723-v1.md
            tools/h3_n2_stage2d9r_tls_candidate_descriptor_gate_20260723_v1.py
            tests/h3_n2_stage2d9r_tls_candidate
          )
          if grep -RIEq \
              --include='*.py' --include='*.json' --include='*.md' \
              '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|mqtt_password[[:space:]]*[:=][[:space:]]*[^n][^u][^l][^l]|execution_authorized[[:space:]]*[:=][[:space:]]*true|tls_verification_bypass_allowed[[:space:]]*[:=][[:space:]]*true)' \
              "${paths[@]}"; then
            echo 'private material or enabled execution boundary detected' >&2
            exit 1
          fi
          grep -F 'LOCKED_SOURCE_AND_COMPILE_ONLY' \
            docs/decisions/h3-n2-stage2d10-d1-tls-valid-candidate-chain-20260723-v1.md
          grep -F 'PRIVATE_PKI_GENERATION_AUTHORIZED=false' \
            docs/development/h3-n2-stage2d9r-g3-tls-valid-candidate-plan-20260723-v1.md

      - name: Cleanup
        if: always()
        run: |
          rm -f \
            /tmp/stage2d9r-tls-candidate-tests-v1.log \
            /tmp/stage2d9r-tls-candidate-gate-v1.log
