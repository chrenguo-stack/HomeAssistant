name: Local Development Environment Tooling CI

on:
  pull_request:
    paths:
      - "tools/dev/local_environment_policy_20260722_v1.json"
      - "tools/dev/local_environment_doctor_20260722_v1.py"
      - "tools/dev/local_environment_doctor_20260722_v2.py"
      - "tools/dev/apply_local_environment_hardening_20260722_v1.py"
      - "tools/dev/hooks/pre_commit_local_environment_guard_20260722_v1.py"
      - "tests/tools/test_local_environment_tooling_20260722_v1.py"
      - "tests/tools/test_local_environment_tooling_20260722_v2.py"
      - "docs/development/本地开发环境核查与加固指南_V1.0_20260722.md"
      - ".github/workflows/local-dev-environment-tooling-ci.yml"
  push:
    branches: [main]
    paths:
      - "tools/dev/local_environment_policy_20260722_v1.json"
      - "tools/dev/local_environment_doctor_20260722_v1.py"
      - "tools/dev/local_environment_doctor_20260722_v2.py"
      - "tools/dev/apply_local_environment_hardening_20260722_v1.py"
      - "tools/dev/hooks/pre_commit_local_environment_guard_20260722_v1.py"
      - "tests/tools/test_local_environment_tooling_20260722_v1.py"
      - "tests/tools/test_local_environment_tooling_20260722_v2.py"
      - "docs/development/本地开发环境核查与加固指南_V1.0_20260722.md"
      - ".github/workflows/local-dev-environment-tooling-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  tooling-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned static checker
        run: python -m pip install -q "ruff==0.15.22"
      - name: Compile local environment tools
        run: |
          python -m py_compile \
            tools/dev/local_environment_doctor_20260722_v1.py \
            tools/dev/local_environment_doctor_20260722_v2.py \
            tools/dev/apply_local_environment_hardening_20260722_v1.py \
            tools/dev/hooks/pre_commit_local_environment_guard_20260722_v1.py \
            tests/tools/test_local_environment_tooling_20260722_v1.py \
            tests/tools/test_local_environment_tooling_20260722_v2.py
      - name: Run Ruff
        run: |
          ruff check \
            tools/dev/local_environment_doctor_20260722_v1.py \
            tools/dev/local_environment_doctor_20260722_v2.py \
            tools/dev/apply_local_environment_hardening_20260722_v1.py \
            tools/dev/hooks/pre_commit_local_environment_guard_20260722_v1.py \
            tests/tools/test_local_environment_tooling_20260722_v1.py \
            tests/tools/test_local_environment_tooling_20260722_v2.py
      - name: Run tooling regression tests
        run: |
          python -m unittest discover \
            -s tests/tools \
            -p 'test_local_environment_tooling_20260722_v*.py' \
            -v
      - name: Exercise non-mutating entry points
        run: |
          python tools/dev/local_environment_doctor_20260722_v1.py --help >/dev/null
          python tools/dev/local_environment_doctor_20260722_v2.py --help >/dev/null
          python tools/dev/apply_local_environment_hardening_20260722_v1.py \
            --repo "$GITHUB_WORKSPACE" \
            --venv /tmp/nonexistent-greenhouse-venv \
            --evidence-dir /tmp/nonexistent-greenhouse-evidence \
            --install-pre-commit-hook \
            --restrict-sensitive-files
          python tools/dev/hooks/pre_commit_local_environment_guard_20260722_v1.py
      - name: Verify policy safety defaults
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path("tools/dev/local_environment_policy_20260722_v1.json").read_text(
                  encoding="utf-8"
              )
          )
          boundaries = policy["execution_boundaries"]
          if any(boundaries.values()):
              raise SystemExit("local environment policy has an unsafe default")
          PY
