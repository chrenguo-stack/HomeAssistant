name: M0 vertical slice CI

on:
  pull_request:
    paths:
      - "host/simulator/**"
      - "host/greenhouse-manager/**"
      - "infra/compose/m0/**"
      - "infra/mosquitto/dev/**"
      - "protocols/mqtt/**"
      - ".github/workflows/m0-vertical-slice-ci.yml"
  push:
    branches:
      - main
    paths:
      - "host/simulator/**"
      - "host/greenhouse-manager/**"
      - "infra/compose/m0/**"
      - "infra/mosquitto/dev/**"
      - "protocols/mqtt/**"
      - ".github/workflows/m0-vertical-slice-ci.yml"

permissions:
  contents: read

jobs:
  simulator-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host/simulator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/simulator/pyproject.toml

      - name: Install
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  compose-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose
        run: docker compose -f infra/compose/m0/docker-compose.yml config

      - name: Verify MQTT vertical slice
        run: bash infra/compose/m0/verify.sh
