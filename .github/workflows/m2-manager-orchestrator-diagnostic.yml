name: M2 manager orchestrator diagnostic

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_manager_identity_migration_production_orchestrator.py"
      - "host/greenhouse-manager/tests/test_t1_manager_identity_migration_production_orchestrator.py"
      - ".github/workflows/m2-manager-orchestrator-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: host/greenhouse-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint new files
        run: >-
          ruff check
          src/greenhouse_manager/t1_manager_identity_migration_production_orchestrator.py
          tests/test_t1_manager_identity_migration_production_orchestrator.py
      - name: Request
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_builds_secret_free_execution_request
      - name: Default disabled
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_execution_is_disabled_by_default
      - name: Wrong confirmation
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_rejects_wrong_second_confirmation_before_claim
      - name: Pre-claim failure
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_prepare_failure_leaves_authorization_unclaimed
      - name: Success
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_success_claims_authorization_and_commits
      - name: Post-claim rollback
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_post_claim_failure_forces_verified_rollback
      - name: Rollback terminal
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_rollback_failure_is_terminal
      - name: Replay rejection
        run: pytest -q tests/test_t1_manager_identity_migration_production_orchestrator.py::test_claimed_authorization_cannot_be_replayed
