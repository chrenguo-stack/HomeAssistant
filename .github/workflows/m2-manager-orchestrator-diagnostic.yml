name: M2 manager orchestrator diagnostic

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_manager_identity_migration_production_orchestrator.py"
      - "host/greenhouse-manager/tests/test_t1_manager_identity_migration_production_orchestrator.py"
      - ".github/workflows/m2-manager-orchestrator-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: host/greenhouse-manager
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Lint new files
        run: >-
          ruff check
          src/greenhouse_manager/t1_manager_identity_migration_production_orchestrator.py
          tests/test_t1_manager_identity_migration_production_orchestrator.py
      - name: Capture full test result
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > "$RUNNER_TEMP/pytest.log" 2>&1
          rc=$?
          printf '%s\n' "$rc" > "$RUNNER_TEMP/pytest.rc"
          exit 0
      - name: Upload full test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-orchestrator-pytest
          path: |
            ${{ runner.temp }}/pytest.log
            ${{ runner.temp }}/pytest.rc
          if-no-files-found: error
          retention-days: 1
      - name: Enforce full test result
        shell: bash
        run: test "$(cat "$RUNNER_TEMP/pytest.rc")" = 0
