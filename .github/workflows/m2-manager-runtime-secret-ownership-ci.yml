name: M2 manager runtime secret ownership CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/app.py"
      - "host/greenhouse-manager/src/greenhouse_manager/t1_manager_runtime_secret_ownership.py"
      - "host/greenhouse-manager/src/greenhouse_manager/t1_manager_identity_migration_preclaim_candidate.py"
      - "host/greenhouse-manager/src/greenhouse_manager/t1_manager_identity_migration_*.py"
      - "host/greenhouse-manager/tests/test_app_check_config.py"
      - "host/greenhouse-manager/tests/test_t1_manager_runtime_secret_ownership.py"
      - "host/greenhouse-manager/tests/test_t1_manager_identity_migration_*.py"
      - ".github/workflows/m2-manager-runtime-secret-ownership-ci.yml"

permissions:
  contents: read

jobs:
  ownership-gate:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: host/greenhouse-manager
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -q -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Runtime ownership and preclaim tests
        run: |
          pytest -q \
            tests/test_app_check_config.py \
            tests/test_t1_manager_runtime_secret_ownership.py \
            tests/test_t1_manager_identity_migration_preclaim_candidate.py \
            tests/test_t1_manager_identity_migration_preparation.py \
            tests/test_t1_manager_identity_migration_live_runtime_gate.py \
            tests/test_t1_manager_identity_migration_execution_preparation.py \
            tests/test_t1_manager_identity_migration_execution_authorization.py \
            tests/test_t1_manager_identity_migration_execution_transaction_gate.py \
            tests/test_t1_manager_identity_migration_production_host_adapters.py \
            tests/test_t1_manager_identity_migration_production_runtime_probe.py \
            tests/test_t1_manager_identity_migration_production_execution_packet.py
