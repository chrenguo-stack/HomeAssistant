name: M2 native lint diagnostic

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/node_mqtt_board_lab_native*.py"
      - "host/greenhouse-manager/tests/test_node_mqtt_board_lab_native.py"
      - "host/greenhouse-manager/pyproject.toml"
      - ".github/workflows/m2-native-lint-diagnostic.yml"

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install Ruff
        run: python -m pip install -q "ruff>=0.12,<1"
      - name: Generate focused Ruff fixes
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/native-ruff.toml <<'EOF'
          target-version = "py311"
          line-length = 110
          [lint]
          select = ["E", "F", "I", "UP", "B", "SIM"]
          ignore = ["E501", "SIM105"]
          EOF
          cd host/greenhouse-manager
          ruff check \
            src/greenhouse_manager/node_mqtt_board_lab_native.py \
            src/greenhouse_manager/node_mqtt_board_lab_native_broker.py \
            tests/test_node_mqtt_board_lab_native.py \
            --config /tmp/native-ruff.toml \
            --fix --unsafe-fixes
          mkdir -p /tmp/m2-native-ruff-fixed/src /tmp/m2-native-ruff-fixed/tests
          cp src/greenhouse_manager/node_mqtt_board_lab_native.py /tmp/m2-native-ruff-fixed/src/
          cp src/greenhouse_manager/node_mqtt_board_lab_native_broker.py /tmp/m2-native-ruff-fixed/src/
          cp tests/test_node_mqtt_board_lab_native.py /tmp/m2-native-ruff-fixed/tests/
      - uses: actions/upload-artifact@v4
        with:
          name: m2-native-ruff-fixed
          path: /tmp/m2-native-ruff-fixed
          retention-days: 1
