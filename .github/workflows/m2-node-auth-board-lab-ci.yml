name: M2 node auth board lab CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/node_mqtt_board_lab*.py"
      - "host/greenhouse-manager/src/greenhouse_manager/schemas/node_mqtt_board_lab_observation_v1.json"
      - "host/greenhouse-manager/tests/test_node_mqtt_board_lab*.py"
      - "host/greenhouse-manager/pyproject.toml"
      - "firmware/esphome_rc/board_lab/m2_node_auth/**"
      - "firmware/esphome_rc/components/greenhouse_mqtt_auth/**"
      - "protocols/pairing/gh-node-mqtt-board-lab-v1.md"
      - ".github/workflows/m2-node-auth-board-lab-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned tools
        run: python -m pip install -q -e "host/greenhouse-manager[dev]" "esphome==2026.4.3"
      - name: Unit, contract, and public safety gates
        run: |
          cd host/greenhouse-manager
          ruff check src/greenhouse_manager/node_mqtt_board_lab*.py tests/test_node_mqtt_board_lab*.py
          pytest -q tests/test_node_mqtt_board_lab.py tests/test_node_mqtt_board_lab_contract.py tests/test_t1_manager_identity_migration_preparation_version.py
          cd ../..
          python - <<'PY'
          from pathlib import Path
          paths = [path for root in (Path("host/greenhouse-manager"), Path("firmware/esphome_rc/board_lab/m2_node_auth"), Path("protocols/pairing")) for path in root.rglob("*") if path.is_file()]
          encoded = "\n".join(path.read_text(encoding="utf-8", errors="replace") for path in paths)
          forbidden = ("root" + "@", "/" + "Users/", "192" + ".168.", "home-assistant" + "_v2.db")
          if any(value in encoded for value in forbidden):
              raise SystemExit("private production marker appeared in board-lab source")
          PY
      - name: Isolated Broker valid, invalid, restore, and restart matrix
        shell: bash
        run: |
          set -euo pipefail
          docker pull eclipse-mosquitto:2.0.22 >/dev/null
          workspace="$(mktemp -d /tmp/gh-node-board-lab-ci-XXXXXX)"
          reports="$(mktemp /tmp/gh-node-board-lab-reports-XXXXXX.jsonl)"
          cleanup() {
            greenhouse-manager-node-mqtt-board-lab destroy --workspace "$workspace" >/dev/null 2>&1 || true
            rm -rf "$workspace" "$reports"
          }
          trap cleanup EXIT
          run_report() { "$@" | tee -a "$reports"; }
          run_report greenhouse-manager-node-mqtt-board-lab plan --workspace "$workspace" --bind-host 127.0.0.1 --port 18883
          run_report greenhouse-manager-node-mqtt-board-lab create --workspace "$workspace" --bind-host 127.0.0.1 --port 18883 --confirmation M2-NONPRODUCTION-BOARD-LAB
          run_report greenhouse-manager-node-mqtt-board-lab smoke-valid --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab invalidate-candidate --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab smoke-invalid --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab restore-candidate --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab smoke-valid --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab stop --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab start --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab smoke-valid --workspace "$workspace"
          run_report greenhouse-manager-node-mqtt-board-lab destroy --workspace "$workspace"
          WORKSPACE="$workspace" REPORTS="$reports" python - <<'PY'
          import json
          import os
          from pathlib import Path
          workspace = os.environ["WORKSPACE"]
          encoded = Path(os.environ["REPORTS"]).read_text(encoding="utf-8")
          documents = [json.loads(line) for line in encoded.splitlines() if line.strip()]
          if len(documents) != 11:
              raise SystemExit(f"board-lab report count is {len(documents)}, expected 11")
          required_false = ("secret_values_included", "production_execution_invoked", "homeassistant_storage_read", "node_credentials_delivered", "anonymous_closure_enabled")
          if workspace in encoded or any(any(item.get(key) is not False for key in required_false) for item in documents):
              raise SystemExit("board-lab report safety gate was not closed")
          if Path(workspace).exists():
              raise SystemExit("board-lab workspace survived verified destroy")
          PY
          trap - EXIT
          rm -f "$reports"
      - name: Create ephemeral board-lab secrets
        run: |
          python - <<'PY'
          import hashlib
          import secrets
          from pathlib import Path
          candidate = secrets.token_urlsafe(32)
          wifi_password = secrets.token_urlsafe(24)
          fingerprint = hashlib.sha256(candidate.encode()).hexdigest()[:16]
          Path("firmware/esphome_rc/board_lab/m2_node_auth/secrets.yaml").write_text("\n".join((
              'board_lab_wifi_ssid: "ci-board-lab"',
              f'board_lab_wifi_password: "{wifi_password}"',
              'board_lab_broker_host: "192.0.2.10"',
              'board_lab_broker_port: 18883',
              f'board_lab_candidate_password: "{candidate}"',
              f'board_lab_candidate_secret_fingerprint: "{fingerprint}"',
              "",
          )), encoding="utf-8")
          Path("/tmp/board-lab-ephemeral-values").write_text(candidate + "\n" + wifi_password + "\n", encoding="utf-8")
          PY
      - name: Compile ESP32-C6 board target
        shell: bash
        run: |
          set -o pipefail
          cd firmware/esphome_rc/board_lab/m2_node_auth
          esphome config greenhouse_mqtt_auth_board_lab.yml 2>&1 | tee /tmp/board-lab-config.log
          esphome compile greenhouse_mqtt_auth_board_lab.yml 2>&1 | tee /tmp/board-lab-compile.log
      - name: Verify ephemeral board-lab secret output
        run: |
          python - <<'PY'
          from pathlib import Path
          values = Path("/tmp/board-lab-ephemeral-values").read_text(encoding="utf-8").splitlines()
          logs = "\n".join(Path(path).read_text(encoding="utf-8", errors="replace") for path in ("/tmp/board-lab-config.log", "/tmp/board-lab-compile.log"))
          if any(value and value in logs for value in values):
              raise SystemExit("ephemeral board-lab secret appeared in ESPHome output")
          PY
      - name: Cleanup board-lab files
        if: always()
        run: |
          docker ps -aq --filter 'name=gh-m2-board-lab-' | xargs -r docker rm -f
          rm -f firmware/esphome_rc/board_lab/m2_node_auth/secrets.yaml /tmp/board-lab-ephemeral-values /tmp/board-lab-config.log /tmp/board-lab-compile.log
