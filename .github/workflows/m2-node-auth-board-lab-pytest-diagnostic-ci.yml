name: M2 board lab pytest diagnostic CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - ".github/workflows/m2-node-auth-board-lab-pytest-diagnostic-ci.yml"

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/greenhouse-manager/pyproject.toml
      - name: Install
        run: python -m pip install -q -e 'host/greenhouse-manager[dev]'
      - name: Run full pytest with JUnit output
        id: pytest
        continue-on-error: true
        run: pytest -q --tb=short --junitxml=/tmp/m2-board-lab-pytest-diagnostic.xml host/greenhouse-manager/tests
      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m2-board-lab-pytest-diagnostic-${{ github.run_id }}
          path: /tmp/m2-board-lab-pytest-diagnostic.xml
          if-no-files-found: error
          retention-days: 1
      - name: Preserve pytest result
        if: steps.pytest.outcome != 'success'
        run: exit 1
