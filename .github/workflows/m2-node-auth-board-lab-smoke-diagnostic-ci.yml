name: M2 board lab smoke diagnostic CI

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/node_mqtt_board_lab*.py"
      - ".github/workflows/m2-node-auth-board-lab-smoke-diagnostic-ci.yml"

permissions:
  contents: read

jobs:
  smoke-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install manager tools
        run: python -m pip install -q -e "host/greenhouse-manager[dev]"
      - name: Create isolated board lab
        shell: bash
        run: |
          set -euo pipefail
          docker pull eclipse-mosquitto:2.0.22 >/dev/null
          workspace="$(mktemp -d /tmp/gh-node-board-lab-diagnostic-XXXXXXX)"
          echo "BOARD_LAB_WORKSPACE=$workspace" >> "$GITHUB_ENV"
          greenhouse-manager-node-mqtt-board-lab create \
            --workspace "$workspace" \
            --bind-host 127.0.0.1 \
            --port 18883 \
            --confirmation M2-NONPRODUCTION-BOARD-LAB \
            >/tmp/m2-board-lab-create-report.json
      - name: Run valid smoke diagnostic
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          greenhouse-manager-node-mqtt-board-lab smoke-valid \
            --workspace "$BOARD_LAB_WORKSPACE" \
            > /tmp/m2-board-lab-smoke-stdout.log \
            2> /tmp/m2-board-lab-smoke-stderr.log
      - name: Capture non-secret Broker diagnostics
        if: steps.smoke.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker ps -q --filter 'name=gh-m2-board-lab-' | head -n 1)"
          if [[ -n "$container_id" ]]; then
            docker logs "$container_id" > /tmp/m2-board-lab-broker.log 2>&1 || true
          else
            printf '%s\n' 'board-lab container not running' > /tmp/m2-board-lab-broker.log
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads((Path(os.environ["BOARD_LAB_WORKSPACE"]) / "manifest.json").read_text(encoding="utf-8"))
          safe = {
              key: manifest.get(key)
              for key in (
                  "schema",
                  "candidate_client_id",
                  "anonymous_client_id",
                  "candidate_password_state",
                  "candidate_password_fingerprint",
                  "observer_password_fingerprint",
              )
          }
          Path("/tmp/m2-board-lab-safe-manifest.json").write_text(
              json.dumps(safe, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Upload smoke diagnostic
        if: steps.smoke.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: m2-board-lab-smoke-diagnostic-${{ github.run_id }}
          path: |
            /tmp/m2-board-lab-create-report.json
            /tmp/m2-board-lab-smoke-stdout.log
            /tmp/m2-board-lab-smoke-stderr.log
            /tmp/m2-board-lab-broker.log
            /tmp/m2-board-lab-safe-manifest.json
          if-no-files-found: error
          retention-days: 1
      - name: Preserve smoke result
        if: steps.smoke.outcome != 'success'
        run: exit 1
      - name: Cleanup isolated board lab
        if: always()
        shell: bash
        run: |
          if [[ -n "${BOARD_LAB_WORKSPACE:-}" && -d "$BOARD_LAB_WORKSPACE" ]]; then
            greenhouse-manager-node-mqtt-board-lab destroy --workspace "$BOARD_LAB_WORKSPACE" >/dev/null 2>&1 || true
          fi
          docker ps -aq --filter 'name=gh-m2-board-lab-' | xargs -r docker rm -f
          rm -rf "${BOARD_LAB_WORKSPACE:-}" \
            /tmp/m2-board-lab-create-report.json \
            /tmp/m2-board-lab-smoke-stdout.log \
            /tmp/m2-board-lab-smoke-stderr.log \
            /tmp/m2-board-lab-broker.log \
            /tmp/m2-board-lab-safe-manifest.json
