name: PR134 pytest diagnostic

on:
  pull_request:
    paths:
      - 'host/greenhouse-manager/**'
      - '.github/workflows/pr134-pytest-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        working-directory: host/greenhouse-manager
        run: pip install -e '.[dev]'
      - name: Capture pytest output
        working-directory: host/greenhouse-manager
        run: pytest -q > pytest-output.txt 2>&1 || true
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr134-pytest-output
          path: host/greenhouse-manager/pytest-output.txt
          if-no-files-found: error
          retention-days: 1
