name: Temporary M2 anonymous control probe fix

on:
  push:
    branches:
      - fix/m2-anonymous-control-denial-probe

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/m2-anonymous-control-denial-probe
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply focused fix
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          source = Path("host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_postactivation_audit.py")
          text = source.read_text(encoding="utf-8")
          old = '''    if code != 0:\n        return True\n    try:\n        value = json.loads(output)\n'''
          new = '''    if code != 0:\n        return True\n    normalized = output.casefold()\n    denial_markers = (\n        "not authorized",\n        "not authorised",\n        "permission denied",\n        "access denied",\n        "forbidden",\n    )\n    if any(marker in normalized for marker in denial_markers):\n        return True\n    try:\n        value = json.loads(output)\n'''
          if old not in text:
              raise SystemExit("target audit block not found")
          source.write_text(text.replace(old, new, 1), encoding="utf-8")

          tests = Path("host/greenhouse-manager/tests/test_t1_broker_identity_postactivation_audit.py")
          test_text = tests.read_text(encoding="utf-8")
          addition = '''\n\nclass AnonymousDeniedWithZeroExitRunner(FakeRunner):\n    def run(\n        self,\n        command: tuple[str, ...],\n        *,\n        input_text: str | None = None,\n    ) -> tuple[int, str]:\n        if command[:4] == (\n            "docker",\n            "exec",\n            "mosquitto",\n            "mosquitto_rr",\n        ):\n            return 0, "Not authorized\\n"\n        return super().run(command, input_text=input_text)\n\n\ndef test_accepts_zero_exit_authorization_denial(tmp_path: Path) -> None:\n    report = audit_broker_identity_postactivation(\n        _handoff(tmp_path),\n        expected_retained_topic=TOPIC,\n        runner=AnonymousDeniedWithZeroExitRunner(),\n        handoff_verifier=_verified,\n    )\n\n    assert report["checks"]["anonymous_control_denied"] is True\n    assert report["activation_verified"] is True\n    assert report["rollback_required"] is False\n'''
          if "test_accepts_zero_exit_authorization_denial" not in test_text:
              tests.write_text(test_text + addition, encoding="utf-8")

          pyproject = Path("host/greenhouse-manager/pyproject.toml")
          project_text = pyproject.read_text(encoding="utf-8")
          if 'version = "0.4.51"' not in project_text:
              raise SystemExit("manager version target not found")
          pyproject.write_text(
              project_text.replace('version = "0.4.51"', 'version = "0.4.52"', 1),
              encoding="utf-8",
          )

          version_test = Path(
              "host/greenhouse-manager/tests/"
              "test_t1_manager_identity_migration_preparation_version.py"
          )
          version_text = version_test.read_text(encoding="utf-8")
          version_text = version_text.replace(
              "def test_manager_package_version_includes_ha_legacy_evidence_bridge() -> None:",
              "def test_manager_package_version_includes_anonymous_control_probe_fix() -> None:",
              1,
          ).replace(
              'assert document["project"]["version"] == "0.4.51"',
              'assert document["project"]["version"] == "0.4.52"',
              1,
          )
          version_test.write_text(version_text, encoding="utf-8")
          PY

          python -m pip install "ruff==0.12.12"
          python -m ruff check --fix host/greenhouse-manager/src/greenhouse_manager/t1_broker_identity_postactivation_audit.py host/greenhouse-manager/tests/test_t1_broker_identity_postactivation_audit.py host/greenhouse-manager/tests/test_t1_manager_identity_migration_preparation_version.py

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add host/greenhouse-manager
          git commit -m "fix(m2): recognize zero-exit anonymous control denial"
          git push origin HEAD:fix/m2-anonymous-control-denial-probe
