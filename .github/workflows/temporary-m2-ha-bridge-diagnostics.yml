name: Temporary M2 HA bridge diagnostics

on:
  pull_request:
    paths:
      - "host/greenhouse-manager/**"
      - ".github/workflows/temporary-m2-ha-bridge-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e "host/greenhouse-manager[dev]"
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          cd host/greenhouse-manager
          python -m ruff check . > "$RUNNER_TEMP/ruff.txt" 2>&1
          echo "$?" > "$RUNNER_TEMP/ruff.exit"
          python -m pytest -q > "$RUNNER_TEMP/pytest.txt" 2>&1
          echo "$?" > "$RUNNER_TEMP/pytest.exit"
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m2-ha-bridge-diagnostics
          path: |
            ${{ runner.temp }}/ruff.txt
            ${{ runner.temp }}/ruff.exit
            ${{ runner.temp }}/pytest.txt
            ${{ runner.temp }}/pytest.exit
