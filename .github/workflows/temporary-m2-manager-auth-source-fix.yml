name: Temporary M2 manager execution authorization source fix

on:
  push:
    branches:
      - agent/m2-manager-execution-authorization
    paths:
      - ".github/workflows/temporary-m2-manager-auth-source-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m2-manager-execution-authorization
      - name: Fix logical driver contract binding
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path(
              "host/greenhouse-manager/src/greenhouse_manager/"
              "t1_manager_identity_migration_execution_authorization.py"
          )
          text = path.read_text(encoding="utf-8")
          old = '''    if sha_path(driver) != _require_sha(
              bindings.get("driver_contract_sha256"),
              "manager production driver contract",
          ):
              raise ManagerIdentityExecutionAuthorizationError(
                  "manager production driver contract does not match execution preparation"
              )
          '''
          if old not in text:
              raise SystemExit("driver file-hash comparison block not found")
          path.write_text(text.replace(old, "", 1), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add host/greenhouse-manager/src/greenhouse_manager/t1_manager_identity_migration_execution_authorization.py
          git commit -m "fix(m2): use logical manager driver contract binding"
          git push origin HEAD:agent/m2-manager-execution-authorization
