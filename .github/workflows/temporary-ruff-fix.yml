name: Temporary Ruff autofix

on:
  push:
    branches:
      - agent/m2-ha-legacy-evidence-bridge
    paths:
      - "host/greenhouse-manager/src/greenhouse_manager/t1_homeassistant_mqtt_legacy_evidence_bridge.py"
      - ".github/workflows/temporary-ruff-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m2-ha-legacy-evidence-bridge
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff==0.12.12"
      - name: Apply import fix
        shell: bash
        run: |
          set -euo pipefail
          cd host/greenhouse-manager
          python -m ruff check --select I --fix \
            src/greenhouse_manager/t1_homeassistant_mqtt_legacy_evidence_bridge.py
          cd ../..
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add host/greenhouse-manager/src/greenhouse_manager/t1_homeassistant_mqtt_legacy_evidence_bridge.py
          git commit -m "style(manager): organize HA legacy bridge imports"
          git push origin HEAD:agent/m2-ha-legacy-evidence-bridge
