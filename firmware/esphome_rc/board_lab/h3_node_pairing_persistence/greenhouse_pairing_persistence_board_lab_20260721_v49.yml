esphome:
  name: gh-pairing-persistence-lab
  friendly_name: Greenhouse Pairing Persistence Lab
  min_version: 2026.4.3

esp32:
  board: esp32-c6-devkitm-1
  variant: ESP32C6
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - mdns
        - nvs_flash
        - esp_hw_support
    sdkconfig_options:
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../../components
    components:
      - greenhouse_pairing_client
      - greenhouse_pairing_persistence_lab

# Non-production compile target. It does not open NVS or run recovery at boot.
greenhouse_pairing_persistence_lab:
  id: pairing_persistence_stage2d1
  partition_label: nvs
  namespace_name: gh_pair_v1
  hmac_key_id: 0

button:
  - platform: template
    name: Persistence Read Only Recovery Probe Lab
    id: persistence_recovery_probe_stage2d1
    internal: true
    on_press:
      - lambda: |-
          id(pairing_persistence_stage2d1).recover_for_lab();

text_sensor:
  - platform: template
    name: Persistence Recovery Status Lab
    id: persistence_recovery_status_stage2d1
    internal: true
    update_interval: 5s
    lambda: |-
      return {id(pairing_persistence_stage2d1).recovery_status_name()};

sensor:
  - platform: template
    name: Persistence Active Generation Lab
    id: persistence_active_generation_stage2d1
    internal: true
    update_interval: 5s
    accuracy_decimals: 0
    lambda: |-
      return static_cast<float>(
          id(pairing_persistence_stage2d1).active_generation());
  - platform: template
    name: Persistence Candidate Generation Lab
    id: persistence_candidate_generation_stage2d1
    internal: true
    update_interval: 5s
    accuracy_decimals: 0
    lambda: |-
      return static_cast<float>(
          id(pairing_persistence_stage2d1).candidate_generation());
