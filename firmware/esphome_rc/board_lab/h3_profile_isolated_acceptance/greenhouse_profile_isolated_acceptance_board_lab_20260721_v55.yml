esphome:
  name: gh-isolated-accept-v55
  friendly_name: Greenhouse Isolated Acceptance Compile Lab V55
  min_version: 2026.4.3

esp32:
  board: esp32-c6-devkitm-1
  variant: ESP32C6
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - mqtt
        - nvs_flash
        - esp_hw_support
    sdkconfig_options:
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y
      CONFIG_MBEDTLS_HARDWARE_MPI: n

logger:
  level: DEBUG

# Dedicated Stage 2D-7 compile-only target. Wi-Fi is configured only with
# ephemeral CI values and is disabled at boot. No MQTT component, NVS backend,
# command transport, key, Broker address, startup hook, or write path exists.
wifi:
  ssid: !secret node_pairing_wifi_ssid
  password: !secret node_pairing_wifi_password
  enable_on_boot: false
  reboot_timeout: 0s

external_components:
  - source:
      type: local
      path: ../../components
    components:
      - greenhouse_pairing_client
      - greenhouse_profile_production_adapters
      - greenhouse_profile_lifecycle_controller
      - greenhouse_profile_isolated_acceptance

greenhouse_profile_isolated_acceptance:
