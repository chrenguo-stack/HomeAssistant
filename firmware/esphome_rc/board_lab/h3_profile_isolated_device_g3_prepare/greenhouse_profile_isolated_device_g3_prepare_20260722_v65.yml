esphome:
  name: gh-2d9-g3-v65
  friendly_name: Greenhouse Stage 2D-9 G3 Locked PREPARE Harness
  min_version: 2026.4.3

esp32:
  board: esp32-c6-devkitm-1
  variant: ESP32C6
  flash_size: 8MB
  partitions: stage2d9_g3_partitions_20260722_v65.csv
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - mqtt
        - nvs_flash
        - esp_hw_support
    sdkconfig_options:
      CONFIG_APP_REPRODUCIBLE_BUILD: y
      CONFIG_MBEDTLS_PSA_CRYPTO_C: y
      CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED: y
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y
      CONFIG_MBEDTLS_HARDWARE_MPI: n

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: ../../components
    components:
      - greenhouse_pairing_client
      - greenhouse_profile_production_adapters
      - greenhouse_profile_lifecycle_controller
      - greenhouse_profile_isolated_acceptance
      - greenhouse_profile_isolated_device_driver
      - greenhouse_profile_isolated_device_g3_prepare

# P3/P4 compile-only locked harness. The partition is writable-capable for a
# future exact D2 PREPARE execution, but this public image performs only one
# read-only EMPTY inspection. It contains no Wi-Fi component, MQTT configuration,
# test key, candidate profile, write grant, PREPARE call, ACTIVATE, CLEANUP or
# operator command surface. The binding is the merged Stage2D8 integration base;
# the immutable G3 source binding will be replaced only during P5 freeze.
greenhouse_profile_isolated_device_g3_prepare:
  id: stage2d9_g3_prepare
  partition_label: gh2d8_p2d9
  namespace_name: gh2d8_s2d9
  build_binding: 2a5272546f25b1b29cf1d6682cf1fc14f1c1be83
