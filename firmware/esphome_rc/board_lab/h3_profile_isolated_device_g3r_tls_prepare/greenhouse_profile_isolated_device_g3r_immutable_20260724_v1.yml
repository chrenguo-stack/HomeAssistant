esphome:
  name: gh-2d9r-g3r-i1
  friendly_name: Greenhouse Stage 2D-9R G3R Immutable TLS Candidate
  min_version: 2026.4.3

esp32:
  board: esp32-c6-devkitm-1
  variant: ESP32C6
  flash_size: 8MB
  partitions: ../h3_profile_isolated_device_g3_prepare/stage2d9_g3_partitions_20260722_v65.csv
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - mqtt
        - nvs_flash
        - esp_hw_support
    sdkconfig_options:
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: y
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: y
      CONFIG_MBEDTLS_PSA_CRYPTO_C: y
      CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED: y
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y
      CONFIG_MBEDTLS_HARDWARE_MPI: n
      CONFIG_MBEDTLS_X509_CRT_PARSE_C: y

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: ../../components
    components:
      - greenhouse_pairing_client
      - greenhouse_profile_production_adapters
      - greenhouse_profile_lifecycle_controller
      - greenhouse_profile_isolated_acceptance
      - greenhouse_profile_isolated_device_driver
      - greenhouse_profile_isolated_device_g3_prepare
      - greenhouse_profile_isolated_device_g3r_executor

