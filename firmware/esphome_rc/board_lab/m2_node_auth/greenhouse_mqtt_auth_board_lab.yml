esphome:
  name: greenhouse-mqtt-auth-board-lab
  friendly_name: Greenhouse MQTT Auth Board Lab
  min_version: 2026.4.3

esp32:
  board: esp32-c6-devkitm-1
  variant: ESP32C6
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: !secret board_lab_wifi_ssid
  password: !secret board_lab_wifi_password
  reboot_timeout: 0s

mqtt:
  id: board_lab_mqtt
  broker: !secret board_lab_broker_host
  port: !secret board_lab_broker_port
  username: ""
  password: ""
  client_id: lab-board-anon
  discovery: false
  reboot_timeout: 0s
  log_topic: null
  birth_message: null
  will_message: null
  shutdown_message: null
  on_message:
    - topic: lab/control/lab-board-anon/activate
      payload: activate
      then:
        - lambda: |-
            id(mqtt_auth).request_candidate_activation(true);
    - topic: lab/control/lab-board/observe-success
      payload: observe-success
      then:
        - lambda: |-
            id(mqtt_auth).record_observation_success();
    - topic: lab/control/lab-board/observe-failure
      payload: observe-failure
      then:
        - lambda: |-
            id(mqtt_auth).record_observation_failure();
    - topic: lab/control/lab-board/commit
      payload: commit
      then:
        - lambda: |-
            id(mqtt_auth).request_candidate_commit(true);
    - topic: lab/control/lab-board/rollback
      payload: rollback
      then:
        - lambda: |-
            id(mqtt_auth).request_anonymous_rollback();
    - topic: lab/control/lab-board-anon/reboot-hold
      then:
        - lambda: |-
            if (x == "hold") {
              id(mqtt_auth).set_test_reboot_hold(true);
            } else if (x == "release") {
              id(mqtt_auth).release_held_reboot_for_test();
            }
    - topic: lab/control/lab-board/reboot-hold
      then:
        - lambda: |-
            if (x == "hold") {
              id(mqtt_auth).set_test_reboot_hold(true);
            } else if (x == "release") {
              id(mqtt_auth).release_held_reboot_for_test();
            }

external_components:
  - source:
      type: local
      path: ../../components
    components:
      - greenhouse_mqtt_auth

# Non-production test identity only. The explicit true arguments are board-lab
# gates and are not valid production authorization.
greenhouse_mqtt_auth:
  id: mqtt_auth
  mqtt_id: board_lab_mqtt
  candidate_username: ghn_lab-board
  candidate_password: !secret board_lab_candidate_password
  candidate_client_id: lab-board
  anonymous_client_id: lab-board-anon
  candidate_generation: 1
  candidate_secret_fingerprint: !secret board_lab_candidate_secret_fingerprint
  candidate_failure_threshold: 3
  observation_success_threshold: 3
  retry_cooldown: 300s

status_led:
  pin:
    number: GPIO6
    inverted: false

binary_sensor:
  - platform: status
    name: Board Lab ESPHome Status
    id: board_lab_status
  - platform: gpio
    id: board_lab_offline_rollback_button
    internal: true
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - lambda: |-
          id(mqtt_auth).request_anonymous_rollback();

sensor:
  - platform: uptime
    name: Board Lab Uptime
    id: board_lab_uptime
    update_interval: 5s
  - platform: wifi_signal
    name: Board Lab Wi-Fi Signal
    id: board_lab_wifi_signal
    update_interval: 5s

globals:
  - id: board_lab_local_loop_count
    type: uint32_t
    restore_value: false
    initial_value: "0"

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(board_lab_local_loop_count)++;
  - interval: 5s
    then:
      - lambda: |-
          char payload[768];
          snprintf(
              payload,
              sizeof(payload),
              "{\"profile\":\"%s\",\"phase\":\"%s\",\"mqtt_connected\":%s,"
              "\"candidate_failure_count\":%u,\"observation_success_count\":%u,"
              "\"ready_for_commit\":%s,\"anonymous_fallback_present\":%s,"
              "\"candidate_secret_present\":%s,\"candidate_generation\":%u,"
              "\"candidate_secret_fingerprint\":\"%s\",\"last_failure_class\":\"%s\","
              "\"local_loop_count\":%u,\"uptime_ms\":%u,"
              "\"test_reboot_hold\":%s,\"reboot_held_for_test\":%s,"
              "\"local_operation_healthy\":%s,\"secret_values_included\":false}",
              id(mqtt_auth).active_profile_name(),
              id(mqtt_auth).phase_name(),
              id(mqtt_auth).mqtt_connected() ? "true" : "false",
              id(mqtt_auth).candidate_failure_count(),
              id(mqtt_auth).observation_success_count(),
              id(mqtt_auth).ready_for_commit() ? "true" : "false",
              id(mqtt_auth).anonymous_fallback_present() ? "true" : "false",
              id(mqtt_auth).candidate_secret_present() ? "true" : "false",
              id(mqtt_auth).candidate_generation(),
              id(mqtt_auth).candidate_secret_fingerprint().c_str(),
              id(mqtt_auth).last_failure_class(),
              id(board_lab_local_loop_count),
              millis(),
              id(mqtt_auth).test_reboot_hold() ? "true" : "false",
              id(mqtt_auth).reboot_held_for_test() ? "true" : "false",
              id(mqtt_auth).local_operation_healthy() ? "true" : "false");
          const std::string topic =
              "lab/state/" + id(mqtt_auth).active_client_id() + "/heartbeat";
          id(board_lab_mqtt).publish(topic, payload, 0, false);
