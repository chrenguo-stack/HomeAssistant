substitutions:
  device_name: gh-h3-pairing-async-lab
  project_version: "F1.0-RC2-H3-PAIRING-ASYNC-LAB"
  soil_read_interval: 20s
  soil_warmup_time: 15s
  scd30_update_interval: 11s
  battery_divider_ratio: "2.0"
  battery_calibration_factor: "1.000"
  battery_low_threshold: "3.00"
  battery_recovery_threshold: "3.50"

esp32:
  framework:
    sdkconfig_options:
      CONFIG_MBEDTLS_PSA_CRYPTO_C: y
      CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED: y
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y

external_components:
  - source:
      type: local
      path: ../15_1_2_rs485_modbus_echo_filter/my_components
    components:
      - echo_filtered_modbus
  - source:
      type: local
      path: ../components
    components:
      - greenhouse_pairing_client
      - greenhouse_pairing_async_lab

packages:
  core: !include packages/core.yml
  control: !include packages/control.yml
  buses: !include packages/buses.yml
  sensors: !include packages/sensors.yml
  display: !include packages/display.yml

# Dedicated non-production product-PCB compile target for Stage 2C-3. The
# asynchronous worker is created at setup, but pairing is never requested at
# boot. Credential persistence and MQTT activation remain contract models only.
greenhouse_pairing_async_lab:
  id: async_pairing
  hardware_id: ghw-c6-product-stage2c3-lab
  pairing_id: aaaaaaaa-bbbb-4ccc-8ddd-eeeeeeeeeeee
  pairing_secret: !secret node_pairing_secret
  max_candidates: 4
  candidate_ttl_cap: 120s
  mdns_enabled: true
  udp_enabled: true
  udp_target: 255.255.255.255
  udp_port: 47111
  udp_attempts: 3
  udp_initial_backoff: 250ms
  mdns_timeout: 1000ms
  http_timeout: 5000ms
  response_max_bytes: 16384
  worker_stack_size: 8192
  worker_priority: 1

button:
  - platform: template
    name: "Pairing Request Stage 2C-3 Lab"
    id: pairing_request_stage2c3_lab
    internal: true
    on_press:
      - lambda: |-
          id(async_pairing).request_pairing();
  - platform: template
    name: "Pairing Cancel Stage 2C-3 Lab"
    id: pairing_cancel_stage2c3_lab
    internal: true
    on_press:
      - lambda: |-
          id(async_pairing).cancel_pairing();

text_sensor:
  - platform: template
    name: "Pairing Async Phase Stage 2C-3 Lab"
    id: pairing_async_phase_stage2c3_lab
    internal: true
    update_interval: 5s
    lambda: |-
      return {id(async_pairing).async_phase_name()};
  - platform: template
    name: "Pairing Async Outcome Stage 2C-3 Lab"
    id: pairing_async_outcome_stage2c3_lab
    internal: true
    update_interval: 5s
    lambda: |-
      return {id(async_pairing).async_outcome_name()};

binary_sensor:
  - platform: template
    name: "Pairing Worker Active Stage 2C-3 Lab"
    id: pairing_worker_active_stage2c3_lab
    internal: true
    lambda: |-
      return id(async_pairing).async_active();
  - platform: template
    name: "RAM Credentials Present Stage 2C-3 Lab"
    id: pairing_ram_credentials_stage2c3_lab
    internal: true
    lambda: |-
      return id(async_pairing).ram_credentials_present();
