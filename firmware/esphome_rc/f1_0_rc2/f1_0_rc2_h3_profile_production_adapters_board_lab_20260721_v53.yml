substitutions:
  device_name: gh-h3-prod-adapt-lab
  project_version: "F1.0-RC2-H3-PRODUCTION-ADAPTERS-LAB"
  soil_read_interval: 20s
  soil_warmup_time: 15s
  scd30_update_interval: 11s
  battery_divider_ratio: "2.0"
  battery_calibration_factor: "1.000"
  battery_low_threshold: "3.00"
  battery_recovery_threshold: "3.50"

esp32:
  framework:
    advanced:
      include_builtin_idf_components:
        - mqtt
        - nvs_flash
        - esp_hw_support
    sdkconfig_options:
      CONFIG_MBEDTLS_PSA_CRYPTO_C: y
      CONFIG_MBEDTLS_ECP_DP_CURVE25519_ENABLED: y
      CONFIG_MBEDTLS_CHACHA20_C: y
      CONFIG_MBEDTLS_POLY1305_C: y
      CONFIG_MBEDTLS_CHACHAPOLY_C: y
      CONFIG_MBEDTLS_HARDWARE_MPI: n

external_components:
  - source:
      type: local
      path: ../15_1_2_rs485_modbus_echo_filter/my_components
    components:
      - echo_filtered_modbus
  - source:
      type: local
      path: ../components
    components:
      - greenhouse_pairing_client
      - greenhouse_profile_production_adapters

packages:
  core: !include packages/core.yml
  control: !include packages/control.yml
  buses: !include packages/buses.yml
  sensors: !include packages/sensors.yml
  display: !include packages/display.yml

# Product-PCB compile-only overlay. No adapter object is configured or invoked.
greenhouse_profile_production_adapters:
